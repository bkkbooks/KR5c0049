  - {type: punctuation, offset: 1835, content: (, id: KR5c0049_krp_004-bkkpn199}
  - {type: variant, offset: 1835, length: 379, content: 何晏无名論曰爲民所譽則有名者以无譽无名者也夫聖人名无名譽无譽謂无名爲道无譽爲大則夫无名者可以言有名矣无譽者可以言有譽矣然與夫可譽可名者豈同用哉此比於无所有故皆有所有矣而於有所有之中當與无所有相從而與夫有所有者不同同類无遠而相應異无近而不相違譬如隂中之陽陽中之隂各以物自相求從夏日爲陽而夕夜逺與冬日共爲隂冬日爲隂而朝晝逺與夏日同爲陽皆異於近而同於逺也詳此異同而後无名之論可知矣凡所以至於此者何哉夫道者惟无所有者也自天地巳來皆有所有矣然猶謂之道者以其能復用无所有也故雖處有名之域而沒其无名之象由以在陽之逺體而忘其自有隂之逺類也夏侯玄曰天地以自然運聖人以自然用自然者道也道本无名故老氏曰彊爲之名仲尼稱堯蕩蕩无能名焉下云巍巍成功則彊爲之名取丗所知而稱耳豈有名而更當云无能名焉者邪夫唯无名故可得徧以天下之名名之然豈其名也哉惟此足喻而終莫悟是觀泰山崇崛而謂元氣不洁芒者也, HFL: ''}
