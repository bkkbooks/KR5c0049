  - {type: variant, offset: 7960, length: 1, content: 五, HFL: 六力謂命曰若之功奚若我哉命曰汝奚功於物而欲比朕力曰壽夭窮達貴賤貧富我力之所能也命曰彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽四八仲尼之德不出諸侯之下而困於陣蔡殷紂之行不出三仁之上而居君位季札無爵於吴田恒專有齊國夷齊餓于首陽季氏富於展禽若是汝力之所能奈何壽彼而夭此窮聖而達逆賤賢而貴愚貧善而富惡邪力曰若如是言我固無功於物而物若此耶此則若之所制邪命曰既謂之命奈何有制之者邪朕直而推之曲而任之自壽自夭逢窮自達自貴自賤自富自貧朕豈能識之哉朕豈能識之}
