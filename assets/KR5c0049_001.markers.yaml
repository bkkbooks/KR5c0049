  - {type: variant, offset: 7330, length: 3, content: 盗邪孰, ZTDZ: 汝多知乎均天下之至理也連於形物亦然均髮均縣輕重而髮絶髮不均也均也其絶也莫絶人以}
  - {type: substitution, offset: 7330, original: 盗, replacement: 盜, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19616}}
  - {type: variant, offset: 7331, length: 1, content: 邪, HFL: 耶}
  - {type: substitution, offset: 7333, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 7335, length: 49, content: 盗邪天地之德何邪自然而巳自然而巳何所歷其公私之名公私之名既廢盗與不盗理无差也列子沖虚至德眞經卷第一, HFL: 盜耶}
  - {type: variant, offset: 7335, length: 2, content: 盗邪, ZTDZ: 然自有知其然者也詹何以獨繭絲爲綸芒鍼爲鈎荆蓧爲竿剖粒爲餌引盈車之魚於百仞之淵汩流之中綸不絶鈎不伸竿不撓楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也弱弓纖繳乘風振之連雙鶬於青雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈釣手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕致重也大王治國誠能若此則}
