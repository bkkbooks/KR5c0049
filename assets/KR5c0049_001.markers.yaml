  - {type: variant, offset: 7022, length: 157, content: 夫天地萬物之都稱萬物天地之别名雖復各私其身理不相離仞而有之心之惑也因此而言夫天地委形非我有也飭愛色皃矜伐智能巳爲惑矣至於甚者構仞外物以爲巳有乃標名氏以自異倚親族以自固整章服以耀物籍名位以動衆封殖財貨樹立權黨終身欣玩莫由自悟故老子日吾所以有大患爲吾有身莊子日百骸六藏吾誰與爲親頷斯旨也則方寸與太虚齊空形骸與萬物俱有也, HFL: ''}
