  - {type: variant, offset: 6560, length: 335, content: 則无形无生不死不終則性命何所委順子孫何所委蛻行處何所止泊飲食何所因假也齊之國氏大冨宋之向氏大貧自宋之齊請其術國氏告之曰吾善爲盗始吾爲盗也一年而給二年而足三年大壤自此以往施及州閭向氏大喜喻其爲盗之言而不喻其爲盗之道遂踰垣鑿室手目所及亡不探也未及時以贓獲罪没其先居之財向氏以國氏之謬已也往而怨之國氏曰若爲盗若何向氏言其狀國氏曰嘻若失爲盗之道至此乎今將告若矣吾聞天有時地有利謂春秋冬夏凡土出有也吾盗天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舎陸盗禽獸水盗魚鼈亡非盗也夫禾稼土木禽獸魚鼈皆天之所生豈吾之所有天尚不能自生豈能生物人尚不能自有豈能有物此乃明其自生自有者也然吾盗天而亡殃天亡其旌我公其心何往而有恐哉夫金王珍寶榖帛財貨人之所聚豈天之所與天尚不能與豈人所能聚此, ZTDZ: 朕}
