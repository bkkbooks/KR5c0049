  - {type: voice, offset: 7337, length: 36, name: note, id: n168}
  - {type: variant, offset: 7338, length: 0, content: '', ZTDZ: 下可運於一握將亦奚事哉楚王曰善魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今爲汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志彊而氣弱故足於謀而寡於斷齊嬰志弱而氣彊故少於慮而傷於專若换汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃已瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄游柱指鈞絃三年不成章師襄曰子可以歸矣師文舍其琴嘆曰文非絃之不能鈞非章之不能成文所存者不在絃所志者不在聲内不得於心外不應於氣故不敢發手而動絃且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商絃以召南吕凉風忽至草木成實及秋而叩角絃以激夾鍾温風徐回草木發榮當夏而叩羽絃以召黄鍾霜雪交下川池暴沍及冬而叩徴絃以激蕤賔陽光熾烈堅冰立散將終命宫而總四絃則景風翔慶雲浮甘露降澧泉涌師襄乃撫心高蹈曰微矣子之彈也雖師曠之清角鄒衍之吹律亡以加之彼將挾琴執管而從子之後耳薛譚學謳於秦青未窮青之技自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲薛譚乃謝求反終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之娥還復爲曼聲長歌一里老幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之故雍門之人至今善歌哭效娥之遺聲伯牙善鼓琴鍾子期善聽伯牙鼓琴志在登高山鍾子期曰善哉峨峨兮若泰山志在流水鍾子期曰善哉洋洋兮若江河伯牙所念鍾子期必得之伯牙游於泰山之陰卒逢暴雨止於巖下心悲乃援琴而鼓之初爲霖雨之操更造崩山之音曲每奏鍾子期輒窮其趣伯牙乃舍琴而歎曰善哉善哉子之聽夫志想象猶吾心也吾於何逃聲哉周穆王西巡狩越崑崙不至弇山反還未及中國道有獻工人名偃師穆王薦之問曰若有何能偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰日以俱來吾與若俱觀之越日偃師謁見王王薦之曰若與偕來者何人對曰臣之所造能倡者穆王驚視之趣步俯仰信人也巧夫鎮其頤則歌合律捧其乎則舞應節千變萬化唯意所適王以爲實人也與盛姬内御並觀之技將終倡者瞬其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傳會革木膠漆白黑丹青之所爲王諦料之内則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也而無不畢具者合會復如初見王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王始悦而歎曰人之巧乃可與造化者同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東門賈禽滑釐聞偃飾之巧以告二子二子終身不敢語藝而時執規矩甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學射於甘蠅而巧過其師紀昌者又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃卧其妻之機下以自承牽挺二年之後雖錐末倒眥而不瞬也以告飛衛飛衛曰未也必學視而後可視小如大視微如著而後告我昌以氂懸虱於牖南面而望之旬日之間浸大也三年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛高蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於}
