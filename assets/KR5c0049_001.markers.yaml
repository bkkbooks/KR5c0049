  - {type: variant, offset: 7, length: 9, content: 弟一列子張湛處度注, HFL: 上}
  - {type: variant, offset: 7, length: 1, content: 弟, ZTDZ: 中慕八周穆王第三周穆王時西極之國有化人來入水火貫金石反山川移城邑乘虚不墜觸實不硋千變萬化不可窮極既已變物之形又且易人之慮穆王敬之若神事之若君推路寢以居之引三牲以進之選女樂以娱之化人以爲王之宫室卑陋而不可處王之厨饌腥螻而不可饗王之嬪御膻惡而不可親穆王乃爲之改築土木之功赭堊之色無遺巧焉五府爲虚而臺始成其高千仞臨終南之上號曰中天之臺簡鄭衛之處子娥媌靡曼者施芳澤正娥眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環雜芷若以滿之奏承雲六瑩九韶晨露以樂之月月獻玉衣旦旦薦玉食化人猶不舍然不得已而臨之居亡幾何謁王同遊王執化人之袪騰而上者中天迺止暨及化人之宫化人之宫搆以金銀絡以珠玉出雲雨之上而不知下之據望之若屯雲焉耳目所觀聽鼻口所納嘗皆非人間之有王實以爲清都紫微鈞天廣樂帝之所居王俯而視之其宫榭若累塊積蘇焉王自以居數十年不思其國也化人復謁王同游所及之處仰不見日月俯不見河海光影所照王曰眩不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還化人移之王若碩虚焉既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未昲方微切王問所從來左右曰王默存耳由此穆王自失者三月而復更問化人化人曰吾與王神游也形奚動哉且曩之所居奚異王之宫曩之所游奚異王之圃王間恒疑蹔亡變化之極疾徐之間可盡模哉王大悦不恤國事不樂臣妾肆意遠游命駕八駿之乘右服𦽊音華騮而左緑耳右驂赤驥而左白𣚘音義主車則造父爲御𧮼齊𠱛合爲右次車之乘右服渠黄而左踰輪左驂盜驪而右山子栢夭主車叁百爲御奔戎爲右馳驅千里至于巨蒐氏之國巨蒐氏乃獻白鵠之血以飲王具牛馬之湩以洗王之足及二乘之人已飲而行遂宿于崑崙之阿赤水之陽别日升崑崙之丘以觀黄帝之宫而封之以貽後世遂賔于西王母觴于瑶池之上西王母爲王謡王和之其辭哀焉迺觀日之所入}
