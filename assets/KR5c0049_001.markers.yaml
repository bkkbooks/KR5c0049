  - {type: variant, offset: 5607, length: 862, content: 崩墜身亡所廢寢食者又有憂彼之所憂者因往曉之彼之所憂者惑矣而復以不惑憂彼之所惑不憂彼之所憂喻積惑彌深何能相喻也曰天積氣耳亡處亡氣屈伸呼吸終日在天中行止奈何憂崩墜乎夫天之蒼蒼非人黙之質則所謂天者豈阻逺而无所極邪自地而上則皆天矣故俯仰喘息末始之天也其人曰天果積氣日月星宿不當墜邪曉之者曰日月星宿亦積氣中之有光耀者氣亦何所不勝雖天地之大猶自安於太虛之域況乃氣氣相舉者也只使墜亦不能有所中傷其人曰奈地壞何曉者曰地積塊耳充塞四虚亡處亡塊躇歩跐蹈終日在地上行止奈何憂其壞其人舍然大喜舎冝作釋此書釋字作舎曉之者亦舎然大喜此二人一以必破爲憂一以必全爲喜此未知所以爲憂喜也而互相慰喻使目解釋固未免於大惑也長廬子聞而之曰虹蜺也雲霧也風雨也四時也此積氣之成乎天者也山岳也河海也金石也火木也此積形之成乎地者也知積氣也知積塊也奚謂不壞夫混然未判則天地一氣萬物一形分而爲天地散而爲萬物此盖離合之殊異形氣之虚實夫天地空中之一細物有中之最巨者難終難窮此固然矣難測難識此固然矣憂其壞者誠爲大逺言其不壞者亦爲未是天地不得不壞則㑹歸於壞遇其壞時奚爲不憂哉此知有始之必終有形之必敗而不識休戚與隂陽降器質與天地顯没也子列子聞而曰言天地壞者亦謬言天地不壞者亦謬壞與不壞吾所不能知也雖然彼一也此一也彼一謂不壞者也此一謂壞者也其不壞則與人偕全其壞也則與人偕亡何爲欣戚於其閒哉故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉生之不知死猶死之不知生故當其成也莫知其毀及其毀也亦何知其成此去來之見驗成敗之明徴而我皆即之情无彼此何處容其心乎舜問乎烝曰道可得而有乎舜欲明羣有皆同於无故舉道以爲發問之端曰汝身非汝有也汝何得有夫道郭象曰夫身者非汝所能有也塊然而自有耳有非所有而況无哉舜曰吾身非吾有孰有之哉據有此身故重發問曰是天地之委形也是一氣之偏積者也生非汝有是天地之委和也積和故成生耳性命非汝有是天地之委順也積順故有存亡耳郭象曰身是汝有則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成非汝之有也孫子非汝有是天地之委蛻也氣自委結而蟬蛻耳是汝有則男女炙少亦當由汝, ZTDZ: ''}
