  - {type: line-break, offset: 953, content: '', id: KR5c0049_SBCK_001-1b12}
  - {type: punctuation, offset: 953, content: (, id: KR5c0049_krp_001-bkkpn117}
  - {type: variant, offset: 953, length: 0, content: '', ZTDZ: 彌勤晝則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢爲國君居人民之上總一國之事游燕宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝爲僕虜苦則苦矣夜爲人君其樂無比何所怨哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐背昔夢爲人僕趨走作役無}
  - {type: variant, offset: 954, length: 5, content: 相生理旣然, ZTDZ: 爲也數駡杖撻無不至也眠中啽囈呻呼徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人遠}
  - {type: page-break, offset: 954, content: '', id: KR5c0049_SJB_001-110536a, image: sjb/11/110536a.png}
  - {type: substitution, offset: 957, original: 旣, replacement: 既, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19499}}
  - {type: variant, offset: 960, length: 1, content: 則, ZTDZ: 夜夢爲僕苦逸之復數之常也若欲覺夢兼之豈可得邪尹氏聞其友言寬其役夫之程减己思慮之事疾並少間鄭人}
  - {type: variant, offset: 962, length: 2, content: 何由, ZTDZ: 薪於野者過駭鹿御}
  - {type: variant, offset: 965, length: 3, content: 生忽爾, ZTDZ: 擊之斃之恐人見之也遽}
  - {type: variant, offset: 969, length: 4, content: 自生忽爾, ZTDZ: 藏諸隍中覆之以蕉不勝其喜俄}
  - {type: variant, offset: 974, length: 2, content: 自生, ZTDZ: 遺其所藏之處遂以爲夢焉順途而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿}
  - {type: variant, offset: 980, length: 0, content: '', ZTDZ: 處吾今得之彼直眞夢者矣室人曰若將是夢見薪者之得鹿邪詎有薪者邪今眞得鹿是若之夢眞邪夫曰吾據得鹿何用知彼夢我夢邪薪者之歸不厭失鹿其夜眞夢藏之之處又夢得之之主爽旦案}
  - {type: variant, offset: 981, length: 0, content: '', ZTDZ: 夢而尋得之遂訟而爭之歸之士師士師曰若初眞得鹿妄謂之夢眞夢得鹿妄謂之實彼眞取若鹿而與若爭鹿室人又謂夢仞人鹿無人得鹿今據有此鹿請二分之}
  - {type: variant, offset: 982, length: 0, content: '', ZTDZ: 聞鄭君鄭君曰嘻士師將復夢分人鹿乎訪之國相國相曰夢與不夢臣所不能辨也欲辯覺夢唯黄帝孔丘今亡黄帝孔丘孰辨之哉且恂士師之言可也宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒}
  - {type: page-break, offset: 982, content: '', id: KR5c0049_SJB_001-110536b, image: sjb/11/110536b.png}
  - {type: variant, offset: 983, length: 0, content: '', ZTDZ: 自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾有瘳乎於是試露之而求衣饑之而求食幽之而求明儒生欣然告其子曰疾可已也然吾之方密傳世不以告人試屛左右獨與居室七日從之莫知其所施爲也而積年之疾一朝都除華子既悟廼大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然}
  - {type: punctuation, offset: 984, content: /, id: KR5c0049_krp_001-bkkpn118}
  - {type: variant, offset: 985, length: 680, content: 所以生生則本同於无本同於无而非无也此明有形之自形无形以相形者也則天地安從生天地无所從生而自然生故曰有太易有太初有太始有太素此明物之自㣲至著變化之相因襲也太易者未見氣也易者不窮滯之稱凝寂於太虚之域將何所見即如易繫之太極老氏之渾成也太初者氣之始也隂陽未判即下句所謂渾淪也太始者形之始也隂陽旣判則品物流形也太素者質之始也質性也旣爲物矣則方貟剛柔靜躁沈浮各有其性氣形質具而未相離此直論氣形質不復說太易太易爲三者宗本於後句别自明之也故曰渾淪渾淪者言萬物相渾淪而未相離也雖渾然一氣不相離散而三才之道實濳兆乎其中淪語之助也視之不見聽之不聞循之不得故曰易也易无形不知此下一字老子曰視之不見名曰希而此曰易易亦希簡之别稱也太易之義如此而巳故能爲萬化宗主㝠一而不變者也易變而爲一所謂易者窈冥惚恍不可變也一氣侍之而化故名變耳一變而爲七七變而爲九九變者究也究窮也一變而爲七九不以次數者全舉陽數領其都㑹乃復變而爲二者形變之始也旣涉於有形之域理數相推自一之九九數旣終乃復反而爲一反而爲一歸於形變之始此蓋明變化往復无窮極淸輕者上爲天濁重者下爲地天地何邪直虚實清濁之自分判者耳此一章全是周易乾鑿度也沖和氣者爲人故天地含精萬物化生推此言之則隂陽氣偏交㑹而氣和氣和而爲人生人生則有所而立也子列子曰天地无全功聖人无全能萬物无全用全猶備也故天職生覆地職形載聖職敎化物職所冝職王也生各有性性各有所冝者也然則天有所短地有所長聖有所否物有所通大體適於一方者造餘塗則閡矣王弼曰形必有所分聲必有所屬温也則不能凉宫也則不能商何則生覆者不能形載形載者不能敎化敎化者不能違所冝順之則通也冝定者不出所也皆有素分不可逆也故, ZTDZ: ''}
