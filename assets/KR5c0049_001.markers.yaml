  - {type: punctuation, offset: 5222, content: /, id: KR5c0049_krp_001-bkkpn528}
  - {type: variant, offset: 5222, length: 0, content: '', ZTDZ: 有}
  - {type: variant, offset: 5223, length: 8, content: 慮之表形骸之外求, ZTDZ: 者所能得遠亦非無心者所能得近唯默}
