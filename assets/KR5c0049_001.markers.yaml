  - {type: line-break, offset: 910, content: '', id: KR5c0049_SBCK_001-1b11}
  - {type: variant, offset: 910, length: 0, content: '', ZTDZ: 之氣所不交故寒暑亡辨日月之光所不照故晝夜亡辨其民不食不衣而多眠五旬一覺}
  - {type: page-break, offset: 910, content: '', id: KR5c0049_SJB_001-110535c, image: sjb/11/110535c.png}
  - {type: variant, offset: 911, length: 5, content: 統天地天地, ZTDZ: 夢中所爲}
  - {type: punctuation, offset: 914, content: (, id: KR5c0049_krp_001-bkkpn111}
  - {type: variant, offset: 914, length: 15, content: 天地者舉而言隂陽者明其度數統理, HFL: ''}
  - {type: voice, offset: 914, length: 15, name: note, id: n30}
  - {type: variant, offset: 917, length: 4, content: 舉而言隂, ZTDZ: 實覺之所見者妄四海之齊謂中央之跨河南北越岱東西萬有餘里其陰}
  - {type: 'kr:non-cjk', offset: 918, content: ⬤, id: KR5c0049_krp_001-bkkkrnonc12}
  - {type: punctuation, offset: 921, content: /, id: KR5c0049_krp_001-bkkpn112}
  - {type: variant, offset: 922, length: 0, content: '', ZTDZ: 之審度故一寒一暑昏明之分察故一晝一夜其民有智有愚萬物滋殖才藝多方有君臣相臨禮法相持其所云爲不可稱計一覺一寐以爲覺之所爲}
  - {type: variant, offset: 923, length: 1, content: 明, ZTDZ: 實夢之所見者妄東極之北隅有國曰阜落之國}
  - {type: variant, offset: 925, length: 13, content: 度數統理夫有形者生於无形謂, ZTDZ: 土氣常燠日月餘光}
  - {type: punctuation, offset: 929, content: ), id: KR5c0049_krp_001-bkkpn113}
  - {type: variant, offset: 935, length: 1, content: 无, HFL: 無}
  - {type: substitution, offset: 935, original: 无, replacement: 無, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16186}}
  - {type: punctuation, offset: 937, content: (, id: KR5c0049_krp_001-bkkpn114}
  - {type: variant, offset: 937, length: 79, content: 謂之生者則不无无者則不生故有无之不相生理旣然矣則有何由而生忽爾而自生忽爾而自生而不知其所以生不知所以生生則本同於无本同於无而非无也此明有形之自形无形以相形者也, HFL: ''}
  - {type: voice, offset: 937, length: 79, name: note, id: n31}
  - {type: variant, offset: 939, length: 8, content: 生者則不无无者則, ZTDZ: 照其土}
  - {type: substitution, offset: 943, original: 无, replacement: 無, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16186}}
  - {type: substitution, offset: 944, original: 无, replacement: 無, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16186}}
  - {type: punctuation, offset: 945, content: /, id: KR5c0049_krp_001-bkkpn115}
  - {type: variant, offset: 949, length: 1, content: 故, ZTDZ: 嘉苗其民食草根木實不知火食性剛悍强弱相藉貴勝而不尚義多馳步少休息常覺而不眠周之尹氏大治産其下趣役者侵晨昏而弗息}
  - {type: variant, offset: 951, length: 1, content: 无, ZTDZ: 老役夫筋力竭矣而使}
  - {type: substitution, offset: 951, original: 无, replacement: 無, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16186}}
