  - {type: variant, offset: 1670, length: 1, content: 隂, ZTDZ: 汝所及乎顧謂顔回記之秦人逢氏有子少而惠及壯而有迷罔之疾聞歌以爲哭視白以爲黑饗香以爲朽嘗甘以爲苦行非以爲是意之所之天地四方水火寒暑無不倒錯者焉楊氏告其父曰魯之君子多術藝將能已乎汝奚不訪焉其父之魯過陳遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝}
