  - {type: variant, offset: 7326, length: 1, content: 德, ZTDZ: 表不有大天地}
  - {type: variant, offset: 7328, length: 0, content: '', ZTDZ: 乎亦吾所不知也然則天地亦物也物有不足故昔者女媧氏練五色石以補其闕斷鼇之足以立四極其後共工氏與顓頊爭爲帝怒而觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉湯又問物有巨細乎有修短乎有同異乎革曰渤海之東不知幾億萬里有大壑焉實惟無底之谷其下無底名曰歸墟八紘九野之水天漢之流莫不注之而無增無减焉其中有五山焉一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊其山高下周旋三萬里其頂平處九千里山之中間相去七萬里以爲鄰居焉其上臺觀皆金玉其上禽獸皆純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相往來者不可數焉而五山之根無所連著常隨潮波上下往還不得蹔峙焉仙聖毒之訴之於帝帝恐流於西極失羣聖之居乃命禺疆使巨鼇十五舉首而戴之迭爲三番六萬歲一交焉五山始峙而不動而龍伯之國有大人舉足不盈數步而暨五山之所一釣而連六鼇合負而趣歸其國灼其骨以數焉於是岱輿貟嶠二山流於北極沉於大海仙聖之播遷者巨億計帝憑怒侵减龍伯之國使阨侵小龍伯之民使短至伏羲神農時其國人猶數千丈從中州以東四十萬里得僬僥國人長一尺五寸東北極有人名曰諍人長九寸荆之南有冥靈者以五百歲爲春五百歲爲秋上古有大樁者以八千歲爲春八千歲爲秋朽壤之上有菌芝者生於朝死於晦春夏之月有蠓蚋者因雨而生見陽而死終髮北之北有溟海者天池也有魚焉其廣數千里其長稱焉其名爲鯤有鳥焉其名爲鵬翼若垂天之雲其體稱焉世豈知有此物哉大禹行而見之伯益知而名之夷堅聞而志之江浦之間生麽蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形𧣾丑豸文余普弭三切俞師曠方夜擿耳俛首而聽之弗聞其聲唯黄帝與容成子居空同之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲吴楚之國有大木焉其名爲櫾碧樹而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北而化爲枳焉鸜鵒不踰濟貉踰汶則死矣地氣然也雖然形氣異也性鈞已無相易已生皆全已分皆足已吾何以識其巨細何以識其脩短何以識其同異哉大形王屋二山方七百里高萬仞本在冀州之南河陽之北北山愚公者年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險指通豫南達于漢陰可乎雜然相許其妻獻疑曰以君之力曾不能損魁父之丘如太形王屋何且焉置土石雜曰投諸渤海之尾隱土之北遂率子孫荷擔者三夫叩石墾壤箕畚運於渤海之尾鄰人京城氏之孀妻有遺男始齓跳往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曾不能毁山之一毛其如土石何北山愚公長息曰汝心之固固不可徹曾不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子又生子子又生孫子子孫孫無窮匱也而山不加增何若而不平河曲智叟亡以應操蛇之神聞之懼其不已也告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南自此冀之南漢之陰無隴斷焉夸父不量力欲追日影逐之於隅谷之際渴欲得飲赴飲河渭河渭不足將走北飲大澤未至道渴而死棄其杖尸膏肉所浸生鄧林鄧林彌廣數千里焉大禹曰六合之間四海之内照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物其形或夭或壽唯聖人能通其道夏革曰然則亦有不待神靈而生不待陰陽而形不待日月而明不待殺戮而夭不待將迎而壽不待五穀而食不待繒纊而衣不待舟車而行其道自然非聖人之所通也禹之治水土也迷而失塗謬之一國濱北海之北不知距齊州幾千萬里其國名曰終北不知際畔之所齊限無風雨霜露不生鳥獸蟲魚草木之類四方悉平周以喬陟當國之中有山山名壺領狀若甔甄頂有口狀若貟環名曰滋穴有水湧出名曰神瀵臭過蘭椒味過醪醴一源分爲四埒注於山下經營一國亡不悉徧土氣和亡札厲人性婉而從物不競不爭柔心而弱骨不驕不忌長幼儕居不君不臣男女雜游不媒不聘縁水而居不耕不稼土氣温適不織不衣百年而死不夭不病其民孳阜亡數有喜樂亡衰老哀苦其俗好聲相携而迭謡終日不輟音饑倦則飲神瀵力志和平過則醉經旬乃醒沐浴神瀵膚色脂澤香氣經旬乃歇周穆王北游過其國三年忘歸既反周室慕其國𢠵然自失不進酒肉不召嬪御者數月乃復管仲勉齊桓公因遊遼口俱之其國幾尅舉隰朋諫曰君舍齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬視撝則諸侯從命亦奚羨於彼而棄齊國之社稷從戎夷之國乎此仲父之耄奈何從之桓公乃止以隰明之言告管仲仲曰此固非朋之所及也臣恐彼國之不可知之也齊國之富奚戀隰朋之言奚顧南國之人祝髮而祼北國之人鞨巾而裘中國之人冠冕而裳九土所資或農或商或田或漁如冬裘夏葛水舟陸車默而得之性而成之越之東有輒休之國其長子生則鮮而食之謂之宜弟其大父死負其大母而棄之曰鬼妻不可與同居處楚之南有炎人之國其親戚死㱙與咼同其肉而棄之然後埋其骨迺成爲孝子秦之西有儀渠文康之國者其親戚死聚柴積而焚之燻則煙上謂之登遐然後成爲孝子此上而爲政下以爲俗而未足爲異也孔子東游見兩小兒辨鬥問其故一兒曰我以日始出時去人近而日中時遠也一兒以日初出遠而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不爲遠者小而近者大乎一兒曰日初出則滄滄凉凉及其日中如探湯此不爲近者熱而遠者凉乎孔子不能决也兩小兒笑曰}
