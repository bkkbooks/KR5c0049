  - {type: variant, offset: 903, length: 1, content: 昔, ZTDZ: 神遇爲夢形接爲事故晝想夜夢神形所遇故神凝}
  - {type: variant, offset: 905, length: 1, content: 聖, ZTDZ: 想夢自消信覺不語信夢不達物化之往來者也古之眞}
  - {type: variant, offset: 907, length: 2, content: 因隂, ZTDZ: 其覺自忘其寢不夢幾虚語哉西極之南隅有國焉不知境界之所接名古莽之國陰}
  - {type: variant, offset: 908, length: 1, content: 隂, HFL: 陰}
