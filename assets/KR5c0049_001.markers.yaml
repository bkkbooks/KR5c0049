  - {type: variant, offset: 1797, length: 387, content: 所運常冥通而无待故有生者有生生者有形者有形形者有聲者有聲聲者有色者有色色者有味者有味味者形聲色味皆忽爾而生不能自生者也夫不能自生則无爲之本无爲之本則无當於一象无係於一味故能爲形氣之主動必由之者也生之所生者死矣而生生者未甞終之所形者實矣而形者未甞有聲之所聲者聞矣而聲聲者未嘗發色之所色者彰矣而色色者未嘗顯味之所味者嘗矣而味味者未嘗呈夫盡於一者皆隨代謝而遷革矣故生者必終而生生物者无變化也皆无爲之職也至无者故能爲萬變之宗主也能隂能陽能柔能剛能短能長能貟能方能生能死能暑能涼能浮能沈能宫能商能出能没能玄能黃能甘能苦能羶能香无知也无能也而无不知也而无不能也知盡則无知能極則无能故无所不知无所不能何晏道論曰有之爲有恃无以生事而爲事由无以成夫道之而无語名之而无名視之而无聽之而无聲則道之全焉故能昭音嚮而出氣物包形神而章光影以之黒素以之白矩以之方規以之貟貟方得形而此无形白黒得名而此无名也, ZTDZ: 廬冢悲心更微仲尼第四仲尼閑居}
