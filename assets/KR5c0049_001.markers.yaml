  - {type: variant, offset: 4904, length: 1, content: 歸, ZTDZ: 歟孔子曰三王善任智勇者聖則丘弗知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者爲聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其爲聖弗知眞爲聖歟眞不聖歟商太宰默然心計曰孔丘欺我哉子夏問孔子曰顔回之爲人奚若子曰回之仁賢於丘}
