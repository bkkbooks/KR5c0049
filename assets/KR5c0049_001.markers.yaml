  - {type: variant, offset: 7339, length: 0, content: '', ZTDZ: 而塵不揚飛衛}
  - {type: variant, offset: 7340, length: 1, content: 德, ZTDZ: 矢先窮紀昌遺一矢既發飛衛以棘剌之端扞之而無差焉於是二子泣而投弓相拜於塗請爲父子尅臂以誓不得告術於人造父之師曰泰豆氏造父之始從習御也執禮甚卑泰豆三年不告造父執禮愈謹乃告之曰古詩言良弓之子必先爲箕良冶之子必先爲裘汝先觀吾趣趣如吾然後六轡可持六馬可御造父曰唯命所從泰豆乃立木爲塗僅可容足計步而置履之而行趣走往還無跌失也造父學之三日盡其巧泰豆歎曰子}
  - {type: page-break, offset: 7340, content: '', id: KR5c0049_SJB_001-110544a, image: sjb/11/110544a.png}
  - {type: variant, offset: 7342, length: 2, content: 邪自, ZTDZ: 其敏也得之捷乎凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎轡銜之際而急緩乎脣吻之和正度於胸臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進退履繩而旋曲中規矩取道致遠而氣力有餘誠得其術也得之於銜應之於轡得之于轡應之於手得之於手應之於心則不以目視不以策驅心閑體正六轡不亂而二十四蹄所投無差迴旋進退莫不中節然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之魏黑卵以暱嫌殺丘邴章丘邴章之子來丹謀報父之讎丹氣其猛形甚露計粒而食順風而趣雖怒不能稱兵以報之恥假力於人誓手劍以屠黑卵黑卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔推屈而體無痕撻負其才力視來丹猶雛鷇也來丹之友申他曰子怨黑卵至矣黑卵之易子過矣將奚謀焉來丹垂涕曰願子爲我謀申他曰吾聞衛孔周其袓得殷帝之寳劍一童子服之却三軍之衆奚不請焉來丹遂適衛見孔周執僕御之禮請先納妻子後言所欲孔周曰吾有三劍唯子所擇皆不能殺人且先言其狀一曰含光視之不可見運之不知其有所觸也泯然無際經物而物不覺二曰承影將旦昧爽之交旦夕昏明之際北面而察之淡淡焉若有物存莫識其狀其所觸也竊竊焉有聲經物而物不疾也三曰宵練方晝則見影而不見光方夜見光而不見形其觸物也𩦐}
  - {type: page-break, offset: 7342, content: '', id: KR5c0049_SJB_001-110544b, image: sjb/11/110544b.png}
  - {type: page-break, offset: 7345, content: '', id: KR5c0049_SJB_001-110544c, image: sjb/11/110544c.png}
  - {type: variant, offset: 7346, length: 1, content: 巳, ZTDZ: 過隨過隨合覺疾而不血刃焉此三寳者傳之十三世矣而無施於事匣而藏之未嘗啓封來丹曰雖然吾必請其下者孔周乃歸其妻子與齋七日晏陰之間跪而授其下劍來丹再拜受之以歸來丹遂執劍從黑卵時黑卵之醉偃牖下白頸至腰三斬之黑卵不覺來丹以黑卵之死趣而退遇黑卵之子於門擊之三下如投虚黑卵之子方笑曰汝何蚩而三招予來丹知劍之不能殺人也歎而歸黑卵既醒怒其妻曰醉而露我使我嗌疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支彊彼其厭我哉周穆王大征西戎西戎獻錕鋙之劍火浣之布其劍長尺有咫練鋼赤刃用之切玉如切泥焉火浣之布浣之必投於火布則火色垢則布色出火而振之皓然疑乎雪皇子以爲無此物傳之者妄蕭叔曰皇子果於}
  - {type: variant, offset: 7348, length: 21, content: 然而巳何所歷其公私之名公私之名既廢盗與不盗, ZTDZ: 信果於誣}
