  - {type: variant, offset: 822, length: 2, content: 不化, ZTDZ: 殺甚飽則夢與甚飢則夢取是以以浮虚爲疾}
  - {type: variant, offset: 825, length: 3, content: 然後能, ZTDZ: 則夢揚以沈實}
  - {type: substitution, offset: 828, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 829, length: 28, content: 生化之本也自生自化自形自色自智自力自消自息皆自爾耳豈有尸, ZTDZ: 疾者則夢溺藉帶}
