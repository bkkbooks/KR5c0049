  - {type: variant, offset: 5334, length: 1, content: 巳, HFL: 已}
  - {type: variant, offset: 5337, length: 25, content: 密移疇覺之哉此則莊子舟壑之義孔子曰日夜无丘以是徂夫, ZTDZ: 含}
  - {type: punctuation, offset: 5343, content: (, id: KR5c0049_krp_001-bkkpn539}
  - {type: variant, offset: 5343, length: 86, content: 此則莊子舟壑之義孔子曰日夜无丘以是徂夫萬物與化爲體體隨化而遷化不蹔停物豈守故故向之形生非今形生俯仰之閒巳渉萬變氣散朽非一旦頓至而昧者操必化之器託不停之運自謂變化可逃不亦悲乎, HFL: ''}
