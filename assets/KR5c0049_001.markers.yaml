  - {type: variant, offset: 6943, length: 379, content: 東郭先生曰若一身庸非盗乎盗隂陽之和以成生載若形況外物而非盗哉若其有盗邪則我身即天地之一物不得私而有之若其无盗邪則外内不得異也誠然天地萬物不相離也仞而有之皆惑也夫天地萬物之都稱萬物天地之别名雖復各私其身理不相離仞而有之心之惑也因此而言夫天地委形非我有也飭愛色皃矜伐智能巳爲惑矣至於甚者構仞外物以爲巳有乃標名氏以自異倚親族以自固整章服以耀物籍名位以動衆封殖財貨樹立權黨終身欣玩莫由自悟故老子日吾所以有大患爲吾有身莊子日百骸六藏吾誰與爲親頷斯旨也則方寸與太虚齊空形骸與萬物俱有也國氏之盗公道也故亡殃若之盗私心也故得罪公者對私之名无私則公名滅矣今以犯天者爲公犯人者爲私於理未至有公私者亦盗也直所犯之異耳未爲非盗亡公私者亦盗也一身不得不有財物不得不聚復欲遣之非能即而无心者也公公私私天地之德生即天地之一理身即天地之一物今所愛吝復是愛吝天地之閒生身耳事无公私理无愛吝者也, ZTDZ: ''}
