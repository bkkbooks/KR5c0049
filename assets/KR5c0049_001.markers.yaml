  - {type: variant, offset: 94, length: 66, content: 也居鄭圃鄭有圃田四十年人无識者非形不與物接言不與物交不知其德之至則同於不識者矣國君卿大夫眎之猶衆庶也非自隔於物直言无是非行无軌迹則物, ZTDZ: 世}
