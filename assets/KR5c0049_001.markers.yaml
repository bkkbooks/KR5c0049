  - {type: variant, offset: 278, length: 4, content: 列子之謙, ZTDZ: 八徴形所接也奚謂六候一曰正夢二曰蘁夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六}
  - {type: variant, offset: 283, length: 10, content: 也其言曰有生今塊然之, ZTDZ: 神所交}
