  - {type: variant, offset: 161, length: 59, content: 能知也國不足年饑將嫁於衞自家而出謂之嫁弟子曰先生往无反期弟子敢有所謁先生將何以敎先生不聞壷丘子林之言乎壷丘子林列子之師, ZTDZ: 傳焉}
