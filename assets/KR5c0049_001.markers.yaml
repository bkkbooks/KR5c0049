  - {type: punctuation, offset: 66, content: /, id: KR5c0049_krp_001-bkkpn5}
  - {type: variant, offset: 67, length: 0, content: '', ZTDZ: 變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深固難窮難}
  - {type: variant, offset: 68, length: 0, content: '', ZTDZ: 因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也}
  - {type: variant, offset: 69, length: 0, content: '', ZTDZ: 可與學幻矣吾與汝亦幻也奚須學哉老成子歸用尹文先生之言深思三月遂能存亡自在幡校}
