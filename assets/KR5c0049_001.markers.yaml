  - {type: variant, offset: 4901, length: 0, content: '', ZTDZ: 聃之道能以耳視而目聽魯侯聞之大驚使上卿厚禮而致之亢倉子應聘而至魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳曰之用魯侯曰此增異矣其道奈何寡人終願聞之亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之内來干我者我必知之乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣魯侯大悦他日以告仲尼仲尼笑而不答商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘博學多識者}
  - {type: variant, offset: 4902, length: 1, content: 徼, ZTDZ: 商太宰曰三王聖}
