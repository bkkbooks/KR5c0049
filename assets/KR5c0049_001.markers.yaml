  - {type: substitution, offset: 5164, original: 旣, replacement: 既, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19499}}
  - {type: substitution, offset: 5165, original: 虚, replacement: 虛, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20813}}
  - {type: punctuation, offset: 5175, content: ), id: KR5c0049_krp_001-bkkpn523}
  - {type: variant, offset: 5179, length: 0, content: '', ZTDZ: 南郭子貌充心虚耳無聞曰無見口無言心無知形無惕往將奚爲雖然試與汝偕往閲弟子四十人同行見南郭子果若欺魄焉而不可與接顧視子列子形神不相偶而不可與羣南郭子俄而指子列子之弟子未行者與言衎衎若專直而在雄者子列子徒駭之反舍咸有疑色子列子曰得意者無言進知者亦無言用無言爲言亦言無知爲知亦知無言與不言無知與不知亦言亦知亦無所不言亦無所不知亦無所言亦無所知如斯而已汝奚妄駭哉子列子學也三年之後心不敢念是}
  - {type: variant, offset: 5180, length: 7, content: 其名也事有實著, ZTDZ: 口不敢言利害始得老商一眄而已五年之後心更念是}
  - {type: variant, offset: 5182, length: 11, content: 也事有實著非假名而後得, HFL: ''}
  - {type: punctuation, offset: 5183, content: (, id: KR5c0049_krp_001-bkkpn524}
  - {type: voice, offset: 5183, length: 11, name: note, id: n129}
  - {type: variant, offset: 5188, length: 2, content: 假名, ZTDZ: 曰更言利害老商始一解顔而笑七年之後從心之所念更無是非從口之所言更無利害夫子始一引吾並席而坐九年之後橫心之所念橫口之所言亦不知我之是非利害歟亦不知彼之是非利害歟外内進矣}
  - {type: page-break, offset: 5188, content: '', id: KR5c0049_SJB_001-110538b, image: sjb/11/110538b.png}
  - {type: punctuation, offset: 5189, content: /, id: KR5c0049_krp_001-bkkpn525}
  - {type: variant, offset: 5192, length: 0, content: '', ZTDZ: 眼如耳耳如鼻鼻如口口無不同心凝形釋骨肉都融不覺形之所倚足之所履心之所念言之所藏如斯而已則理無所隱矣初子列子好游壺丘子曰禦寇好游游何所好列子曰游之樂所玩無故人之游也觀其所見我之游也觀其所變游乎游乎未有能辨其游者壺丘子曰禦寇之游固與人同歟而曰固與人異歟凡所見亦恒見其變玩彼物之無故不知我亦無故務外游不知務内觀外游者求備於物内觀者取足於身取足於身游之至也求備於物游之不至也於是列子終身不出自以爲不知游壺丘子曰游其至乎至游者不知所適至觀者不知所眂物物皆游矣物物皆觀矣是我之所謂游是我之所謂觀也故曰游其至矣乎游其至矣乎龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以爲榮國毁不以爲辱}
  - {type: variant, offset: 5193, length: 0, content: '', ZTDZ: 而不喜失而弗憂視生如死視富如貧視人如豕視吾如人處吾之家如逆旅之舍觀吾之鄉如戎蠻之國凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕隸此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯自後向明而望之既而曰嘻吾見子之心矣方寸之地虚矣幾聖人}
  - {type: page-break, offset: 5193, content: '', id: KR5c0049_SJB_001-110538c, image: sjb/11/110538c.png}
  - {type: punctuation, offset: 5194, content: ), id: KR5c0049_krp_001-bkkpn526}
  - {type: variant, offset: 5194, length: 1, content: 莫, ZTDZ: 子心六孔流通一孔不達今以聖智爲疾者或由此乎非吾淺術所能已也無所由而常生者道也由生而生故雖終而不亡常也由生而亡不幸也有所由而常死者亦道也由死而死故雖未然而自亡者亦常也由死而生幸也故無用而生謂之道用道得終謂之常有所用而死者亦謂之道用道而得死者亦謂之常季梁之死楊朱望其門而歌隨梧之死楊朱撫其尸而哭隸人之生隸人之死衆人且歌衆人且哭目將眇者先覩秋毫耳將聾者先聞蚋飛口將爽者先辨淄澠鼻將窒者先覺焦朽體將僵者先亟奔佚心將迷者先識是非故物不至者則不反鄭之圃澤多賢東里多才圃澤之役有伯豐子者行過東里遇鄧析鄧析顧其徒而笑曰爲若舞彼來者奚若其徒曰所願知也鄧析謂伯豐子曰汝知養養之義乎受人養而不能自養者犬豕之類也養物而物爲我用者人之力也使汝之徒食而飽衣而息執政之功也長幼群聚而爲牢籍庖厨之物奚異大豕之類乎伯豐子不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎有善治土木者有善治金革者有善治聲樂者有善治書數者有善治軍旅者有善治宗廟者羣才備也而無相位者無能相使者而位之者無知使之者無能而知之與能爲之使焉執政者乃吾之所使子奚矜焉鄧析無以應目其徒而退公儀伯以力聞諸侯堂谿公言之於周宣王王備禮以聘之公儀伯至觀形懦夫也宣王心惑而疑曰女之力何}
  - {type: page-break, offset: 5194, content: '', id: KR5c0049_SJB_001-110539a, image: sjb/11/110539a.png}
  - {type: 'kr:newline', offset: 5196, content: '

      ', id: KR5c0049_krp_001-bkkkrnewl146}
  - {type: line-break, offset: 5196, content: '', id: KR5c0049_SBCK_001-5b12}
  - {type: variant, offset: 5196, length: 5, content: 靜莫如虚靜, ZTDZ: 公儀伯曰臣之力能折春螽之股堪秋蟬之翼王作色曰吾之力者能裂犀兕之革曳九牛之尾猶憾以弱女折春螽之股堪秋蟬之翼而力聞天下何}
  - {type: substitution, offset: 5199, original: 虚, replacement: 虛, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20813}}
  - {type: variant, offset: 5202, length: 1, content: 虚, ZTDZ: 公儀伯長息退席曰善哉王之問}
  - {type: page-break, offset: 5202, content: '', id: KR5c0049_SJB_001-110539b, image: sjb/11/110539b.png}
  - {type: substitution, offset: 5202, original: 虚, replacement: 虛, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20813}}
  - {type: variant, offset: 5204, length: 0, content: '', ZTDZ: 臣敢以實對臣之師有商丘子者力無敵於天下而六親不知以未嘗用其力故也臣以死事之乃告臣曰人欲見其所不見視人所不窺欲}
  - {type: variant, offset: 5206, length: 0, content: '', ZTDZ: 所不得修人所不爲故學視者先見輿薪學聽者先聞撞鐘夫有易於内者無難於外於外無難故名不出於一家今臣之名聞於諸侯是臣違師之教顯臣之能者也然則臣之名不以負其力者也以能用其力者也不猶愈於負其力者乎中山公子牟者魏國之賢公子也好與賢人游不恤國事而悦趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悦公孫龍也子輿曰公孫龍之爲人也行無師學無友佞給而不中漫衍而無家好怪而妄言欲惑人之心屈人之口與韓檀等肄之公子牟變容曰何子狀公孫龍之過歟請聞其實子輿曰吾笑龍之詒孔穿言善射者能令後鏃中前括發發相及矢矢相屬前矢造準而無絶落後矢之括猶銜弦視之若一焉孔穿駭之龍曰此未其妙者遠蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢來注眸子而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰智者之言固非愚者之所曉後鏃中前括鈞後於前矢注眸子而眶不睫盡矢之勢也子何疑焉樂正子輿曰子龍之徒焉得不飾其闕吾又言其尤者龍誑魏王曰有意不心有指不至有物不盡有影不移髮引千鈞白馬非馬孤犢未嘗有母其負類反倫不可勝言也公子牟曰子不諭至言而以爲尤也尤其在子矣夫無意則心同無指則皆至盡物者常有影不移者說在改也髮引千鈞勢至等也白馬非馬形名離也孤犢未嘗有母非孤犢也樂正子輿曰子以公孫龍之鳴皆條也設令發於餘竅子亦將承之公子牟默然良乆告退曰請待餘日更謁子論堯治天下五十年不知天下治歟不治歟不知億兆之願戴己歟不願戴己歟顧問左右左右不知問外朝外朝不知問在野在野不知堯乃微服游於康衢聞童兒謡曰立我蒸民莫菲爾極不識不知順帝之則堯喜問曰誰教爾爲此言童兒曰我聞之大夫問大夫大夫曰古詩也堯還宫召舜因禪以天下舜不辭而受之關尹喜曰在已無}
  - {type: page-break, offset: 5206, content: '', id: KR5c0049_SJB_001-110539c, image: sjb/11/110539c.png}
  - {type: page-break, offset: 5206, content: '', id: KR5c0049_SJB_001-110540a, image: sjb/11/110540a.png}
  - {type: variant, offset: 5207, length: 0, content: '', ZTDZ: 形物其著其動若水其靜若鏡其應若響故其道若物者也物自違道道不違物善若道者亦不用耳亦不用目亦不用力亦不用心欲若道而用視聽形智以求之弗當}
  - {type: variant, offset: 5208, length: 5, content: 取也與也失, ZTDZ: 瞻之在前忽焉在後用之彌滿六虚廢之莫知}
  - {type: variant, offset: 5215, length: 6, content: 矣夫虚靜之理, ZTDZ: 亦}
  - {type: punctuation, offset: 5216, content: (, id: KR5c0049_krp_001-bkkpn527}
  - {type: variant, offset: 5216, length: 59, content: 夫虚靜之理非心慮之表形骸之外求而得之即我之性内安諸已則自然眞全矣故物以全者皆由虚靜故得其所安所以敗者皆由動求故失其所處, HFL: ''}
  - {type: voice, offset: 5216, length: 59, name: note, id: n130}
