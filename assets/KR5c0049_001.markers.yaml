  - {type: line-break, offset: 5280, content: '', id: KR5c0049_SBCK_001-5b14}
  - {type: variant, offset: 5280, length: 1, content: 後, ZTDZ: 不知其}
  - {type: variant, offset: 5282, length: 3, content: 舞仁義, ZTDZ: 極有盡也湯又問曰四海之外奚有革曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也朕以是知四海四荒四極之不異是也故大小相含無窮極也含萬物}
  - {type: variant, offset: 5286, length: 49, content: 弗能復也當爲之於未有冶之於未亂乃至虧喪凋殘方欲鼓舞仁義以求反性命之極者未之得也䃣音毁粥熊曰運轉亡巳, ZTDZ: 亦如含}
  - {type: punctuation, offset: 5290, content: (, id: KR5c0049_krp_001-bkkpn533}
  - {type: variant, offset: 5290, length: 38, content: 當爲之於未有冶之於未亂乃至虧喪凋殘方欲鼓舞仁義以求反性命之極者未之得也䃣音毁, HFL: ''}
  - {type: voice, offset: 5290, length: 38, name: note, id: n131}
  - {type: substitution, offset: 5291, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
