  - {type: variant, offset: 2185, length: 456, content: 列子適衛食於道從者見百歳髑髏攓蓬而指攓拔出顧謂弟子百豐曰唯予與彼知而未甞生未甞死也俱涉變化之則予生而彼死推之至極之域則理旣无生亦又无死也此過養乎此過歡乎遭形則不能不養遇生則不能不歡此過誤之徒非理之實當也種有幾先問變化種數凡有幾條然後明之於下䵷爲鶉事見墨子得水爲㡭得水土之際則爲䵷蠙之衣衣猶覆蓋生於陵屯陵屯髙潔處也則爲陵舄此隨所生之處而變者也陵舄得鬱栖則爲烏足此合而相生也烏足之根爲蠐螬其葉爲胡蝶根本也葉散也言烏足爲蠐螬之本其未散化爲胡蝶也胡蝶胥也胥皆也言物皆化也化而爲蟲生竈下其狀脫其名曰鴝掇此一形之內變異者也鴝掇千日干日而死化而爲鳥其名曰乾徐骨乾餘骨之沬爲斯彌沬猶精華生起斯彌爲食醯頥輅食醯頥輅生乎食醯黃軦食醯黃軦生乎九猷九猷生乎瞀芮瞀芮生乎腐蠸此皆死而更生之一形者也羊肝化爲地皐馬血之爲轉鄰也人血之爲野火也此皆一形之內自變化也鷂之爲鸇鸇之爲布榖布榖久復爲鷂也鷰之爲蛤也田䑕之爲鶉也朽之爲魚也老韭之爲莧也老羭之爲猨也羭牡羊也魚之爲蟲此皆无所困感自然而變者也亶爰之獸自孕而生曰類亶音蟬山海經云亶爰之山有獸其狀如狸, ZTDZ: 貢入侍}
