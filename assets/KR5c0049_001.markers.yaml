  - {type: variant, offset: 2849, length: 1083, content: 之曰臼水出而東走无顧明日視曰出木告其鄰東走十里而顧其邑盡爲水身因化爲空桑有華氏女子採桑得嬰皃于空桑之中故命之日伊尹而獻其君令庖人養之長而賢爲殷湯相厥昭生乎濕此因蒸潤而生醯雞生乎酒此因酸氣而生羊奚比乎不筍此異而相親比也久竹生青寧因於林藪而生靑寧生程自從㡭至於程皆生生之物虵鳥蟲獸之屬言其變化无常或以形而變或死而更生終始相因无窮巳也程生馬馬生人人久入於機萬物皆出於機皆入於機夫生死變化胡可測哉生於此者或死於彼死於彼者或生於此而形生之生未嘗暫无是以聖人知生不常存死不永滅一氣之變所適萬形萬形萬化而不化者存歸於不化故謂之機機者羣有之始動之所宗故出无入有散有反无靡不由之也黃帝書曰形動不生形而生影聲動不生聲而生響夫有形必有影有聲必有響此自然而並生俱出而俱沒豈有相資前後之差哉郭象注莊子論之詳矣而丗之談者以形動而影隨聲出而響應聖人則之以爲喻明物動則失本靜則歸根不復曲通影響之義也无動不生无而生有有之爲有恃无以生言生必由无而无不生有此運通之功必輟於无故生動之稱因事而立耳形必終者也天地終乎與我偕終料巨細計脩短則與我殊矣㑹歸於終理固无差也終進乎不知也進當爲盡此書盡字例多作進也聚則成形散則爲終此丗之所謂終始也然則聚者以形實爲始以離散爲終散者以虚漠爲始以實爲終故迭相與爲終始而理實无終无始者也道終乎本无始進乎本不久久當爲有无始故不終无有故不盡有生則復於不生有形則復於无形生者反終形者反虚自然之數也不生者此不生者先有其生然後之於死滅非本不生者也本不生者自无生无滅无形者此无刑亦先有其形然後之於離散非本无形者也本无形者初自无聚无散者也夫生生物者不生形形物者无刑故能生形萬物於我體无變今謂旣生旣形而復反於无生无形者此故存亡之徃復爾非始終之不變者也生者理之必終者也終者不得不終亦如生者之不得不生生者不生而自生故雖生而不知所以生不知所以生則生不可絶不知所以死則死不可禦也而欲其生盡其終惑於數也盡亡也精神者天之分骨骸者地之分屬天淸而散屬地濁而聚精神離形各歸其眞天分歸天地分歸地各反其夲故謂之歸也歸其眞宅眞宅太虚之域黃帝曰精神入其門骨骸反其根我尚何存何生之无形何形之无氣何氣之无靈然則心智形骸隂陽之一體偏積之一氣及其離形歸根則反其眞宅而我无物焉人自生至終大化有四其閒遷易无時蹔停四者蓋舉大較而言者也嬰孩也少壯也老耄也死亡也其在嬰孩氣專志一和之至也物不傷焉德莫加焉老子曰含德之厚此於赤子其在少壯則血氣飄溢欲慮充起物所攻焉德故衰焉處力競之地物切不與也其在老耄則欲慮柔焉禮將休焉物莫先焉休息也巳无競心則物不與爭雖未及嬰孩之全方於少壯閒矣其在死亡也則之於息焉反其極矣孔子遊於太山見榮啓期行乎郕之野鹿裘帶索鼓, ZTDZ: 顔回顔回援}
