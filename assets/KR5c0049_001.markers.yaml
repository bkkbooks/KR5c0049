  - {type: line-break, offset: 871, content: '', id: KR5c0049_SBCK_001-1b10}
  - {type: variant, offset: 873, length: 26, content: 非也有心於生化形色則豈能官天地而府萬物瞻羣生而不遺乎, ZTDZ: 哭}
