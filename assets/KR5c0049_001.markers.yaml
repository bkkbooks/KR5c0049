      ', id: KR5c0049_krp_001-bkkkrnewl147}
  - {type: line-break, offset: 5228, content: '', id: KR5c0049_SBCK_001-5b13}
  - {type: punctuation, offset: 5228, content: (, id: KR5c0049_krp_001-bkkpn530}
  - {type: variant, offset: 5234, length: 2, content: 即我, ZTDZ: 而性成}
  - {type: variant, offset: 5237, length: 4, content: 性内安諸, ZTDZ: 者得之知而忘情能而不爲眞知眞能也發無知何能情發不能何能爲聚塊也積塵也雖無爲而非理也湯間第五殷湯問於夏革曰古初有物乎夏革曰古初無物今惡得物後之人將謂今之無物可乎殷湯曰然則物無先後乎夏革曰物之終始初無極}
  - {type: substitution, offset: 5238, original: 内, replacement: 內, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20757}}
  - {type: variant, offset: 5242, length: 1, content: 則, ZTDZ: 始或爲終終或爲始惡知其紀然}
  - {type: variant, offset: 5244, length: 5, content: 然眞全矣故, ZTDZ: ''}
  - {type: substitution, offset: 5245, original: 眞, replacement: 真, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19545}}
  - {type: variant, offset: 5250, length: 25, content: 以全者皆由虚靜故得其所安所以敗者皆由動求故失其所處, ZTDZ: 之外自}
  - {type: punctuation, offset: 5252, content: /, id: KR5c0049_krp_001-bkkpn531}
  - {type: substitution, offset: 5255, original: 虚, replacement: 虛, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20813}}
  - {type: punctuation, offset: 5275, content: ), id: KR5c0049_krp_001-bkkpn532}
  - {type: variant, offset: 5277, length: 2, content: 破䃣, ZTDZ: 先朕所不知也殷湯曰然則上下八方有極盡乎革曰不知也湯固問革曰無則無極有則有盡朕何以知之然無極之外復無無極無盡之中復無無盡無極復無無極無盡復無無盡朕以是知其無極無盡也}
  - {type: page-break, offset: 5277, content: '', id: KR5c0049_SJB_001-110540b, image: sjb/11/110540b.png}
