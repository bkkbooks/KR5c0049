  - {type: variant, offset: 2832, length: 90, content: 傳記曰伊尹母居伊水之上旣孕夢有神告之曰臼水出而東走无顧明日視曰出木告其鄰東走十里而顧其邑盡爲水身因化爲空桑有華氏女子採桑得嬰皃于空桑之中故命之日伊尹而獻其君令庖人養之長而賢爲殷湯相, HFL: ''}
