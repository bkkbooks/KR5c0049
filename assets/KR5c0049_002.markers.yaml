  - {type: variant, offset: 4586, length: 141, content: 言爲都忘然後物无疑心限於智之所知則失之逺矣或有疑丈人假僞以獲蟬海童在和心而鷗游二情相背而同不忤物夫立言之本各有攸趣似乖互㑹歸不異者蓋丈人明夫心慮專一猶能外不駭物況目然冥至同於木石者乎至於海童誠心充於内坦蕩形於外雖未能利害兩忘猜忌兼消然輕羣異亦无所多怪此二喻者蓋假近以徵逺借未以明本耳, HFL: ''}
