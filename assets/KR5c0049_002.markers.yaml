  - {type: variant, offset: 4209, length: 0, content: '', ZTDZ: 今昏昏昧昧紛紛若若隨所爲隨所不爲日去曰來孰能知其故皆命也夫信命者亡壽夭信理者亡是非信心者亡逆順信性者亡安危則謂之都亡所信都亡所不信眞矣慤矣奚去奚就奚哀奚樂奚爲奚不爲黄帝之書云至人居若死動若械亦不知所以居亦不知所以不居亦不知所以動亦不知所以不動亦不以衆人之觀易其情貎亦不謂衆人之不觀不易其情貌獨往獨來獨出獨入孰能礙之墨音眉杘敕夷女履二切單音戰至音咥嘽豈然切咺許元火遠二切憋蒲結切懯芳無切四人相與游於世胥如志也窮年不相知情自以智之深也巧佞愚直婩魚踐午漢二切斫夫約切便辟四人相與游於世胥如志也窮年而不相語術自以巧之微也㺒何交切㤉午交魚駕二切情露讓許偃居辰二切極凌誶四人相與游於世胥如志也窮年不相曉悟自以爲才之得也眠莫典切娗徒典切諈主蘂切諉勇敢怯疑四人相與游於世胥如志也窮年不相讁發自以行無戾也多偶自專乘權隻立四人相與游於世胥如志也窮年不相顧眄自以時之適也此衆態也其貌不一而咸之於道命所歸也佹佹俱爲切成者俏仙妙切成也初非成也佹佹敗者俏敗者也初非敗也故迷生於俏俏之際昧然於俏而不昧然則不駭外禍不喜内福隨時動隨時止智不能知也信命者於彼我無二心於彼我而有二心者不若揜目塞耳背坂面隍亦不墜仆也故曰死生自命也貧窮自時也怨夭折者不知命者也怨貧窮者不知時者也當死不懼在窮不威知命安時也其使多智之人量利害料虚實度人情得亦中亡亦中其少智之人不量利害不料虚實不度人情得亦中亡亦中量與不量料與不料度與不度奚以異唯亡所量亡所不量則全而亡喪亦非知全亦非知喪自全也自亡也自喪也齊景公游於牛山北臨其國城而流涕曰美哉國乎鬱鬱芊芊若何滴滴去此國而死乎使古無死者寡人將去斯而之何史孔梁丘據皆從而泣曰臣賴君之賜跪食惡肉可得而食駑馬稜車可得而乘也且猶不欲死而況吾君乎晏子獨笑於旁公雪涕而顧晏子曰寡人今日之游悲孔與據皆從寡人而泣子之獨笑何也晏子對曰使賢者常守之則太公桓公將常守之矣使有勇者而常守之則莊公靈公將常守之矣數君者將守之吾君方將披簑笠而立乎畎畝之中唯事之恤行假念死乎則吾君又安得此位而立焉以其迭處之迭去之至於君也而獨爲之流涕是不仁也見不仁之君見謟諛之臣臣見此二者臣之所爲獨竊笑也景公慙焉舉觴自罰罰二臣者各二觴焉魏人有東門吴者其子死而不憂其相室曰公之愛子天下無有今子死不憂何也東門吴曰吾常無子無子之時不憂今子死乃與嚮無子同詎奚憂焉農赴時商趣利工追術仕逐勢勢使然也然農有水旱商有得失工有成敗仕有遇否命使然也楊朱第七楊朱游於魯舍於孟氏孟氏問曰人而已矣奚以名爲曰以名者爲富既富矣奚不已焉曰爲貴既貴矣奚不已焉曰爲死既死矣奚爲焉曰爲子孫名奚益於子孫曰名乃苦其身憔其心乘其名者澤及宗族利兼鄉黨况子孫乎凡爲名者必廉廉斯貧爲名者必讓讓斯賤曰管仲之相齊也君淫亦淫君奢亦奢志合言從道行國霸死之後管氏而已田氏之相齊也君盈則己降君歛則己施民皆歸之因有齊國子孫享之至今不絶若實名貧僞名富曰實無名名無實名者僞而已矣昔者堯舜僞以天下讓許由善卷而不失天下享祚百年伯夷叔齊實以孤竹君讓而終亡其國餓死於首陽之山實僞之辨如此其省也楊朱曰百年壽之大齊得百年者千無一焉設有一者孩抱以逮昏老幾居其半矣夜眠之所弭晝覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中道然而自得亡介焉之慮者亦亡一時之中爾則人之生也奚爲哉奚樂哉爲美厚爾爲聲色爾而美厚復不可常厭足聲色不可常翫聞乃復爲刑賞之所禁勸名法之所進退遑遑爾競一時之虚譽規死後之餘榮偊偊王矩切爾慎耳目之觀聽惜身意之是非徒失當年之至樂不能自肆於一時重囚纍梏何以异音異哉太古之人知生之暫來知死之暫往故從心而動不違}
