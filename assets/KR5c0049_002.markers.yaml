  - {type: variant, offset: 4897, length: 0, content: '', ZTDZ: 師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名仲曰仁義使我殺身以成名叔曰仁義使我身名並全彼三術相反而同出}
