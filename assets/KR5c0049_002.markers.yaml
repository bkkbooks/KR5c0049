      ', id: KR5c0049_krp_002-bkkkrnewl142}
  - {type: line-break, offset: 4232, content: '', id: KR5c0049_SBCK_002-5b08}
  - {type: variant, offset: 4233, length: 2, content: 林中, ZTDZ: 他國爲吾之患不輕矣遂刖之而還諸魯既反孟氏之父子叩胸而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之謬也且天下理無常是事無常非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投隙抵時應事無方屬乎智智苟不足使若博如孔丘術如吕尚焉往而不窮哉孟氏父子舍然無愠容曰吾知之矣子勿重言晋文公出會欲伐衛公子鋤仰天而笑公問何笑曰臣笑鄰之人有送其妻適私家者道}
  - {type: page-break, offset: 4233, content: '', id: KR5c0049_SJB_002-110553a, image: sjb/11/110553a.png}
  - {type: variant, offset: 4236, length: 2, content: 痀僂, ZTDZ: 桑婦悦而與言然顧視其妻亦有招之}
  - {type: variant, offset: 4237, length: 1, content: 僂, HFL: 瘻}
  - {type: variant, offset: 4239, length: 4, content: 承蜩猶掇, ZTDZ: 矣臣竊笑此也公寤其言乃止引師而還未至而有伐其北鄙者矣晋國苦盜有郄乞逆切雍者能視盜}
  - {type: page-break, offset: 4242, content: '', id: KR5c0049_HFL_000-019a, image: hfl/0348/0348-040.png}
  - {type: variant, offset: 4244, length: 0, content: '', ZTDZ: 貌察其眉睫之間而得其情晋侯使視盜千百無遺一焉晋侯喜告趙文子曰吾得一人而一國盜爲盡矣奚用多爲文子曰吾君恃伺察而得盜盜不盡矣且郄雍必不得其死焉俄而羣盜謀曰吾所窮者郄雍}
  - {type: variant, offset: 4245, length: 2, content: 仲尼, ZTDZ: 遂共盜而殘之晋侯聞而大駭立召文子而告之}
  - {type: variant, offset: 4248, length: 0, content: '', ZTDZ: 果如}
  - {type: variant, offset: 4249, length: 0, content: '', ZTDZ: 言郄雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之爲於是用隨會知政而羣盜奔秦焉孔子自衛反魯息駕乎河梁而觀焉有懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居也意者難可以濟乎丈夫不以錯意遂度而出孔子問之曰}
  - {type: page-break, offset: 4249, content: '', id: KR5c0049_SJB_002-110553b, image: sjb/11/110553b.png}
  - {type: variant, offset: 4253, length: 1, content: 邪, ZTDZ: 術乎所以能入而出者何也丈夫對}
  - {type: variant, offset: 4255, length: 3, content: 我有道, ZTDZ: 始吾之入}
