  - {type: variant, offset: 5392, length: 285, content: 走向秀曰不喜自聞死日也列子見之而心醉向秀曰迷惑其道也而歸以告壷丘子曰始吾以夫子之道爲至矣則又有至焉者矣郭象曰謂季咸之至又過於夫子也壷子曰吾與汝旣其文未旣其實而固得道與衆雌而无雄而又奚卵焉向秀曰夫實由文顯道以事彰有道而无事猶有雌无雄耳今吾與汝雖深淺不同然俱在實位則无文相發矣故未盡我道之實也此言至人之唱必有感而後和者也而以道與丗抗必信矣夫故使人得而相汝向秀曰元其一方以必信於世故可得而相也嘗試與來以予示之明日列子與之見壷子出而謂列子曰譆子之先生死矣弗活矣不可以旬數矣吾見怪焉見濕灰焉列子入涕泣沾衾以告壷子子曰向吾示之以地文向秀曰塊然土也罪乎不誫不止罪或作萌向秀曰萌然不動亦, ZTDZ: ''}
