  - {type: variant, offset: 4211, length: 0, content: '', ZTDZ: 所好當身之娱非所去也故不爲名所勸從性而游不逆萬物所好死後之名非所取也故不爲刑所及名譽先後年命多少非所量也楊朱曰萬物所異者生也所同者死也生則有賢愚貴賤所以異也死則有臭腐消滅是所同也雖然賢愚貴賤非所能也臭腐消滅亦非所能也故生非所生死非所死賢非所賢愚非所愚貴非所貴賤非所賤然而萬物齊生齊死齊賢齊愚齊貴齊賤十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則腐骨生則桀紂死則腐骨一矣孰知其異且趣當生奚遑死後楊朱曰伯夷非亡欲矜清之卸以放餓死展季非亡情矜貞之卸以放寡宗清貞之誤善之在此楊朱曰原憲窶於魯子貢殖於衛原憲之窶損生子貢之殖累身然則窶亦不可殖亦不可其可焉在曰可在樂生可在逸身故善樂生者不窶善逸身者不殖楊朱曰古語有之生相憐死相捐此語至矣相憐之道非唯情也勤能使逸餓能使飽寒能使温窮能使達也相捐之道非不相哀也不含珠玉不服文錦不陳犧牲不設明器也晏平仲問養生於管夷吾管夷吾曰肆之而已勿壅勿閼晏平仲曰其目奈何夷吾曰恣耳之所欲聽恣目之所欲視恣鼻之所欲向恣口之所欲言恣體之所欲安恣意之所欲行夫耳之所欲聞者音聲而不得聽謂之閼聰目之所欲見者美色而不得視謂之閼明鼻之所欲向者椒蘭而不得嗅謂之閼顫口之所欲道者是非而不得言謂之閼智體之所安者美厚而不得從謂之閼適意之所欲爲者放逸而不得行謂之閼性凡此諸閼廢虐之主去廢虐之主熙熙然以俟死一日一月一年十年吾所謂養枸此廢虐之主録而不舍戚戚然以至乆生百年千年萬年非吾所謂養管夷吾曰吾既告子養生矣送死奈何晏平仲曰送死略矣將何以告焉管夷吾曰吾固欲聞之平仲曰既死豈在我哉焚之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可衮衣繡裳而納諸石椁亦可唯所遇焉管夷吾顧謂鮑叔黄子曰生死之道吾二人進之矣子産相鄭專國之政三年善者服其化惡者畏其禁鄭國以治諸侯憚之而有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒千鍾積麴成封望門百步醴漿之氣逆於人鼻方其荒於酒也不知世道之安危人理之悔吝室内之有亡九族之親疏存亡之哀樂也雖水火兵刃交於前弗知也穆之後庭比房數十皆擇雉齒婑儒隹切媠吐火切者以盈之方其耽於色也屛親眤絶交遊逃於後庭以晝足夜三月一出意猶未愜鄉有處子之娥姣者必賄而招之媒而挑之弗獲而後已子産日夜以爲戚密造鄧析而謀之曰僑聞治身以及家治家以及國此言自於近至於遠也僑爲國則治矣而家則亂矣其道逆邪將奚方以救二子子其詔之鄧析曰吾怪之乆矣未敢先言子奚不時其治也喻以性命之重誘以禮義之尊乎子産用鄧析之言因間以謁其兄弟而告之曰人之所以貴於禽獸者智慮智慮之所將者禮義禮義成則名位至矣若觸情而動耽於嗜慾則性命危矣子納僑之言則朝自悔而夕食禄矣朝穆曰吾知之乆矣擇之亦乆矣豈待若言而後識之哉凡生之難遇而死之易及以難遇之生俟易及之死可熟念哉而欲尊禮義以夸人矯情性以招名吾以此爲弗若死也爲欲盡一生之歡窮當年之樂唯患腹溢而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也且若以治國之能夸物欲以說辭亂我之心榮禄喜我之意不亦鄙而可憐哉我又欲與若别之夫善治外者物未必治而身交苦善治内者物未必亂而性交逸以若之治外其法可蹔行於一國未合於人心以我之治内可推之於天下君臣之道息矣吾常欲以此術而喻之若反以彼術而教我哉子産忙然無以應之他日以告鄧析鄧析曰子與眞人居而不知也孰謂子智者乎鄭國之治偶耳非子之功也衛端木叔者子貢之世也藉其先貲家累萬金不治世故放意所好其生民之所欲爲人意之所欲玩者無不爲也無不玩也墻屋臺榭園囿池沼飲食車服聲樂嬪御擬齊楚之君焉至其情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏國非齊土之所産育者無不必致之猶藩墻之物也及其游也雖山川阻險塗逕脩遠無不必之猶人之行咫步也賔客在庭者日百往庖厨之下不絶煙火堂廡之上不絶聲樂奉養之餘先散之宗族宗族之餘次散之邑里邑里之餘乃散之一國行年六十氣幹將衰棄其家事都散其庫藏珍寳車服妾媵一年之中盡焉不爲子孫留財及其病也無藥石之儲及其死也無瘞埋之資一國之人受其施者相與賦而藏之反其子孫之財焉禽骨釐聞之曰端木叔狂人也辱其祖矣段于生聞之曰木叔達人也德過其祖矣其所行也其所爲也衆意所驚而誠理所取衛之君子多以禮教自持固未足以得此人之心也孟孫陽問楊子曰有人於此貴生愛身以蘄不死可乎曰理無不死以蘄乆生可乎曰理無乆生生非貴之所能存身非愛之所能厚且乆生奚爲五情好惡古猶今也四體安危古猶今也世事苦樂古猶今也變易治亂古猶今也既聞之矣既見之矣既更之矣百年猶厭其多況乆生之苦也乎孟孫陽曰若然速亡愈於乆生則踐鋒刃入湯火得所志矣楊子曰不然既生則廢而任之究其所欲以俟於死將死則廢而任之究其所之以放於盡無不廢無不任何遽遲速於其間乎楊朱曰伯成子高不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝爲之乎楊子曰世固非一毛之所濟禽子曰假濟爲之乎楊子弗應禽子出語孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若爲之乎曰爲之孟孫陽曰有斷若一節得一國子爲之乎禽子默然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老聃關尹則子言當矣以吾言問大禹墨翟則吾言當矣孟孫陽因顧與其徒說他事楊朱曰天下之美歸之舜禹周孔天下之惡歸之桀紂然而舜耕於河陽陶於雷澤四體不得蹔安口腹不得美厚父母之所不安弟妹之所不親行年三十不告而娶及受堯之禪年已長智已衰商鈞不才禪位於禹戚戚然以至於死此天人窮毒者也鯀治水土績用不就殛諸羽山禹纂業事讎惟荒土功子産不字過門不入身體偏枯手足胼胝及受舜禪卑宫室美緩冕戚戚然以至於死此天人之憂苦者也武王既終成王幼弱周公攝天子之政召公不悦四國流言居東三年誅兄放弟僅免其身戚戚然以至於死此天人之危懼者也孔子明帝王之道應時君之聘伐樹於宋削迹於衛窮於商周圍於陳蔡受屈於季氏見辱於陽虎戚戚然以至於死此天民之遑遽者也凡彼四聖者生無一日之歡死有萬世之名名者固非實之所取也雖稱之弗知雖賞之不知與株塊無以異矣桀籍累世之資居南面之尊智足以距羣下威足以震海内恣耳目之娱窮意慮之所爲熙熙然以至於死此天民之逸蕩者也紂亦籍累世之資居南面之尊威無不行志無不從肆情於傾宫縱欲於長夜不以禮義自苦熙熙然以至於誅此天民之放縱者也彼二凶也生有從欲之歡死被愚暴之名實者固非名之所與也雖毁之不知雖稱之弗知此與株塊奚以異矣彼四聖雖美之所歸苦以至終同歸於死矣彼二凶雖惡之所歸樂以至終亦同歸於死矣楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能芸而言治天下如運諸掌何也對曰君見其牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣且臣聞之吞舟之魚不游枝流鴻鵠高飛不集汙池何則其極遠也黄鍾大吕不可從煩奏之舞何則其音疏也將治大者不治細成大功者不成小此之謂矣楊朱曰太古之事滅矣孰誌之哉三皇之事若存若亡五帝之事若覺若夢三王之事或隱或顯億不識一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀伏羲已來三十餘萬歲賢愚好醜成敗是非無不消滅但遲速之間爾矜一時之毁譽以焦苦其神形要死後數百年中餘名豈足潤枯骨何生之樂哉楊朱曰人肖天地之類懷五常之性有生之最靈者人也人者爪牙不足以供守衛肌膚不足以自捍禦趨走不足以逃利害無毛羽以禦寒暑必將資物以爲養性任智而不恃力故智之所貴存我爲貴力之所賤侵物爲賤然身非我有也既生不得不全之物非我有也既有不得而去之身固生之主物亦養之主雖全生身不可有其身雖不去物不可有其物有其物有其身是橫私天下之身橫私天下之物其唯聖人乎公天下之身公天下之物其唯至人矣此之謂至至者也楊朱曰生民之不得休息爲四事故一爲壽二爲名三爲位四爲貨有此四者畏鬼畏人畏威畏刑此謂之遁人也可殺可活制命在外不逆命何羨壽不矜貴何羨名不要勢何羨位不貪富何羨貨此謂順民也天下無對制命在内故語有之曰人不婚宧情欲失半人不衣食君臣道息周諺曰田父可坐殺晨出夜入自以性之恒啜菽茹藿自以味之極肌肉麤厚筋節腃驅圓切急一朝處以柔毛綈幕薦以梁肉蘭橘心㾓螢玄切體煩内熱生病矣商魯之君與田父侔地則亦不盈一時而憊矣故野人之所安野人之所美謂天下無過者昔者宋國有田夫常衣緼黂僅以過冬暨春東作自曝於日不知天下之有廣厦隩室綿纊狐狢顧其妻曰負日之暄人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇陟列切於口慘於腹衆哂而怨之其人大慙子此類也楊朱曰豐屋美服厚味姣色有此四者何求於外有此而求外者無厭之性無厭之性陰陽之蠹也忠不足以安君適足以危身義不足以利物適足以害生安上不由於忠而忠名滅焉利物不由於義而義名絶焉君臣兼安物我兼利古之道也鬻子曰去名者無憂老子曰名者實之賔而悠悠者趨名不已名固不可去名固不可賔邪今有名則尊榮亡名則卑辱尊榮則逸樂卑辱則憂苦憂苦犯性者也逸樂順性者也斯實之所係矣名胡可去名胡可賔但惡夫守名而累實守名而累實將恤危亡之不救豈徒逸樂憂苦之間哉說符第八子列子學於壺丘子林壺丘子林曰子知持後則可言持身矣列子曰願聞持後曰顧若影則知之列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈伸任物而不在我此之謂持後而處先關尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也故曰慎爾言將有和之慎爾行將有隨之是故聖人見出以知入觀往以知來此其所以先知}
