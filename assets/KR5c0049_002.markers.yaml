  - {type: variant, offset: 2637, length: 372, content: 智鄙相攻彊弱相凌雖傷破於前不用介意終日夜以此爲戲樂國殆成俗禾生子伯范氏之上客出行經坰外坰郊野之外也宿於田更商丘開之舎更當作中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者冨商丘開先窘於飢寒潜於牖北聽之因假糧荷畚之子華之門子華之門徒皆丗族也縞衣乗軒緩歩闊視顧見商丘開年老力弱面目黎黒衣冠不檢莫不眲之聑音奴革旣而狎侮欺詒攩㧙挨抌攩音晃祕音扶閉挨音烏待抌音都感切二所不爲商丘開常无愠容而諸客之技單憊於戲遂與商丘開俱乗髙臺於衆中漫言曰有能自投下者賞百金衆皆競應商丘開以爲信然遂先投下形飛鳥於地骪骨无䃣范氏之黨以爲偶然末詎怪也因復指河曲之淫隅曰彼中有寶珠泳可得也商丘開復從而泳之水厎潜行日泳旣出果得珠焉衆昉同疑昉始也子華昉令豫食衣帛之次俄而范氏之藏大火子華曰能入火取錦者從所得多少賞商丘開往无難色大火往還埃不漫身不焦范氏之黨以爲有道乃共謝之曰吾, ZTDZ: 告若}
