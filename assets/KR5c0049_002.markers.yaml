  - {type: variant, offset: 4213, length: 0, content: '', ZTDZ: 也度在身稽在人人愛我我必愛之人惡我我必惡之湯武愛天下故王桀紂惡天下故亡此所稽也稽度皆明而不道也譬之出不由門行不從徑也以是求利不亦難乎嘗觀之神農有炎之德稽之虞夏商周之書度諸法士賢人之言所以存亡廢興而非由此道者未之有也嚴恢曰所爲問道者爲富今得珠亦富矣安用道子列子曰桀紂唯重利而輕道是以亡幸哉余未汝語也人而無義唯食而已是鷄狗也彊食靡用勝者爲制是禽獸也爲鷄狗禽獸矣而欲人之尊己}
  - {type: variant, offset: 4215, length: 0, content: '', ZTDZ: 得也人不尊己則危辱及之矣列子學射中矣請於關尹子尹子曰子知子之所}
  - {type: page-break, offset: 4215, content: '', id: KR5c0049_SJB_002-110552b, image: sjb/11/110552b.png}
  - {type: variant, offset: 4216, length: 0, content: '', ZTDZ: 中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子尹子曰子知子之所以中乎列子曰知之矣關尹子曰可矣守而勿失也非獨射也爲國與身亦皆如之故聖人不察存亡而察其所以然列子曰色盛者驕力盛者奮未可以語道也故不班白語道失而况行之乎故自奮則人莫之告人莫之告則孤而無輔矣賢者任人故年老而不衰}
  - {type: variant, offset: 4217, length: 0, content: '', ZTDZ: 盡而不亂故治國之難在於}
  - {type: punctuation, offset: 4218, content: /, id: KR5c0049_krp_002-bkkpn383}
  - {type: variant, offset: 4218, length: 1, content: 知, ZTDZ: 賢而不在自賢宋人有爲}
  - {type: variant, offset: 4220, length: 0, content: '', ZTDZ: 君以玉爲楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而}
  - {type: variant, offset: 4222, length: 1, content: 知, ZTDZ: 别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧子列子窮容貌有飢色客有言之鄭子陽者曰列禦寇蓋有道之士也居君之國而窮君無乃爲不好士乎鄭子陽即令官遺之粟子列子出見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆使佚樂今有飢色君過而遺先生食先生不受豈不命也哉子列子笑}
