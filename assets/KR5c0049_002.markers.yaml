  - {type: variant, offset: 7116, length: 65, content: 以此任天下徒謂不勝而自勝不任而自任也夫體柔虚之道處不競之地雖一身之貴天下之大无心而御之同於徒矣徒空黙之謂也郭象曰聽耳之所聞視目之所, ZTDZ: ''}
