  - {type: variant, offset: 4227, length: 2, content: 仲尼, ZTDZ: 以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯納之以爲諸公子之傳好兵者之楚以法干楚王王悦之以爲軍正禄富其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘於貧羨施氏之有因從請進趣之方二子以實告孟氏孟氏之一子之秦以術干秦王秦王曰當今諸侯力爭所務兵食而已若用仁義治吾國是滅亡之道遂宫而放之其一子之衛以法干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求安之道若賴兵權滅亡可待矣若全而歸之}
  - {type: variant, offset: 4230, length: 2, content: 楚岀, ZTDZ: ''}
  - {type: variant, offset: 4231, length: 1, content: 岀, HFL: 出}
  - {type: substitution, offset: 4231, original: 岀, replacement: 出, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19478}}
