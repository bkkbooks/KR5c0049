  - {type: variant, offset: 1824, length: 408, content: 像聲色者皆物也上至聖人下及艮皆形聲之物以形聲相觀財无殊絶者也物與物何以相逺也向秀曰唯无心者獨逺耳天奚足以至乎先是色而巳餉曰同是色之物耳未足以相先也以相先者唯自然也則物之造乎不形而止乎无所化有旣无始則所造者无形矣形旣无終則所止者无化矣造音作夫得是而窮之者焉得爲正焉㝷形聲欲窮其終始者亦焉得至極之所乎彼將處乎不深之度即形色而不求其終始者不失自然之正矣深當作淫而藏乎无端之紀至理豈有隱藏哉彺而不執故冥然无迹端崖不見游乎萬物之所終始乗理而无心者則常與萬物並遊豈得無終始之迹者乎壹其性養其氣含其德以通乎物之所造氣壹德純者豈但自通而巳哉物之所至皆使无閡然後通濟羣生焉造音操夫是者其天守全其神无郤物奚自入焉自然之分不虧則形神全一憂患奚由而入也夫醉者之墜於車也雖疾不死骨節與人同而犯害與人異其神全也乗亦弗知也墜亦弗知也此借麤以明至理之必然也死生驚懼不入乎其是故遌物而不慴向秀曰遇而不恐也彼得全於酒而猶是向秀曰醉故失其所知耳非自然无心, ZTDZ: 兄弟}
