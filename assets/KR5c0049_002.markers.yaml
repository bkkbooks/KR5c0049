  - {type: punctuation, offset: 5012, content: (, id: KR5c0049_krp_002-bkkpn436}
  - {type: variant, offset: 5012, length: 342, content: 天下有能之而能不爲者有能之而不能不爲者有不能而疆欲爲之者有不爲而自能者至於聖人亦何所爲亦何所不爲亦何所能亦何所不能俛仰同俗升降随物竒功異迹未甞蹔顯體中之絶妙處萬不視一焉此卷自始篇至此章明順性命之道而不係著五情專氣致柔誠心无二者則處水火而不燋溺渉木石而不挂硋觸鋒刃而无傷殘履危險而无巔墜萬物靡逆其心入獸不亂羣神能獨游身能輕舉耳可洞聽目可徹照斯言不經實駭常心故試論之夫隂陽遞化五才偏育金土以母子相生水火以燥濕相乗人性以靜躁殊途升降以所能異情故有雲張之翰淵濳之鱗火遊之䑕木藏之蟲何者剛柔炎凉各有牧冝安於一域則困於餘方至於至人心與无氣合體與隂陽冥諧方圓不當於一象温涼不值於一器神定氣和所乘皆順則五物不能逆寒暑不能傷謂含德之厚和之至也故常无死地豈用心去就而復全哉蹈水火乘雲霧履高危入甲兵未足怪也, HFL: ''}
