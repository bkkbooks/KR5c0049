  - {type: variant, offset: 5832, length: 586, content: 見壷子出而謂列子曰幸矣子之先生遇我也有瘳矣灰然灰或作全有生矣吾見杜權矣有用而无利故謂之杜權列子入告壷子壷子曰向吾示之以天壤向秀曰天壤之中覆載之功見矣比地之文不猶外乎名實不入向秀曰任自然而覆載則名利之作皆爲棄物而機發於踵郭象曰常在極上起此爲杜權是殆見吾善者幾也向秀曰有善於彼彼乃見之明季咸之所見者淺矣甞又與來明曰又與之見壷子出而謂列子曰子之先生坐不齋或无坐字向秀曰无往不平混然一之以管窺天者莫見其崖故以不齊也吾无得而相焉試齋將且復相之列子入告壷子壷子曰向吾示之以太沖莫眹向秀曰居太沖之極皓然泊心同萬方莫見其迹是殆見吾衡氣幾也衡平也鯢旋之潘音藩爲淵止水之曰夫内誠不解郭曰外自矜飾内不釋然也形諜成光郭曰舉動便辟成光儀以外鎭人心外以矜嚴服物内實不足使人輕乎貴老使人輕而尊長之者由其形諜成光故也而其所患郭象曰以美形動物則所患亂至也夫漿人特爲食羮之貨多餘之嬴所貨者羹食所利者盈餘而巳其爲利也薄其爲權也輕而猶是郭象曰權輕利薄可无求於人而皆敬已是髙下大小无所失者而況萬乗之主身勞於國而智盡於事所以不敢之齊彼將任我以事而效我以功吾是以驚推此也則貨輕者望利薄任重者責功多伯昏瞀人曰善哉觀乎汝知驚此者是善觀察者也汝處已人將保汝矣汝黙然不自顯曜適齊之與處此皆无所懼苟違此義所在見保矣无幾何而往則戸外之屨滿矣歸之果衆伯昏瞀人北面而立敦杖蹙之乎頥敦堅也立有閒不言而出賔者以告列子列子提履徒跣而走曁乎門, ZTDZ: ''}
