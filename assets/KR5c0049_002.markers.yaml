  - {type: variant, offset: 4455, length: 113, content: 言治汝所用仁養之術反於自然之道然後可載此言於身上也海上之人有好漚鳥者每旦之海上從漚鳥游漚鳥之至者百住而不止心和而形順者物所不惡住當作數其父曰吾聞漚鳥皆從汝游汝取來吾玩之明日之海上漚鳥舞而不下也心動於内形變於外禽鳥猶人理豈可詐哉, ZTDZ: ''}
