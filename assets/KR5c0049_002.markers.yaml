  - {type: variant, offset: 2266, length: 307, content: 能傷也郭象曰不闚性分之外故曰藏也列禦宼爲伯昏无人射引之盈貫盡窮鏑措杯水其肘上手停審故杯水不傾發之鏑矢復沓郭象曰矢去也箭鏑去復往沓方矢復寓郭象曰箭方去未至的以復杯於射言敏㨗之妙也當是時也猶象人也伯昏无人曰是射之射雖盡射之理面不能不以矜物也非不射之射也忘其能否雖不射而同乎射也當與汝登髙山履危石臨百仞之淵能射乎内有所畏懼則失其射矣於是无人遂登髙山履危石臨百仞之淵背逡巡足二分垂在外揖禦宼而進之禦㓂伏地幵流至踵伯昏无人曰夫至人者上闚青天下潛黃泉揮斥八極神氣不變郭象曰揮斥猶縱放也夫徳充於内則神滿於外无逺近幽深所在皆明故審安危之機而泊然自得也今汝怵然有恂目之志爾於中也殆矣夫郭象曰不能明至分故有懼而所喪者多矣豈唯射乎范氏有, ZTDZ: 楊}
