  - {type: variant, offset: 5125, length: 4, content: 則處水火, ZTDZ: 使汝狗白而往黑而來豈能無怪哉楊朱曰行善不以爲名而名從之名不與利期而利歸之利不與爭期而爭及之故君子必慎爲善昔人有言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死己所重者莫過乎生彼自喪其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而笑之曰夫所欲學不死其人已死而猶恨之是不知所以爲學胡子曰富子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言}
  - {type: variant, offset: 5131, length: 5, content: 燋溺渉木石, ZTDZ: 能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚爲不能言生術哉邯鄲之民以正月之旦獻鳩於簡子簡子大悦厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之故競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰然齊田氏祖於庭食客千人中坐有獻魚雁者田氏視之乃歎曰天之於民厚矣殖五穀生魚鳥以爲之用衆客和之如響鮑氏之子年十二預於次進曰不如君言天地萬物與我並生類也類無貴賤徒以小大智力而相制迭相食非相爲而生之人取可食者而食之豈天本爲人生之是蚊蚋噆膚虎狼食肉非天本爲蚊蚋生人虎狼生肉者哉齊有貧者常乞於城市城市患其亟也衆莫之與遂適田氏之廐從馬醫作役而假食郭中人戲之曰從馬醫而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬醫哉宋人有遊於道得人遺契者歸而藏之密數其齒告鄰人曰吾富可待矣人有枯梧樹者其鄰父言枯梧之樹不祥其鄰人遽而伐之鄰人父因請以爲薪其人乃不悦曰鄰人之父從欲爲薪而教吾伐之也與我鄰若此其險豈可哉人有亡鈇者意其鄰之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無爲}
