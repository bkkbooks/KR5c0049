  - {type: variant, offset: 4259, length: 6, content: 五六月纍堄二, ZTDZ: 先以忠信及吾之出也又從以忠信忠信錯吾軀於波流}
  - {type: variant, offset: 4263, length: 1, content: 堄, HFL: 現音九}
  - {type: variant, offset: 4266, length: 101, content: 不墜則失者錙銖向秀曰累二丸而不墜是用手之停審也故承蜩所失者不過錙銖之閒耳纍三而不墜則失者十一纍五而不墜猶掇之也用手轉審則无所失者也吾處也橜株駒崔譔曰橜株駒断樹也吾執臂槁木之枝天地之大萬物之多而唯蜩翼之知, ZTDZ: ''}
