  - {type: variant, offset: 4843, length: 0, content: '', ZTDZ: 喜也今君有憂色何也襄子曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾今趙氏之德行無所施於積一朝而兩城下亡其及我哉孔子聞之曰趙氏其昌乎夫憂者所以爲昌也喜者所以爲亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吴越皆常勝矣然卒取亡焉不達乎持勝也唯有道之主爲能持勝孔子之勁能拓國門之關而不肯以力聞墨子爲守攻公輸般服而不肯以兵知故善持勝者以强爲弱宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先迕後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者太半此人以父子有疾皆免及圍解而疾俱復宋有蘭子者以技干宋元宋元召而使見其技以雙枝長倍其身屬其脛並趨並馳弄七劍迭而躍之五劍常在空中元君大驚立賜金帛又有蘭子又能燕戲者聞之復以干元君元君大怒曰昔有異技干寡人者技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天下之馬者若滅若没若亡若失若此者絶塵弭𨅊臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纏薪菜者有九方臯此其於馬非臣之下也請見之穆公見之使行求馬三月而反報曰已得之矣在沙丘穆公曰何馬也對曰牝而黄使人往取之牡而驪穆公不說召伯樂而謂之曰敗矣子所使求馬者色物牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其麄在其内而忘其外見其所見不見其所不見視其所視而遺其所不視若辠之相者乃有貴乎馬者也馬至果天下之馬也楚莊王問詹何曰治國奈何詹何對曰臣明於治身而不明於治國也楚莊王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也又未嘗聞身亂而國治者也故本在身不敢對以末楚王曰善狐丘丈人謂叔孫敖曰人有三怨子知之乎叔孫敖曰何謂也對曰爵高者人妬之官大者主惡之禄厚者怨逮之叔孫敖曰吾爵益高吾志益下吾官益大吾心益小吾禄益厚吾施益博以是免於三怨可乎叔孫敖疾將死戒其子曰王亟封我矣吾不受也爲我死王則封汝汝必無受利地楚越之間有寢丘者此地不利而名甚惡楚人鬼而越人機可長有者唯此也叔孫敖死果以美地封其子子辭而不受請寢丘與之至今不失牛缺者上地之大儒也下之邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之歡然亡憂吝之色盜進而問其故曰君子不以所養害其所養盜曰嘻賢矣夫既而相謂曰以彼之賢往見趙君使以我爲必困我不如殺之乃相與追而殺之燕人聞之聚族相戒曰遇盜莫如上地之牛缺也皆受教俄而其弟適秦至關下果遇盜憶其兄之戒因與盜力爭既而不如又追而以卑辭請物盜怒曰吾活汝弘矣而追吾不已迹將著焉既爲盜矣仁將焉在遂殺之又傍害其黨四五人焉虞氏者梁之富人也家充殷盛錢帛無量財貨無訾登高樓臨大路設樂陳酒擊博樓上俠客相隨而行樓上博者射明瓊張中反兩㯓記盍切魚而笑飛鳶適墜其腐鼠而中之俠客相與言曰虞氏富樂之日乆矣而常有輕易人之志吾不侵犯之而乃辱我以腐鼠此而不報無以立慬渠客叵靳二切於天下請與若等戮力一志率徒屬必滅其家爲等倫皆許諾至期日之夜聚衆積兵以攻虞氏大滅其家東方有人焉曰爰旌目將有適也而餓於道狐父之盜曰丘見而下壺餐以餔之爰旌目三餔而後能視曰子何爲者也曰我狐父之人丘也爰旌目曰譆汝非盜邪胡爲而餐我吾義不食子之食也兩手據地而嘔之不出喀喀切嘔也然遂伏而死孤父之人則盜矣而食非盜也以人之盜因謂食爲盜而不敢食是失名實者也柱厲叔事莒敖公自爲不知已去居海上夏日則食菱芰冬日則食橡栗莒敖公有難柱厲叔辭其友而往死之其友曰子自以爲不知已故去今往死之是知與不知無辨也柱厲叔曰不然自以爲不知故去今死是果不知我也吾將死之以醜後世之人主不知其臣者也凡知則死之不知則弗死此直道而行者也柱厲叔可謂懟以忘其身者也楊朱曰利}
