  - {type: variant, offset: 4403, length: 11, content: 分乃疑於神分猶散意專則, ZTDZ: 應白公問曰若以石投水何如孔子曰吾之善没者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可}
