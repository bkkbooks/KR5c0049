  - {type: variant, offset: 6527, length: 406, content: 術乃感物如此乎感豫出異郭象曰先物施惠惠不因彼䂊出而異者且必有感也摇而本身又无謂也必使物感巳則彼我之性動易之與汝遊者莫汝告也皆摇本之徒不能相啓悟也彼所小言盡人毒也小言細巧易以感人故爲人毒害也莫覺莫悟何相孰也不能相成濟也楊朱南之沛老聃西遊於秦邀於郊至梁而遇老子莊子云楊子居子居或楊朱之字又不與老子同時此皆寓言也老子中道仰天而歎曰始以汝爲可敎今不可敎也與至人遊而未能去其矜夸故曰不可敎者也楊子不荅至舎進涫漱巾櫛脫履户外膝行而前曰向者夫子仰天而歎曰始以汝爲可敎今不可敎弟子欲請夫子辭行不閒是以不敢今夫子閒矣請問其過老子曰而睢睢而盱盱而誰與居汝云何自居處而夸張此使物故歎之乎大白辱盛德不足不與物競則常處卑而守約也楊朱蹵然變容曰敬聞命矣其往也舎迎將家客舎家也公執席妻執巾櫛舎者避席煬者避竈厚自蔵異則物憚之也其反也舎者與之爭席矣自同於物物所不惡也楊朱過宋東之於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤楊子問其故逆旅小子, ZTDZ: ''}
