  - {type: variant, offset: 346, length: 21, content: 巳舟車足力形之所資者耳神道恍惚不行而至者也, HFL: 已}
  - {type: variant, offset: 346, length: 4, content: 巳舟車足, ZTDZ: 壽八百顔淵之才不出衆人之下而壽四八仲尼之德不出諸侯之下而困於陣蔡殷紂之行不出三仁之上而居君位季札無爵於吴田恒專有齊國夷齊餓于首陽季氏富於展禽若是汝}
