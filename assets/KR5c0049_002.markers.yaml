  - {type: variant, offset: 5665, length: 139, content: 罪或作萌向秀曰萌然不動亦不自止與枯木同其不華死灰均其寂魄此至人无感之時也夫至人其動也天其靜也土其行也水流其湛也淵嘿淵嘿之與水流天行之與地止其於不爲而自然一也今季咸見其尸居而坐忘即謂之將死見其神動而天隨便爲之有生苟无心而應感則與變升降以丗爲量然後足爲物主而順時无極耳豈相者之所覺哉, HFL: ''}
