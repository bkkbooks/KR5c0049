  - {type: variant, offset: 3011, length: 1191, content: 子之有道而誕子誕欺也吾不知子之神人而辱子子其愚我也子其聾我也子其盲我也敢問其道商丘開曰吾亡道雖吾之心亦不知所以雖然有一於此試與子言之曩子二客之宿吾舎也聞譽范氏之勢能使存者亡亡者存冨者貧貧者冨吾誠之无二心故不逺而來及來以子黨之言皆實也唯恐誠之之不至行之之不及不知形體之所措利害之所存也心一而巳物亡迕者如斯而巳今昉知子黨之誕我我内藏猜慮外衿觀聽追幸昔日之不焦溺也怛然白熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞見馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝弗知乎夫至信之人可以感物也動天地感神橫六合而无逆者豈伹履危險入水火而巳哉商丘開信僞物猶不逆況彼我皆誠哉小子識之周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之无不柔者雄雌在前孳尾成羣異雜居不相搏噬也王慮其術終於其身令毛丘園傳之梁鴦曰鴦賤役也何術以告爾懼王之謂隱於爾也旦一言我養虎之法凡順之則喜逆之則怒此有血氣者之性也然喜怒豈妄發哉皆逆之所犯也夫食虎者不敢以生物與之爲其殺之之怒也恐因殺以致怒不敢以全物與之爲其碎之之怒也恐因其用力致怒時其饑飽達其怒心向秀曰達其心之所以怒而順之也虎之與人異而媚養已者順也殊性而愛媚我順之故也故其殺之逆也所以害物逆其心故然則吾豈敢逆之使怒哉亦不順之使喜也夫喜之復也必怒怒之復也常喜皆不中也不處中和勢極則反必然之數今吾心无逆順者也則鳥獸之視吾猶其儕也故游吾園者不思髙林曠澤寢吾庭者不願深山幽谷理使然也聖人所以陶運羣生使各得其性亦猶役人之能將養禽獸使不相殘害也顔回問乎仲尼曰吾甞濟乎觴深之淵矣津人操舟神吾問焉曰操舟可學邪曰可能游者可敎也善游者數能向秀曰其數自能也言其道數必能不懼舟也乃若夫沒人則未甞見舟而謖操之者也謖起也向秀曰能矜之人也吾問焉而不告敢問何謂也仲尼曰吾與玩其文也久矣而未達其實而固且道與見操舟之可斈則是玩其文未悟沒者之自能則是未至其實今且爲汝說之也能游者可敎也輕水也善游者之散能也忘水也亡水則无矜畏之心乃夫沒人之未甞見舟也而謖操之也彼視者陵視舟之覆猶其車却也覆却萬物方陳乎前而不得入其舍神明所居故謂之舎惡往而不暇所遇皆閒暇也以瓦摳者巧以鉤摳者憚以黃金摳者惛互有所投日摳郭象曰所要愈重則其心愈矜也巧一也而有所矜則重外也凡重外者撰内唯忘内外遺輕重則无巧拙矣孔子觀於吕梁懸水三十仞流沫三十里黿鼉魚鼈之所不能游也見一丈夫游之以爲有苦而欲死者也使弟子益流而承之數百歩而出被髮行歌而游於棠行棠當作塘行當作下孔子從而問之曰吕梁懸水三十仞流沬三十里黿鼉魚鼈所不能游向吾見子道之道當爲蹈以爲有苦而欲死者使弟子並流將承子子出而被髮行歌吾以子爲也察子則人也請問蹈水有道乎曰亡吾无道吾始乎故長乎性成乎命與齎俱入與汨偕出齎汨者水迴入涌出之貌從水之道而不爲私焉此吾所以道之也孔子曰何謂始乎故長乎性成乎命也曰吾生於陵而安於陵故也故猶素也任其眞素則所遇而安也長於水而安於水性也願性之理則物莫之逆也不知吾, ZTDZ: ''}
