  - {type: punctuation, offset: 7178, content: /, id: KR5c0049_krp_002-bkkpn659}
  - {type: variant, offset: 7182, length: 1021, content: 知止其所不知能止其所不能用其自用爲其自爲順性而不競於物者此至柔之道也故舉其自舉持其自持旣无分銖之重而我无力焉粥子曰欲剛必以柔守之欲彊必以弱保之守柔不以求剛而自剛保弱不以求彊而自彊故剛彊者非欲之所能致也積於柔必剛積於弱必彊觀其所積以知禍福之郷禍福生於所積也彊勝不巳至於巳者剛必有折也柔勝出於巳者其力不可量老聃曰兵彊則滅王弼曰物之所惡故必不得終焉木彊則折彊極則毁矣柔弱者生之徒堅彊者化之徒狀不必童章當作同而智童智不必童而狀童聖人取童智而遺童狀衆人近童狀而䟽童智狀與我童者近而愛之狀與我異者䟽而畏之有七尺之骸手足之異戴髮含齒而趣者謂之人而人未必无獸心雖有獸心以狀而見親矣傅翼戴角分牙布仰飛伏走謂之禽獸而禽獸未必无人心雖有人心以狀而見䟽矣庖犧氏女媧氏神農氏夏后氏蛇身人面萬物情態悉解異音聲㑹而聚之訓而受之同於人民故先㑹劉神魑魅禹朝羣神於㑹稽是也次達八方人民未聚禽獸蟲蛾百獸率舞是也言血氣之心智不殊逺也神聖知其如此故其所敎訓者无所遺逸焉宋有狙公者好養猿者因謂之狙公也愛狙養之成羣能解狙之意狙亦得公之心損其家口充狙之欲俄而匱焉將限其食恐衆狙之不馴於巳也馴音脣先誑之曰與茅茅栗也朝三而暮四足乎衆狙皆起而怒俄而曰與茅朝四而暮三足乎衆狙皆伏而喜物之以能鄙相籠皆猶此也聖人以智籠羣愚亦猶狙公之以智籠衆狙也實不虧使其喜怒哉紀渻子爲周宣王養鷄十日而問鷄可巳乎曰未也方虚驕而恃氣无實而自矜者十日又問曰未也猶應影嚮按悟之速十日又問未也猶疾視而盛氣常求敵面必已之勝十日又問曰幾矣鷄雖有鳴者巳无變矣彼命敵而我不應忘勝負矣望之似木鷄矣其德全矣至全者更不似血氣之異鷄无敢應者反走耳德全者非但巳无心乃使外物不生心郭象曰養之以至於全者猶无敵於外況自全乎惠盎惠盎惠施之族見宋康王康王蹀足謦欬疾言曰寡人之所說者勇有力也不說爲仁義者也客將何以敎寡人惠盎對曰臣有道於此使人雖勇刺之不入雖有力擊之弗中大王獨无意邪宋王曰善此寡人之所欲聞也惠盎曰夫刺之不入擊之不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力弗敢擊夫弗敢非无其志也臣有道於此使人本无其志也夫无其志也未有愛利之心也臣有道於此使天下丈夫女子莫不驩然皆欲愛利之此其賢於勇有力也四累之上也大王獨无意邪處卿大夫士民之上故言四累也宋王曰此寡人之所欲得也惠盎對曰孔墨是巳孔丘墨翟无地而爲君無官而爲長天下丈夫女子莫不延頸舉踵而願安利之今大王萬乗之主也誠有其志則四境之内皆得其利矣其賢於孔墨也遠矣宋王無以應惠盎趨而出宋玉謂左右曰辯矣客之以說服寡人也列子, ZTDZ: 金}
