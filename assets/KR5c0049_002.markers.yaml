  - {type: variant, offset: 4995, length: 113, content: 子夏曰夫子能之而能不爲者也文侯大說天下有能之而能不爲者有能之而不能不爲者有不能而疆欲爲之者有不爲而自能者至於聖人亦何所爲亦何所不爲亦何所能亦何所不能俛仰同俗升降随物竒功異迹未甞蹔顯體中之絶妙處萬不視一焉此卷自始篇至此章明順性命, ZTDZ: 門習先生}
  - {type: substitution, offset: 5005, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
