  - {type: variant, offset: 1156, length: 501, content: 口不敢言利害始得夫子一眄而巳實懷利害而不敢言此匿怨藏情者也故眄之而巳五年之後心庚念是非口庚言利害庚當作更夫子始一解顔而是非利害丗間之常理任心之所念任口之所言而无矜忞於鬯懷内外如一不循踰於匿而不顯哉欣其一致聊寄焉七年之後從心之所念庚无是非從口之所言庚无利害夫子始一引吾並席而坐夫心者何寂然而无意想也口者所然然而自吐納也順心之極則无是非任口之理財无利害道契師左同位比肩故其冝耳九年之後橫心之所念横口之所言亦不知我之是非利害歟亦不知彼之是非利害歟亦不知夫子之爲我師人之爲我友内外進矣心旣无念口旣无違故能恣其所念縱其所言體道窮宗爲也津梁終日念而非我念終日言而非我言若以无念爲念无言爲言未造於極也所謂无爲而无不爲者如斯則彼此之異於何而求師資之義將何所施故曰内外盡矣而後眼如耳耳如鼻鼻如口无不同也心凝釋骨都融不覺形之所足之所履隨風東西猶术葉幹殻竟不知風乗我邪我乗風乎夫眼耳鼻口各有攸司令神凝形廢无待於外則視聽不資眼耳臰味不頼鼻口故六藏七孔四支百節塊然尸居同爲一物則形奚所足奚所履我之乗風風之乗我孰能辨也今女居先生之門曽未浹時而懟憾者再三女之片體將氣所不受汝之一節將地所不載用其情有其身則肌骨不能相容一體將无所豈二儀, ZTDZ: 貴}
