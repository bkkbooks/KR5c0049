  - {type: variant, offset: 7513, length: 0, content: '', HFL: 牛首虎鼻此有非人之狀而有大聖之德夏桀殷紂魯桓楚穆狀貌七竅皆同於人而有禽獸之心而衆人守一狀以求至智未可幾也黄帝與炎帝戰於阪泉之野帥熊羆狼豹貙虎爲前驅鵰鵾鷹鳶爲旗幟此以力使禽獸者也堯使夔典樂擊石拊石百獸率舞簫韶九成鳳凰來儀此以聲致禽獸者也然則禽獸之心奚爲異人形音與人異而不知接之之道焉聖人無所不知無所不通故得引而使之焉禽獸之智有自然與人童者其齊欲攝生亦不假智於人也牝牡相偶母子相親避平依險違寒就温居則有群行則有列小者居内壯者居外飲則相携食則鳴群太古之時則與人同處與人並行帝王之時始驚駭散亂矣逮於末世隱伏逃竄以避患害今東方介氏之國其國人數數解六畜之語者蓋偏知之所得太古神聖之人備知}
