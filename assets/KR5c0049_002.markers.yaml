  - {type: variant, offset: 354, length: 1, content: 資, ZTDZ: 能奈何壽彼而夭此窮聖而達逆賤賢而貴愚貧善而富惡邪力曰若如是言我固無功於物而物若此耶此則若之所制邪命曰既謂之命奈何有制之}
  - {type: variant, offset: 356, length: 2, content: 耳神, ZTDZ: 邪朕直而推之曲而任之自壽自夭逢窮自達自貴自賤自富自貧朕豈能識之哉朕豈能識之哉北宫子謂西門子曰朕與子並世也而人子達並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則短褐食則粢糲居則蓬室出則徒行子衣則文錦食則粱肉居則連欐山宜切出則結駟在家熙然有棄朕之心在朝諤然有敖朕之色請謁不相及遨遊不同行固有年矣子自以德過朕邪西門子曰予無以知其實汝造事而窮予造事而達此厚薄之驗歟而皆謂與予並汝之顔厚矣北宫子無以應自失而歸中塗遇東郭先生先生曰汝奚往而反偊偊而步有深愧之色邪北宫子言其狀東郭先生曰吾將舍汝之愧與汝更之西門氏而問之曰汝奚辱北宫子之深乎固且言之西門子曰北宫子言世族年貌言行與予並而賤貴貧富與予異予語之曰予無以知其實汝造事而窮予造事而達此將厚薄之驗歟而皆謂與予並汝之顔厚矣東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宫子厚於德薄於命汝厚於命薄於德汝之達非智得也北宫子之窮非愚失也皆天也非人也而汝以命厚自矜北宫子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣予不敢復言北宫子既歸衣其短褐有狐貉之温進其茙菽有稻粱之味庇其蓬室若廣厦之蔭乘其蓽輅若文軒之飾終身逌然不知榮辱之在彼在我也東郭先生聞之曰北宫子之寐久矣一言而能寤易悟也哉管夷吾鮑叔牙二人相友甚戚同處於齊管夷吾事公子糾鮑叔牙事公子小白齊公族多寵嫡庶並行國人懼亂管仲與召忽奉公子糾奔魯鮑叔奉公子小白奔莒既而公孫無知作亂齊無君二公子爭入管夷吾與小白戰於莒}
  - {type: page-break, offset: 356, content: '', id: KR5c0049_SJB_002-110545b, image: sjb/11/110545b.png}
  - {type: page-break, offset: 356, content: '', id: KR5c0049_SJB_002-110545c, image: sjb/11/110545c.png}
  - {type: punctuation, offset: 357, content: /, id: KR5c0049_krp_002-bkkpn44}
  - {type: variant, offset: 359, length: 2, content: 恍惚, ZTDZ: 射中小白既立脅魯殺子糾召忽死之管夷吾被囚鮑叔牙謂桓公曰管夷吾能可以治國桓公曰我讎也願殺之鮑叔牙曰吾聞賢君無私怨且人能爲其主亦必能爲人君如欲霸王非夷吾其弗可君必舍之遂召管仲魯歸之齊鮑叔牙郊迎釋其囚桓公禮之而位於高國之上鮑叔牙以身下之任以國政號曰仲父桓公遂霸管仲嘗歎曰吾少窮困時嘗與鮑叔牙賈分財多自與鮑叔}
  - {type: variant, offset: 362, length: 1, content: 行, ZTDZ: 以我爲貪知我貧也吾嘗爲鮑叔謀事}
  - {type: variant, offset: 364, length: 0, content: '', ZTDZ: 大窮困鮑叔不以我爲愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我爲不肖知我不遭時也吾嘗三戰三北鮑叔不以我爲怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我爲無恥知我不羞小節而恥名不顯於天下也生我者父母知我者鮑叔也此世稱管鮑善交者小白善用能者然實無善交實無用能也實無善交實無用能者非更有善交更有善用能也召忽非能死不得不死鮑叔非能舉賢不得不舉小白非能用讎不得不用及管夷吾有病小白問之曰仲父之病病矣可不諱云}
  - {type: page-break, offset: 364, content: '', id: KR5c0049_SJB_002-110546a, image: sjb/11/110546a.png}
  - {type: variant, offset: 365, length: 0, content: '', ZTDZ: 於大病則寡人惡乎屬國而可夷吾曰公誰欲歟小白曰鮑叔牙可曰不可其爲人潔廉善士也其於不已若者不比之人一聞人之過終身不忘使之埋國上且鈎乎君下且逆乎民其得罪於君也將弗乆矣小白曰然則孰可對曰勿已則隰朋可其爲人也上忘而下不叛愧其不若黄帝而哀不已若者以德分人謂之聖人以財分人謂之賢人以賢臨人未有得人者也以賢下人者未有不得人}
