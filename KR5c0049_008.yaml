body:
  text: 列子張湛處度注說符第八夫事故無方伙相推言而驗之者攝乎變通之㑹子列子學於壷丘子林壷丘子林曰子知持後則可言持身矣老子曰後其身而身先列子曰願聞持後曰顧影則知之列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈申任物而不在我此之謂持後而處先物莫能與罪故常處先此語以壷子答而不條顯列子一得特後之義因而自釋之壷呼即以為解故不復答列子也尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也夫美惡報應之影響理無差焉故曰愼爾言將有知之愼爾行將有隨之所謂出其言善千里應之行乎彌是乎逺是故聖人見出以知入觀往以知來此其所以先知之理也見言出則入形往則影來明報應之理不異於此也而物所末悟故曰先知之耳度在身稽在人人愛我我必愛之人惡我我必惡之禮度在身老驗由人愛惡從之物不負巳湯武愛天下兹王桀紂惡天下故亡此則成驗此所稽也稽度皆明而不道也譬之出不由門行不從徑也稽度之理既明而復道不行者則出可不由戶行不從徑也以是求利不亦難乎建理而得利未之有嘗觀之神農有炎之德稽之虞夏商周之書度諸法士賢人之言所以存亡廢興而非由此道者未之有也自古迄今無不符驗嚴恢曰所為問道者為冨問猶學也令得珠亦冨矣安用道道冨之本也珠冨之末有本故末存存末則失本也子列子曰桀紂唯重利而輕道是以亡非不冨失本則亡身幸哉余未汝語也人而無義唯食而巳義者冝也得理人冝者物不能奪也是雞狗也彊食靡角勝者為制是禽獸也以力求勝非人道也為雞狗禽獸矣而欲人之尊已不可得也豈欲人之尊巳道在則自尊耳人不尊巳則危辱及之矣樂推而不厭尊巳之謂苟違斯義亡將至列子學射中矣率爾自中非能期中者也請於尹子尹子曰子知子之所以中者乎對曰弗知也尹子曰未可雖中而未知所以中故曰未可也退而習之三年又以報關尹子尹子曰子知子之所以中乎列子曰知之矣尹子曰可矣守而勿失也心平體正內求諸巳得所以中之道則前期命矣發無遺矣非獨射也為國與身亦皆如之故聖人不察存亡而察其所以然射雖中而不知所以中則非中之道身雖存不知所以存則非有之理故夫射者能拙俱中而知所以中者異賢愚俱存而知所以存者殊也列子曰色盛者驕力盛者未可以語道也色力是常人所矜也故不班白語道矣而况行之乎色力既衰方欲言道悟之巳晚言之猶未能得而況行之乎故自奮則人莫之告人莫之告則而無輔矣驕奮者雖告而不受則有忌物之心耳目自塞誰其相之賢者任人故年老而不衰智盡而不亂不以巳知則勿以為巳用矣故治國之難在於知賢而不在自賢自賢者即上所謂孤而無輔知賢則智者為之謀能者為之使物無棄才則國易治也宋人有為其君以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可別也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧比明用巧能不足以婚物因道而化則無不周子列子窮容貌有飢色客有言之鄭子陽者曰列禦寇蓋有道之士也居君之國而窮君無乃為不好士乎鄭子陽即令官遺之粟子列子出見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞為有道者之妻子皆得佚樂今有饑色君遇而遺先生食先生不受豈不命也哉子列子謂之曰君非自知我也以人之言而遺我粟室其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽魯施氏有二子其一好學其一好兵好學者以術于齊侯齊侯納之以為諸公子之傅好兵者之楚以法于楚王王恱之以為軍正祿冨其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘於貧羡施氏之有有猶冨也因從謂進趣之方二子以實告孟氏孟氏之一子之秦以愆于秦王秦王曰當今諸侯力爭所務兵食而巳用仁義治吾國是滅亡之道遂官而放之其一子之衛以法干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求家之道者賴兵權滅亡可待矣全而歸之適於他國為吾之患不輕矣遂州之而還諸魯既反孟氏之父子叩胸而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之謬也且天下理無常是事無常非應機則是失㑹則非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投抵時應事無方屬乎智雖有仁義禮法之術而智不適時則動而次㑹者矣智苟足使博如孔丘術如吕尚焉往而不窮哉二子之所以窮不以共博與術以其不得隨時之宜孟氏父子舍然無愠容曰吾知之矣子勿重言晉文公出㑹欲伐衛公子鋤仰天而公問何曰臣鄰之人有送其妻適私家者道見桑婦恱而與言然顧視其妻亦有招之者矣臣竊此也公寤其言乃止引師而還未至而有伐其北鄙者矣夫我之所行人亦行之而欲騁巳之志謂物不生心惠於彼此之情也晉國苦盜有郤雍者能視盜之眼察其眉睫之閒而得其情侯使視盜千百無遺一焉晉侯大喜告趙文子曰吾得一人而一國盜為盡矣奚用多為文子曰吾君恃伺察而得盜盜不盡矣且郤雍必不得其死焉俄而羣盜謀曰吾所窮者郤雍也遂共盜而殘之殘賊殺之晉侯聞而大駭立召丈子而告之曰果如子言郤雍死矣然取盜何方丈子曰周諺有言察見淵魚者不樣智料隱匿者有殃此答所以致死君欲無盜莫舉賢而任之使教明於上化行於下民有恥心則何盜之為此答所以止盜之方於是用隨㑹知政而羣盜奔秦焉用聰明以察是非者羣許之所逃用先識以擲姧伕者衆惡之所疾智之為患豈虛言哉孔子自衛反魯息駕乎河梁而觀焉有懸水三十仞圜流九十里魚鱉弗能游黿鼉弗能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鱉弗能游黿鼉弗能居也意者難可以濟乎丈夫不以錯意遂度而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信錯吾軀於波流而吾不敢用私所以能入而復出者以此也孔子謂弟子曰二三子識之水且猶可以忠信誠身親之而況人乎黃帝篇中巳有此章而小不所明亦死以異故不復釋其義也白公問孔子曰人可與微言乎孔子不應白公楚平王之孫太子建之子也其父建無極所出奔鄭鄭人殺之勝欲令尹子西司馬子期伐鄭許而未行晉我鄭子西子期將數鄭勝怒日鄭人在此讎不逺矣欲殺子西子斯故問孔子孔子知之故不應微言猶密謀也白公問曰以石投水何如孔子曰吳之善沒者能取之石之水則及喻其微言不可覺故孔子答以善沒者能得之明物不可者也曰以水投水何如孔子曰淄澠之合易牙嘗而知之復為善味者所別也白公曰人故不可與微言乎孔子曰何為不可唯知言之謂者乎謂者所以發言之旨趣發言之首趣則是言之微者形之於事則無所夫知言之謂者不以言言也言言則無微隱爭魚者濡逐獸者趨非樂之也自然之勢自應濡走故至言去言理自明化自行至為無為理自成物自從夫淺知之所爭者末矣失本存末事著而後爭解鮮不及也白公不得巳遂死於浴室不知言之所謂遂便作亂故及於難趙襄子使新稚穆子攻翟穆子襄子家臣新稚狗也翟鮮虞也勝之取左人中人左人中人鮮虞二邑名使遽人來謁之遽傳也謁告也襄子方食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰夫江河之大也不過三日謂潮水有大小飄風暴不終朝日中不須勢盛者必退也今趙氏之德行無所施於積無積德而有重功不可不戒懼也一朝而兩城下亡其及我哉不忘亡則不亡之也孔子聞之曰趙氏其昌乎夫憂者所以為昌也成之深也喜者所以為亡也將致矜伐勝非其難者也持之其難者也賢主以此持勝故其福及後丗齊楚吳越皆嘗勝矣然卒取亡焉不達乎持勝也唯有道之主為能持勝勝敵者皆比國工有以不能持勝故危亡及之孔子之徑能拓國門之而不肯以力聞徑力也拓舉也孔力能舉門關而力名不聞者不用其力也墨子為守攻公輸般服而不肯以兵知公輸般善為攻器墨子設守能却之為般所服而不稱知兵者不有其能也故善持勝者以彊為弱得為攻之母也宋人有好行仁義者三丗不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先忤後合其事末究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋國其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者太半此人以父子有疾皆免及圍解而疾俱復此所謂禍福相也宋有蘭子者凡人物不知生出主謂之蘭也以技干宋元宋元召而使見其技以雙枝長倍其身屬其脛並趨並馳弄七劒迭而躍之五劒常在空中元君大驚立賜金帛又有蘭子又能燕戲者如今之絶倒投狹者聞之復以干元君元君大怒曰昔有異技干寡人者謂先僑人技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而戮之經月乃放此技同而時異則功賞不可預要也秦穆公謂伯樂白子之年長矣伯樂善相馬者子姓有可使求馬者乎問伯樂之種姓有能相馬繼樂者不伯樂對曰良馬可形容筋骨相也馬之良者可以形骨取也天下之馬者滅沒亡失天下之絶倫者不於形骨毛色中求故髣佛恍惚存亡難得知也此者絶塵弭言迅速之極臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纆薪萊者負索薪菜蓋賤役者有九方臯比其於馬非臣之下也請見之非臣之下言有過於巳穆公見之使行求馬三月而反報曰巳得之矣在沙丘地名穆公曰何馬也對曰牝而黃使人往取之牡而驪穆公不說召伯樂而謂之曰敗矣子所使求馬者謂九方臯色物牡牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也言其相馬之妙乃如此也是以勝臣千萬而不可量臯之所觀天機也天機形骨之表所以使蹄足者得之於心不顯其見得其精忘其粗在其內而忘其外精內謂天機粗外謂牝牡色見其所見所見者唯天機也不見其所不見所不見毛色牝牡也視其所視視所冝視者不忘其所視而遺其所不視所不應視者不以經意也皋之相者乃有貴乎馬者也言臯之此術豈止於相馬而巳神明所得必有貴於相馬者言其妙也馬至果天下之馬也楚莊王問詹何曰治國奈何詹何蓋隱者也詹何對曰臣明於治身而不明於治國也楚莊王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也又未嘗聞身亂而國治者也故本在身不敢對以末楚王曰善狐丘丈人謂孫叔敖楚大夫也曰人有三怨子知之乎狐丘邑名丈人長老者孫叔敖曰何謂也對曰爵髙者人妬之官大者主惡之祿厚者怨逺之孫叔敖曰吾爵益髙吾志益下吾官益大吾心益小吾祿益厚吾施益博以是免於三怨可乎孫叔敖疾將死戒其子曰王亟封我矣吾不受也為我死王則封汝汝必無受利地楚越之閒有寢丘者此地不利而名甚惡楚人而越人禨信神與禨祥可長有者唯此也孫叔敖死王果以美地封其子子辭而不受請寢丘與之至今不失漢蕭何亦云子孫無令家所奪即此也牛缺者上地之大儒也下之邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之歡然無憂之色盜追而問其故曰君子不以所養害其所養盜曰嘻賢矣夫既而相謂曰以彼之賢往見趙君便以我為必困我不如殺之乃相與追而殺之燕人聞之聚族相戒曰遇盜莫如上地之牛缺也皆受教俄而其弟適秦至闕下果遇盜憶其兄之戒因與盜力爭既而不如又追而以卑辭請物盜怒曰吾活汝弘矣而追吾不巳迹將箸焉既為盜矣仁將焉在遂殺之又傍害其黨四五人焉牛缺以無招患燕又假有惜受禍安危之不可預圖皆此虞氏者梁之富人也家充殷盛錢帛無量財貨無訾登髙樓臨大路設樂陳酒擊博樓上俠客相隨而行樓上博者射明瓊張中反兩㯓魚而明瓊齒五白也射五白得之反兩魚勝故大飛鳶適墜其腐鼠而中之俠客相與言曰虞氏富樂之日久矣而常有輕易人之志吾不侵犯之而乃辱我以腐鼠此而不報無以立慬於天下慬勇請與等戮力一志率徒屬必滅其家為等倫皆許諾至期日之夜聚衆積兵以攻虞氏大滅其家驕奢之致禍敗不以一塗虞氏無心於陵物而家破者亦由謙退之行不素著故也東方有人焉曰爰旌目將有適也而餓於道狐父之盜曰立見而下壷餐以餔之爰旌目三餔而後能視曰子何為者也曰我狐父之人丘也爰旌目曰嘻汝非盜邪胡為而餐我吾義不食子之食也兩手據地而歐之不出喀喀然遂伏而死狐父之人則盜矣而食非盜也以人之盜因謂食為盜而不敢食是失名實者也柱厲叔事莒敖公自為不知已者居海上夏日則食菱芰冬日則食橡栗莒敖公有難柱厲叔辭其友而往死之其友曰子自以為不知已故去今往死之是知與不知無辨也柱厲叔曰不然自以為不知故去今死是果不知我也吾將死之以醜後丗之人主不知其臣者也凡知則死之不知則弗死此直道而行者也柱厲叔可謂懟以忘其身者也楊朱曰利出者實及怨往者害來利不獨往怨不偏行自然之勢發於此而應於外者唯請請當作情情所感無遠近幽深是故賢者愼所出善著則吉應惡積則禍臻楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路既反問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知所之所以反也楊子戚然變容不言者移時不者竟日門人怪之請曰羊賤畜又非夫子之有而損言者何哉揚子不答門人不獲所命弟子孟孫陽出以告心都子心都子他日與孟孫陽偕入而問曰昔有昆弟三人游齊魯之閒同師而學進仁義之道而歸其父曰仁義之道何伯曰仁義使我愛身而後名身體髮膚不敢毁傷也仲曰仁義使我殺身以成名無求生以害仁有殺身以成仁也叔曰仁義使我身名並全既明且哲以保其身彼三術相反而同出於儒孰是孰非邪楊子曰人有濵河而居者習於水勇於泅操舟鬻渡利供百口裹糧就學者成徒而溺死者幾半本學泅不學溺而利害如此以為孰是孰非心都子默然而出孟孫陽讓之曰何吾子問之迂夫子答之僻吾惑愈甚心都子曰大道以多岐亡羊學者以多方喪生學非本不同非本不一而末異是唯歸同反一為亡得喪子長先生之門習先生之道而不達先生之況也哀哉楊朱之弟由布衣素衣而出天雨解素衣衣緇衣而反其狗不知迎而吠之楊布怒將撲之楊朱曰子無撲矣子亦猶是也嚮者使汝狗白而往黑而來豈能無怪哉此篇明已身變異則外物所不達故有是非之義不內求諸已而厚責於人亦猶楊布服異而怪狗之吠也楊朱曰行善不以為名而名從之名不與利期而利歸之利不與爭期而爭及之故君子必愼為善在智則人與之訟在力則人與之爭此自然之也未有處名利之衝患難不至者也語有之曰為善無近名豈不信哉昔人言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死已所重者莫過乎生彼自喪其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨冨子聞而之曰夫所欲學不死其人巳死而猶恨之是不知所以為學胡子曰冨子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以決喻其子志其言而不能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚為不能言生術哉物有能言而不能行能行而不能言才性之殊也邯鄲之民以正月之旦獻鳩於簡子子大恱厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之故競而捕之死者衆矣君如欲生之不禁民勿捕捕而放之恩過不相矣簡子曰然齊田氏祖於庭食客千人中坐有獻魚鴈者田氏視之乃歎曰天之於民厚矣殖五榖生魚鳥以為之用衆客和之如響鮑氏之子年十二預於次進曰不如君言天地萬物與我並生也䫪無貴賤同是生但自貴而相賤徒以小大智力而相制迭相食非相為而生之人取可食者而食之豈天夲為人生之且蚊蚋噆膚虎狼食非天本為蚊蚋生人虎狠生者哉齊有貧者常乞於城市城市患其亟也衆莫之與遂適田氏之厩從馬醫作役而假食郭中人戲之曰從馬醫而食不以辱乎乞見曰天下之辱莫過於乞乞猶不辱豈辱馬醫哉不以從馬醫為恥辱也此章言物一處極地分既以定則無廉恥況自然能夷得失者乎宋人有游於道得人遺契者遺棄歸而藏之密數其齒刻處似齒告鄰人曰吾冨可待矣假空名以求實者亦如執遺契以求富也人有枯梧樹者其鄰父言枯梧之樹不祥其鄰人遽而伐之言之雖公而失厝言之所也鄰人父因請以為薪又踐可疑之塗其人乃不恱曰鄰人之父徒欲為薪而教吾伐之也在可疑之地物所不信也與我鄰此其險豈可哉人有亡鈇者意其鄰之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而抇其谷而得其鈇抇音掘他日復見其鄰人之子動作態度無似竊鈇者意所偏惑則隨志念而轉易及其甚者則白黑等色方貟共形豈外物之變故語有之曰萬事紛錯皆從意生白公勝慮亂慮猶度也謀度作亂罷朝而立倒杖䇿錣上貫頥錣杖末鋒血流至地而弗知也鄭人聞之曰頭之忘將何不忘哉意之所屬箸其行足躓株塪頭抵植木而不自知也昔齊人有欲金者清旦衣冠而之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金嗜欲之亂人心如此之甚也故古人有言察秋毫之末者不見太山之形調五音之和者不聞雷霆之聲夫意萬物所係速著萬物者雖形聲之大而有遺矣況心乘於理檢情攝念泊然凝定者豈萬物動之所能亂者乎沖虛至德真經卷第八
