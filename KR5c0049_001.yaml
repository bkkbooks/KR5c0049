body:
  text: 列子張湛處度注天瑞第一夫巨細舛錯脩短殊性雖天地之大羣品之衆渉於有生之分關於動用之域者存亡變化自然之符夫唯寂然至虚疑一而不變者非隂陽之所終始四時之所遷革子列子載子於姓上者首章或是弟子之所記故也居鄭圃鄭有圃田四十年人无識者非形不與物接言不與物交不知其德之至則同於不識者矣國君卿大夫眎之猶衆庶也非自隔於物直言无是非行无軌迹則物莫能知也國不足年饑將嫁於衞自家而出謂之嫁弟子曰先生往无反期弟子敢有所謁先生將何以敎先生不聞壷丘子林之言乎壷丘子林列子之師子列子曰壷子何言哉四時行百物生豈假於言哉雖然夫子嘗語伯昏瞀人吾側聞之試以告女伯昏列子之友同學於壷子不言自受敎於壷子者列子之謙者也其言曰有生今塊然之也不生生物而不自生者也有化今存三變政也不化化物而不自化者也不生者能生生不生者固生物之宗不化者能化化不化者固化物之主生者不能不生化者不能不化生者非能生而生化者非能化而化也直自不得不生不得不化者也故常生常化渉於有動之分者不得蹔無也常生常化者无時不生无時不化生化相因存亡復往理无閒也隂陽爾四時爾隂陽四時節變化之物而復屬於有生之域者皆隨此陶運四時而不停萬物化而不息者也不生者疑獨不生之主豈可實而驗哉疑其冥一而无始終也不化者徃復其際不可終代謝无閒形氣轉續其道不終疑獨其道不可窮亦何以知其窮與不窮哉直自疑其獨立而不改周行而不殆也黃帝書曰谷神不死古有此書今巳不存夫谷虚而宅有亦如莊子之稱環中至虚无物故謂谷神本自无生故曰不死是謂牝老子有此一章王弼注曰无形无影无逆无違處卑不動守靜不衰谷以之成而不見其形此至物也處卑而不可得名故謂之牝牝之門是謂天地之根綿綿存用之不勤王弼曰門牝之所由也本其所由與太極同體故謂天地之根也欲言存邪不見其欲言亡邪萬物以生故曰綿綿存无物不成而不勞也故曰不勤故生物者不生化物者不化莊子亦有此言向秀注曰吾之生也非吾之所生則生自生耳生生者豈有物哉故不生也吾之化也非物之所化則化自化耳化化者豈有物哉无物也故不化焉使生物者亦生化物者亦化則與物俱化亦奚異於物明夫不生不化者然後能爲生化之本也自生自化自形自色自智自力自消自息皆自爾耳豈有尸而爲之者哉謂之生化形色智力消息者非也有心於生化形色則豈能官天地而府萬物瞻羣生而不遺乎子列子曰昔者聖人因隂陽以統天地天地者舉而言隂陽者明其度數統理夫有形者生於无形謂之生者則不无无者則不生故有无之不相生理旣然矣則有何由而生忽爾而自生忽爾而自生而不知其所以生不知所以生生則本同於无本同於无而非无也此明有形之自形无形以相形者也則天地安從生天地无所從生而自然生故曰有太易有太初有太始有太素此明物之自㣲至著變化之相因襲也太易者未見氣也易者不窮滯之稱凝寂於太虚之域將何所見即如易繫之太極老氏之渾成也太初者氣之始也隂陽未判即下句所謂渾淪也太始者形之始也隂陽旣判則品物流形也太素者質之始也質性也旣爲物矣則方貟剛柔靜躁沈浮各有其性氣形質具而未相離此直論氣形質不復說太易太易爲三者宗本於後句别自明之也故曰渾淪渾淪者言萬物相渾淪而未相離也雖渾然一氣不相離散而三才之道實濳兆乎其中淪語之助也視之不見聽之不聞循之不得故曰易也易无形不知此下一字老子曰視之不見名曰希而此曰易易亦希簡之别稱也太易之義如此而巳故能爲萬化宗主㝠一而不變者也易變而爲一所謂易者窈冥惚恍不可變也一氣侍之而化故名變耳一變而爲七七變而爲九九變者究也究窮也一變而爲七九不以次數者全舉陽數領其都㑹乃復變而爲二者形變之始也旣涉於有形之域理數相推自一之九九數旣終乃復反而爲一反而爲一歸於形變之始此蓋明變化往復无窮極淸輕者上爲天濁重者下爲地天地何邪直虚實清濁之自分判者耳此一章全是周易乾鑿度也沖和氣者爲人故天地含精萬物化生推此言之則隂陽氣偏交㑹而氣和氣和而爲人生人生則有所而立也子列子曰天地无全功聖人无全能萬物无全用全猶備也故天職生覆地職形載聖職敎化物職所冝職王也生各有性性各有所冝者也然則天有所短地有所長聖有所否物有所通大體適於一方者造餘塗則閡矣王弼曰形必有所分聲必有所屬温也則不能凉宫也則不能商何則生覆者不能形載形載者不能敎化敎化者不能違所冝順之則通也冝定者不出所也皆有素分不可逆也故天地之道非隂則陽聖人之敎非仁則義萬物之冝非柔則剛此皆隨所冝而不能出所位者也方貟靜躁理不得兼然尋即事則名分不可相干任理之通方貟未必相乖故二儀之德聖人之道燾育羣生澤周萬物盡其清寜貞粹而巳則殊塗融通動靜澄一蓋由聖人不逆萬物之性萬物不犯聖人之化凡滯於一方者形分之所閡耳道之所運常冥通而无待故有生者有生生者有形者有形形者有聲者有聲聲者有色者有色色者有味者有味味者形聲色味皆忽爾而生不能自生者也夫不能自生則无爲之本无爲之本則无當於一象无係於一味故能爲形氣之主動必由之者也生之所生者死矣而生生者未甞終之所形者實矣而形者未甞有聲之所聲者聞矣而聲聲者未嘗發色之所色者彰矣而色色者未嘗顯味之所味者嘗矣而味味者未嘗呈夫盡於一者皆隨代謝而遷革矣故生者必終而生生物者无變化也皆无爲之職也至无者故能爲萬變之宗主也能隂能陽能柔能剛能短能長能貟能方能生能死能暑能涼能浮能沈能宫能商能出能没能玄能黃能甘能苦能羶能香无知也无能也而无不知也而无不能也知盡則无知能極則无能故无所不知无所不能何晏道論曰有之爲有恃无以生事而爲事由无以成夫道之而无語名之而无名視之而无聽之而无聲則道之全焉故能昭音嚮而出氣物包形神而章光影以之黒素以之白矩以之方規以之貟貟方得形而此无形白黒得名而此无名也子列子適衛食於道從者見百歳髑髏攓蓬而指攓拔出顧謂弟子百豐曰唯予與彼知而未甞生未甞死也俱涉變化之則予生而彼死推之至極之域則理旣无生亦又无死也此過養乎此過歡乎遭形則不能不養遇生則不能不歡此過誤之徒非理之實當也種有幾先問變化種數凡有幾條然後明之於下䵷爲鶉事見墨子得水爲㡭得水土之際則爲䵷蠙之衣衣猶覆蓋生於陵屯陵屯髙潔處也則爲陵舄此隨所生之處而變者也陵舄得鬱栖則爲烏足此合而相生也烏足之根爲蠐螬其葉爲胡蝶根本也葉散也言烏足爲蠐螬之本其未散化爲胡蝶也胡蝶胥也胥皆也言物皆化也化而爲蟲生竈下其狀脫其名曰鴝掇此一形之內變異者也鴝掇千日干日而死化而爲鳥其名曰乾徐骨乾餘骨之沬爲斯彌沬猶精華生起斯彌爲食醯頥輅食醯頥輅生乎食醯黃軦食醯黃軦生乎九猷九猷生乎瞀芮瞀芮生乎腐蠸此皆死而更生之一形者也羊肝化爲地皐馬血之爲轉鄰也人血之爲野火也此皆一形之內自變化也鷂之爲鸇鸇之爲布榖布榖久復爲鷂也鷰之爲蛤也田䑕之爲鶉也朽之爲魚也老韭之爲莧也老羭之爲猨也羭牡羊也魚之爲蟲此皆无所困感自然而變者也亶爰之獸自孕而生曰類亶音蟬山海經云亶爰之山有獸其狀如狸而有髮其名曰自爲牝牡相生也河澤之鳥視而生曰鶂此相視而生者也莊子曰白鶂相視眸子不運而風化之也純雌其名大純雄其名稺蜂大鼈之也穉小也此无雌雄而自化上言蟲獸之理旣然下明人道亦有如此者也思士不妻而感思女不夫而孕大荒經曰有思幽之國思士不妻思女不夫精氣潜感不假交接而生子也此亦曰鶂之類也后稷生乎巨跡傳記云高辛氏之妃名姜原見大人跡好而履之如有人理感巳者遂孕因生后稷長而賢乃爲堯佐即周祖也伊尹生乎空桑傳記曰伊尹母居伊水之上旣孕夢有神告之曰臼水出而東走无顧明日視曰出木告其鄰東走十里而顧其邑盡爲水身因化爲空桑有華氏女子採桑得嬰皃于空桑之中故命之日伊尹而獻其君令庖人養之長而賢爲殷湯相厥昭生乎濕此因蒸潤而生醯雞生乎酒此因酸氣而生羊奚比乎不筍此異而相親比也久竹生青寧因於林藪而生靑寧生程自從㡭至於程皆生生之物虵鳥蟲獸之屬言其變化无常或以形而變或死而更生終始相因无窮巳也程生馬馬生人人久入於機萬物皆出於機皆入於機夫生死變化胡可測哉生於此者或死於彼死於彼者或生於此而形生之生未嘗暫无是以聖人知生不常存死不永滅一氣之變所適萬形萬形萬化而不化者存歸於不化故謂之機機者羣有之始動之所宗故出无入有散有反无靡不由之也黃帝書曰形動不生形而生影聲動不生聲而生響夫有形必有影有聲必有響此自然而並生俱出而俱沒豈有相資前後之差哉郭象注莊子論之詳矣而丗之談者以形動而影隨聲出而響應聖人則之以爲喻明物動則失本靜則歸根不復曲通影響之義也无動不生无而生有有之爲有恃无以生言生必由无而无不生有此運通之功必輟於无故生動之稱因事而立耳形必終者也天地終乎與我偕終料巨細計脩短則與我殊矣㑹歸於終理固无差也終進乎不知也進當爲盡此書盡字例多作進也聚則成形散則爲終此丗之所謂終始也然則聚者以形實爲始以離散爲終散者以虚漠爲始以實爲終故迭相與爲終始而理實无終无始者也道終乎本无始進乎本不久久當爲有无始故不終无有故不盡有生則復於不生有形則復於无形生者反終形者反虚自然之數也不生者此不生者先有其生然後之於死滅非本不生者也本不生者自无生无滅无形者此无刑亦先有其形然後之於離散非本无形者也本无形者初自无聚无散者也夫生生物者不生形形物者无刑故能生形萬物於我體无變今謂旣生旣形而復反於无生无形者此故存亡之徃復爾非始終之不變者也生者理之必終者也終者不得不終亦如生者之不得不生生者不生而自生故雖生而不知所以生不知所以生則生不可絶不知所以死則死不可禦也而欲其生盡其終惑於數也盡亡也精神者天之分骨骸者地之分屬天淸而散屬地濁而聚精神離形各歸其眞天分歸天地分歸地各反其夲故謂之歸也歸其眞宅眞宅太虚之域黃帝曰精神入其門骨骸反其根我尚何存何生之无形何形之无氣何氣之无靈然則心智形骸隂陽之一體偏積之一氣及其離形歸根則反其眞宅而我无物焉人自生至終大化有四其閒遷易无時蹔停四者蓋舉大較而言者也嬰孩也少壯也老耄也死亡也其在嬰孩氣專志一和之至也物不傷焉德莫加焉老子曰含德之厚此於赤子其在少壯則血氣飄溢欲慮充起物所攻焉德故衰焉處力競之地物切不與也其在老耄則欲慮柔焉禮將休焉物莫先焉休息也巳无競心則物不與爭雖未及嬰孩之全方於少壯閒矣其在死亡也則之於息焉反其極矣孔子遊於太山見榮啓期行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以樂何也對曰吾樂甚多天生萬物唯人爲貴而吾得爲人是一樂也推此而言明人之神氣與衆生不殊所適者異故形貌不一是以榮啓期深測伏之縁洞識幽顯之驗故忻遇人形兼得男貴豈孟浪而言男女之别男尊女卑故以男爲貴吾旣得爲男矣是二樂也人之將生男女亦无定分故復喜得男身人生有不見日月不免襁褓者吾旣巳行年九十矣是三樂也貧者士之常也死者人之終也處常得終當何憂哉孔子曰善乎能自寛者也不能都忘樂善其能摇理自寛慰者耳林年且百歳書傳无聞蓋古之隱者也底春被裘㡳當拾遺穗於故畦收刈後田中棄榖捃之也並歌並進孔子適衛望之於野顧謂弟子曰彼叟可與言者試往訊之子貢請行逆之壠端面之而歎曰先生曽不悔平而行歌拾穗林行不留歌不輟子貢叩之不巳乃仰而應曰吾何悔邪子貢曰先生少不勤行長不競時老無妻子死期將至亦有何樂而拾穗行歌乎林曰吾之所以爲樂人皆有之而反以爲憂我所以爲樂者人人皆同伹未能觸事而夷故无蹔歡少不勤行長不競時故能壽此不勤行則無名譽不競時則無利欲二者不存於胷中則百年之夀不祈而自獲也老无妻子死期將至故能樂此所謂樂天知命故云憂也子貢曰壽者人之情死者人之惡子以死爲樂何也林曰死之與生一往一反故死於是者安知不生於彼故吾知其不相矣吾又安知營營而求生非惑乎亦又安知吾今之死不愈昔之生乎尋此旨則存亡往復无窮已也子貢聞之不喻其意還以告夫子夫子曰吾知其可與言果然然彼得之而不盡者也卒然聞林之言盛以爲巳造極矣而夫子方謂未盡夫盡者无所不盡亦无所盡然後盡理都全耳今方對无於有去彼取此則不得不覺内外之異然所不盡者亦少許處耳若夫萬變一彼我兩忘即理自夷而實无所遣夫内逆外同於人羣者豈有盡與不盡者乎子貢倦於學告仲尼曰願有所息學者所以木復其乃至於猒倦則自然之理虧矣仲尼曰生无所息勞知慮役支體此生者之事莊子曰生爲徭役子貢曰然則賜息无所乎仲尼曰有焉耳望其壙睪如也宰如也墳如也鬲如也則知所息矣見其墳壤鬲翼開知息七有所莊子曰死爲休息也子貢曰大哉死乎君子息焉小人伏焉樂天知命秦然以待終君子之所以息去離憂昧然而死小人之所以伏也仲尼曰賜汝知之矣人胥知生之樂未知生之苦知老之憊未知老之佚知死之惡未知死之息也莊子日大塊載我以形勞我以生佚我以老息我以死耳晏子曰善哉古之有死也生死古今所同而蜀善古之无者明古人不樂生而惡死也仁者息焉不仁者伏焉脩身愼行懷兢懼此仁者之所憂貪欲從肆當无厭足此不仁者之所苦唯死而後休息伏之死也者德之徼也德者得也徼者歸也言各得其所歸古者謂死人爲歸人夫言死人爲歸人則生人爲行人矣行而不知歸失家者也一人失家一丗非之天下失家莫知非焉此衆寡相傾者也晏子儒墨爲家重形生者不辨有此言假記所稱耳有人去鄉土離六親廢家業遊於四方而不歸者何人哉丗必謂之爲狂蕩之人矣又有人鍾賢丗鍾賢丗冝言重形生矜巧能脩名譽誇張於丗而不知巳者亦何人哉丗必以爲智謀之士此二者胥失者也此二者雖行事小異而並不免於溺喪也而丗與一不與一唯聖人知所與知所去以生死爲窹者與之溺喪忘歸者去之或謂子列子曰子奚貴虚列子曰虚者无貴也凡貴名之所以生必謂去彼而取此是我而非物今有無兩忘萬異冥一故謂之虚虚旣虚矣貴賤之名將何所生子列子曰非其名也事有實著非假名而後得也莫如靜莫如虚靜也虚也得其居矣取也與也失其所矣夫虚靜之理非心慮之表形骸之外求而得之即我之性内安諸已則自然眞全矣故物以全者皆由虚靜故得其所安所以敗者皆由動求故失其所處事之破䃣而後有舞仁義者弗能復也當爲之於未有冶之於未亂乃至虧喪凋殘方欲鼓舞仁義以求反性命之極者未之得也䃣音毁粥熊曰運轉亡巳天地密移疇覺之哉此則莊子舟壑之義孔子曰日夜无丘以是徂夫萬物與化爲體體隨化而遷化不蹔停物豈守故故向之形生非今形生俯仰之閒巳渉萬變氣散朽非一旦頓至而昧者操必化之器託不停之運自謂變化可逃不亦悲乎故物損於彼者盈於此成於此者虧於彼所謂川竭谷虚丘夷淵實也損盈成虧隨丗隨死此丗亦冝言生往來相接閒不可省疇覺之哉成者方自謂成而巳虧矣生者方自謂生濟巳死矣凡一氣不頓進一形不頓虧亦不覺其成不覺其虧皆在冥中而濳化固非耳目所瞻察亦如人自丗音生至老貌色智態亡日不異皮膚爪髮隨丗隨落非嬰孩時有停而不易也形色髪膚有之麤者新故相換猶不可識汎妙於此者乎閒不可覺俟至後知國有人憂天地崩墜身亡所廢寢食者又有憂彼之所憂者因往曉之彼之所憂者惑矣而復以不惑憂彼之所惑不憂彼之所憂喻積惑彌深何能相喻也曰天積氣耳亡處亡氣屈伸呼吸終日在天中行止奈何憂崩墜乎夫天之蒼蒼非人黙之質則所謂天者豈阻逺而无所極邪自地而上則皆天矣故俯仰喘息末始之天也其人曰天果積氣日月星宿不當墜邪曉之者曰日月星宿亦積氣中之有光耀者氣亦何所不勝雖天地之大猶自安於太虛之域況乃氣氣相舉者也只使墜亦不能有所中傷其人曰奈地壞何曉者曰地積塊耳充塞四虚亡處亡塊躇歩跐蹈終日在地上行止奈何憂其壞其人舍然大喜舎冝作釋此書釋字作舎曉之者亦舎然大喜此二人一以必破爲憂一以必全爲喜此未知所以爲憂喜也而互相慰喻使目解釋固未免於大惑也長廬子聞而之曰虹蜺也雲霧也風雨也四時也此積氣之成乎天者也山岳也河海也金石也火木也此積形之成乎地者也知積氣也知積塊也奚謂不壞夫混然未判則天地一氣萬物一形分而爲天地散而爲萬物此盖離合之殊異形氣之虚實夫天地空中之一細物有中之最巨者難終難窮此固然矣難測難識此固然矣憂其壞者誠爲大逺言其不壞者亦爲未是天地不得不壞則㑹歸於壞遇其壞時奚爲不憂哉此知有始之必終有形之必敗而不識休戚與隂陽降器質與天地顯没也子列子聞而曰言天地壞者亦謬言天地不壞者亦謬壞與不壞吾所不能知也雖然彼一也此一也彼一謂不壞者也此一謂壞者也其不壞則與人偕全其壞也則與人偕亡何爲欣戚於其閒哉故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉生之不知死猶死之不知生故當其成也莫知其毀及其毀也亦何知其成此去來之見驗成敗之明徴而我皆即之情无彼此何處容其心乎舜問乎烝曰道可得而有乎舜欲明羣有皆同於无故舉道以爲發問之端曰汝身非汝有也汝何得有夫道郭象曰夫身者非汝所能有也塊然而自有耳有非所有而況无哉舜曰吾身非吾有孰有之哉據有此身故重發問曰是天地之委形也是一氣之偏積者也生非汝有是天地之委和也積和故成生耳性命非汝有是天地之委順也積順故有存亡耳郭象曰身是汝有則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成非汝之有也孫子非汝有是天地之委蛻也氣自委結而蟬蛻耳是汝有則男女炙少亦當由汝也故行不知所往處不知所持食不知所以皆在自爾中來非知而爲之也天地強陽氣也又胡可得而有邪天地即復姿結中之最大者也今行處食息皆彊陽氣之所運動豈識其所以然彊陽猶剛實也非剛實理之至反之虗和之極則无形无生不死不終則性命何所委順子孫何所委蛻行處何所止泊飲食何所因假也齊之國氏大冨宋之向氏大貧自宋之齊請其術國氏告之曰吾善爲盗始吾爲盗也一年而給二年而足三年大壤自此以往施及州閭向氏大喜喻其爲盗之言而不喻其爲盗之道遂踰垣鑿室手目所及亡不探也未及時以贓獲罪没其先居之財向氏以國氏之謬已也往而怨之國氏曰若爲盗若何向氏言其狀國氏曰嘻若失爲盗之道至此乎今將告若矣吾聞天有時地有利謂春秋冬夏凡土出有也吾盗天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舎陸盗禽獸水盗魚鼈亡非盗也夫禾稼土木禽獸魚鼈皆天之所生豈吾之所有天尚不能自生豈能生物人尚不能自有豈能有物此乃明其自生自有者也然吾盗天而亡殃天亡其旌我公其心何往而有恐哉夫金王珍寶榖帛財貨人之所聚豈天之所與天尚不能與豈人所能聚此亦明其自能自聚若盗之而獲罪孰怨哉人有其財我犯其秘所以致盗向氏大或以爲國氏之重罔巳也遇東郭先生問焉東郭先生曰若一身庸非盗乎盗隂陽之和以成生載若形況外物而非盗哉若其有盗邪則我身即天地之一物不得私而有之若其无盗邪則外内不得異也誠然天地萬物不相離也仞而有之皆惑也夫天地萬物之都稱萬物天地之别名雖復各私其身理不相離仞而有之心之惑也因此而言夫天地委形非我有也飭愛色皃矜伐智能巳爲惑矣至於甚者構仞外物以爲巳有乃標名氏以自異倚親族以自固整章服以耀物籍名位以動衆封殖財貨樹立權黨終身欣玩莫由自悟故老子日吾所以有大患爲吾有身莊子日百骸六藏吾誰與爲親頷斯旨也則方寸與太虚齊空形骸與萬物俱有也國氏之盗公道也故亡殃若之盗私心也故得罪公者對私之名无私則公名滅矣今以犯天者爲公犯人者爲私於理未至有公私者亦盗也直所犯之異耳未爲非盗亡公私者亦盗也一身不得不有財物不得不聚復欲遣之非能即而无心者也公公私私天地之德生即天地之一理身即天地之一物今所愛吝復是愛吝天地之閒生身耳事无公私理无愛吝者也知天地之德者孰爲盗邪孰爲不盗邪天地之德何邪自然而巳自然而巳何所歷其公私之名公私之名既廢盗與不盗理无差也列子沖虚至德眞經卷第一
