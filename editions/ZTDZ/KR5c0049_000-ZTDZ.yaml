front:
  text: 列子慕七列子姓列名禦寇鄭人也居鄭圃四十年人無識者初事壺丘子後師老商氏友伯高子進二子之道九年而後能御風而行弟子嚴恢問曰所爲問道者爲富乎列子曰桀紂唯輕道而重利是以亡其書凡八篇列子蓋有道之士而莊子亟稱之今汴梁鄭州圃田列子觀即其故隱唐封冲虚至德眞人書爲冲虚至德眞經沖虚至德眞經卷上
