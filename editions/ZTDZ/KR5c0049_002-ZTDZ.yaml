body:
  text: 力命第六力謂命曰若之功奚若我哉命曰汝奚功於物而欲比朕力曰壽夭窮達貴賤貧富我力之所能也命曰彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽四八仲尼之德不出諸侯之下而困於陣蔡殷紂之行不出三仁之上而居君位季札無爵於吴田恒專有齊國夷齊餓于首陽季氏富於展禽若是汝力之所能奈何壽彼而夭此窮聖而達逆賤賢而貴愚貧善而富惡邪力曰若如是言我固無功於物而物若此耶此則若之所制邪命曰既謂之命奈何有制之者邪朕直而推之曲而任之自壽自夭逢窮自達自貴自賤自富自貧朕豈能識之哉朕豈能識之哉北宫子謂西門子曰朕與子並世也而人子達並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則短褐食則粢糲居則蓬室出則徒行子衣則文錦食則粱肉居則連欐山宜切出則結駟在家熙然有棄朕之心在朝諤然有敖朕之色請謁不相及遨遊不同行固有年矣子自以德過朕邪西門子曰予無以知其實汝造事而窮予造事而達此厚薄之驗歟而皆謂與予並汝之顔厚矣北宫子無以應自失而歸中塗遇東郭先生先生曰汝奚往而反偊偊而步有深愧之色邪北宫子言其狀東郭先生曰吾將舍汝之愧與汝更之西門氏而問之曰汝奚辱北宫子之深乎固且言之西門子曰北宫子言世族年貌言行與予並而賤貴貧富與予異予語之曰予無以知其實汝造事而窮予造事而達此將厚薄之驗歟而皆謂與予並汝之顔厚矣東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宫子厚於德薄於命汝厚於命薄於德汝之達非智得也北宫子之窮非愚失也皆天也非人也而汝以命厚自矜北宫子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣予不敢復言北宫子既歸衣其短褐有狐貉之温進其茙菽有稻粱之味庇其蓬室若廣厦之蔭乘其蓽輅若文軒之飾終身逌然不知榮辱之在彼在我也東郭先生聞之曰北宫子之寐久矣一言而能寤易悟也哉管夷吾鮑叔牙二人相友甚戚同處於齊管夷吾事公子糾鮑叔牙事公子小白齊公族多寵嫡庶並行國人懼亂管仲與召忽奉公子糾奔魯鮑叔奉公子小白奔莒既而公孫無知作亂齊無君二公子爭入管夷吾與小白戰於莒道射中小白既立脅魯殺子糾召忽死之管夷吾被囚鮑叔牙謂桓公曰管夷吾能可以治國桓公曰我讎也願殺之鮑叔牙曰吾聞賢君無私怨且人能爲其主亦必能爲人君如欲霸王非夷吾其弗可君必舍之遂召管仲魯歸之齊鮑叔牙郊迎釋其囚桓公禮之而位於高國之上鮑叔牙以身下之任以國政號曰仲父桓公遂霸管仲嘗歎曰吾少窮困時嘗與鮑叔牙賈分財多自與鮑叔不以我爲貪知我貧也吾嘗爲鮑叔謀事而大窮困鮑叔不以我爲愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我爲不肖知我不遭時也吾嘗三戰三北鮑叔不以我爲怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我爲無恥知我不羞小節而恥名不顯於天下也生我者父母知我者鮑叔也此世稱管鮑善交者小白善用能者然實無善交實無用能也實無善交實無用能者非更有善交更有善用能也召忽非能死不得不死鮑叔非能舉賢不得不舉小白非能用讎不得不用及管夷吾有病小白問之曰仲父之病病矣可不諱云至於大病則寡人惡乎屬國而可夷吾曰公誰欲歟小白曰鮑叔牙可曰不可其爲人潔廉善士也其於不已若者不比之人一聞人之過終身不忘使之埋國上且鈎乎君下且逆乎民其得罪於君也將弗乆矣小白曰然則孰可對曰勿已則隰朋可其爲人也上忘而下不叛愧其不若黄帝而哀不已若者以德分人謂之聖人以財分人謂之賢人以賢臨人未有得人者也以賢下人者未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可然則管夷吾非薄鮑叔也不得不薄非厚隰朋也不得不厚厚之於始或薄之於終或厚之於始厚薄之去來弗由我也鄧析操兩可之說設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之然則子産非能用竹刑不得不用鄧析非能屈子産不得不屈子産非能誅鄧析不得不誅也可以生而天福也可以死而死天福也可以生而不生天罰也可以死而不死天罰也可以生可以死得生得死有矣不可以生不可以死或死或生有矣然而生生死死非物非我皆命也智之所無奈何故曰窈然無際天道自會漠然無分天道自運天地不能犯聖智不能干鬼魅不能欺自然者默之成之平之寧之將之迎之楊朱之友曰季梁季梁得疾七日大漸其子環而泣之請醫季梁謂楊朱曰吾子不肖如此之甚汝奚不爲我歌以曉之楊朱歌曰天其弗識人胡能覺匪祐自天弗孽由人我乎汝乎其弗知乎醫乎巫乎其知之乎其子弗曉終謁三醫一曰矯氏二曰俞氏三曰廬氏診其所疾矯氏謂季梁曰汝寒温不節虚實失度病由飢飽色慾精慮煩散非天非鬼雖漸可攻也季梁曰衆醫也亟屛之俞氏曰女始則胎氣不足乳湩有餘病非一朝一夕之故其所由來漸矣弗可已也季梁曰良醫也且食之廬氏曰汝疾不由天亦不由人亦不由鬼禀生受形既有制之者矣亦有知之者矣藥石其如汝何季梁曰神醫也重貺遺之俄而季梁之疾自瘳生非貴之所能存身非愛之所能厚生亦非賤之所能夭身亦非輕之所能薄故貴之或不生賤之或不死愛之或不厚輕之或不薄此似反也非反也此自生自死自厚自薄或貴之而生或賤之而死或愛之而厚或輕之而薄此似順也非順也此亦自生自死自厚自薄鬻熊語文王曰自長非所增自短非所損算之所亡若何老聃語關尹曰天之所惡孰知其故言迎天意揣利害不如其已楊布問曰有人於此年兄弟也才兄弟也貌兄弟也而壽夭父子也貴賤父子也名譽父子也愛憎父子也吾惑之楊子曰古之人有言吾嘗識之將以告若不知所以然而然命也今昏昏昧昧紛紛若若隨所爲隨所不爲日去曰來孰能知其故皆命也夫信命者亡壽夭信理者亡是非信心者亡逆順信性者亡安危則謂之都亡所信都亡所不信眞矣慤矣奚去奚就奚哀奚樂奚爲奚不爲黄帝之書云至人居若死動若械亦不知所以居亦不知所以不居亦不知所以動亦不知所以不動亦不以衆人之觀易其情貎亦不謂衆人之不觀不易其情貌獨往獨來獨出獨入孰能礙之墨音眉杘敕夷女履二切單音戰至音咥嘽豈然切咺許元火遠二切憋蒲結切懯芳無切四人相與游於世胥如志也窮年不相知情自以智之深也巧佞愚直婩魚踐午漢二切斫夫約切便辟四人相與游於世胥如志也窮年而不相語術自以巧之微也㺒何交切㤉午交魚駕二切情露讓許偃居辰二切極凌誶四人相與游於世胥如志也窮年不相曉悟自以爲才之得也眠莫典切娗徒典切諈主蘂切諉勇敢怯疑四人相與游於世胥如志也窮年不相讁發自以行無戾也多偶自專乘權隻立四人相與游於世胥如志也窮年不相顧眄自以時之適也此衆態也其貌不一而咸之於道命所歸也佹佹俱爲切成者俏仙妙切成也初非成也佹佹敗者俏敗者也初非敗也故迷生於俏俏之際昧然於俏而不昧然則不駭外禍不喜内福隨時動隨時止智不能知也信命者於彼我無二心於彼我而有二心者不若揜目塞耳背坂面隍亦不墜仆也故曰死生自命也貧窮自時也怨夭折者不知命者也怨貧窮者不知時者也當死不懼在窮不威知命安時也其使多智之人量利害料虚實度人情得亦中亡亦中其少智之人不量利害不料虚實不度人情得亦中亡亦中量與不量料與不料度與不度奚以異唯亡所量亡所不量則全而亡喪亦非知全亦非知喪自全也自亡也自喪也齊景公游於牛山北臨其國城而流涕曰美哉國乎鬱鬱芊芊若何滴滴去此國而死乎使古無死者寡人將去斯而之何史孔梁丘據皆從而泣曰臣賴君之賜跪食惡肉可得而食駑馬稜車可得而乘也且猶不欲死而況吾君乎晏子獨笑於旁公雪涕而顧晏子曰寡人今日之游悲孔與據皆從寡人而泣子之獨笑何也晏子對曰使賢者常守之則太公桓公將常守之矣使有勇者而常守之則莊公靈公將常守之矣數君者將守之吾君方將披簑笠而立乎畎畝之中唯事之恤行假念死乎則吾君又安得此位而立焉以其迭處之迭去之至於君也而獨爲之流涕是不仁也見不仁之君見謟諛之臣臣見此二者臣之所爲獨竊笑也景公慙焉舉觴自罰罰二臣者各二觴焉魏人有東門吴者其子死而不憂其相室曰公之愛子天下無有今子死不憂何也東門吴曰吾常無子無子之時不憂今子死乃與嚮無子同詎奚憂焉農赴時商趣利工追術仕逐勢勢使然也然農有水旱商有得失工有成敗仕有遇否命使然也楊朱第七楊朱游於魯舍於孟氏孟氏問曰人而已矣奚以名爲曰以名者爲富既富矣奚不已焉曰爲貴既貴矣奚不已焉曰爲死既死矣奚爲焉曰爲子孫名奚益於子孫曰名乃苦其身憔其心乘其名者澤及宗族利兼鄉黨况子孫乎凡爲名者必廉廉斯貧爲名者必讓讓斯賤曰管仲之相齊也君淫亦淫君奢亦奢志合言從道行國霸死之後管氏而已田氏之相齊也君盈則己降君歛則己施民皆歸之因有齊國子孫享之至今不絶若實名貧僞名富曰實無名名無實名者僞而已矣昔者堯舜僞以天下讓許由善卷而不失天下享祚百年伯夷叔齊實以孤竹君讓而終亡其國餓死於首陽之山實僞之辨如此其省也楊朱曰百年壽之大齊得百年者千無一焉設有一者孩抱以逮昏老幾居其半矣夜眠之所弭晝覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中道然而自得亡介焉之慮者亦亡一時之中爾則人之生也奚爲哉奚樂哉爲美厚爾爲聲色爾而美厚復不可常厭足聲色不可常翫聞乃復爲刑賞之所禁勸名法之所進退遑遑爾競一時之虚譽規死後之餘榮偊偊王矩切爾慎耳目之觀聽惜身意之是非徒失當年之至樂不能自肆於一時重囚纍梏何以异音異哉太古之人知生之暫來知死之暫往故從心而動不違自然所好當身之娱非所去也故不爲名所勸從性而游不逆萬物所好死後之名非所取也故不爲刑所及名譽先後年命多少非所量也楊朱曰萬物所異者生也所同者死也生則有賢愚貴賤所以異也死則有臭腐消滅是所同也雖然賢愚貴賤非所能也臭腐消滅亦非所能也故生非所生死非所死賢非所賢愚非所愚貴非所貴賤非所賤然而萬物齊生齊死齊賢齊愚齊貴齊賤十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則腐骨生則桀紂死則腐骨一矣孰知其異且趣當生奚遑死後楊朱曰伯夷非亡欲矜清之卸以放餓死展季非亡情矜貞之卸以放寡宗清貞之誤善之在此楊朱曰原憲窶於魯子貢殖於衛原憲之窶損生子貢之殖累身然則窶亦不可殖亦不可其可焉在曰可在樂生可在逸身故善樂生者不窶善逸身者不殖楊朱曰古語有之生相憐死相捐此語至矣相憐之道非唯情也勤能使逸餓能使飽寒能使温窮能使達也相捐之道非不相哀也不含珠玉不服文錦不陳犧牲不設明器也晏平仲問養生於管夷吾管夷吾曰肆之而已勿壅勿閼晏平仲曰其目奈何夷吾曰恣耳之所欲聽恣目之所欲視恣鼻之所欲向恣口之所欲言恣體之所欲安恣意之所欲行夫耳之所欲聞者音聲而不得聽謂之閼聰目之所欲見者美色而不得視謂之閼明鼻之所欲向者椒蘭而不得嗅謂之閼顫口之所欲道者是非而不得言謂之閼智體之所安者美厚而不得從謂之閼適意之所欲爲者放逸而不得行謂之閼性凡此諸閼廢虐之主去廢虐之主熙熙然以俟死一日一月一年十年吾所謂養枸此廢虐之主録而不舍戚戚然以至乆生百年千年萬年非吾所謂養管夷吾曰吾既告子養生矣送死奈何晏平仲曰送死略矣將何以告焉管夷吾曰吾固欲聞之平仲曰既死豈在我哉焚之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可衮衣繡裳而納諸石椁亦可唯所遇焉管夷吾顧謂鮑叔黄子曰生死之道吾二人進之矣子産相鄭專國之政三年善者服其化惡者畏其禁鄭國以治諸侯憚之而有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒千鍾積麴成封望門百步醴漿之氣逆於人鼻方其荒於酒也不知世道之安危人理之悔吝室内之有亡九族之親疏存亡之哀樂也雖水火兵刃交於前弗知也穆之後庭比房數十皆擇雉齒婑儒隹切媠吐火切者以盈之方其耽於色也屛親眤絶交遊逃於後庭以晝足夜三月一出意猶未愜鄉有處子之娥姣者必賄而招之媒而挑之弗獲而後已子産日夜以爲戚密造鄧析而謀之曰僑聞治身以及家治家以及國此言自於近至於遠也僑爲國則治矣而家則亂矣其道逆邪將奚方以救二子子其詔之鄧析曰吾怪之乆矣未敢先言子奚不時其治也喻以性命之重誘以禮義之尊乎子産用鄧析之言因間以謁其兄弟而告之曰人之所以貴於禽獸者智慮智慮之所將者禮義禮義成則名位至矣若觸情而動耽於嗜慾則性命危矣子納僑之言則朝自悔而夕食禄矣朝穆曰吾知之乆矣擇之亦乆矣豈待若言而後識之哉凡生之難遇而死之易及以難遇之生俟易及之死可熟念哉而欲尊禮義以夸人矯情性以招名吾以此爲弗若死也爲欲盡一生之歡窮當年之樂唯患腹溢而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也且若以治國之能夸物欲以說辭亂我之心榮禄喜我之意不亦鄙而可憐哉我又欲與若别之夫善治外者物未必治而身交苦善治内者物未必亂而性交逸以若之治外其法可蹔行於一國未合於人心以我之治内可推之於天下君臣之道息矣吾常欲以此術而喻之若反以彼術而教我哉子産忙然無以應之他日以告鄧析鄧析曰子與眞人居而不知也孰謂子智者乎鄭國之治偶耳非子之功也衛端木叔者子貢之世也藉其先貲家累萬金不治世故放意所好其生民之所欲爲人意之所欲玩者無不爲也無不玩也墻屋臺榭園囿池沼飲食車服聲樂嬪御擬齊楚之君焉至其情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏國非齊土之所産育者無不必致之猶藩墻之物也及其游也雖山川阻險塗逕脩遠無不必之猶人之行咫步也賔客在庭者日百往庖厨之下不絶煙火堂廡之上不絶聲樂奉養之餘先散之宗族宗族之餘次散之邑里邑里之餘乃散之一國行年六十氣幹將衰棄其家事都散其庫藏珍寳車服妾媵一年之中盡焉不爲子孫留財及其病也無藥石之儲及其死也無瘞埋之資一國之人受其施者相與賦而藏之反其子孫之財焉禽骨釐聞之曰端木叔狂人也辱其祖矣段于生聞之曰木叔達人也德過其祖矣其所行也其所爲也衆意所驚而誠理所取衛之君子多以禮教自持固未足以得此人之心也孟孫陽問楊子曰有人於此貴生愛身以蘄不死可乎曰理無不死以蘄乆生可乎曰理無乆生生非貴之所能存身非愛之所能厚且乆生奚爲五情好惡古猶今也四體安危古猶今也世事苦樂古猶今也變易治亂古猶今也既聞之矣既見之矣既更之矣百年猶厭其多況乆生之苦也乎孟孫陽曰若然速亡愈於乆生則踐鋒刃入湯火得所志矣楊子曰不然既生則廢而任之究其所欲以俟於死將死則廢而任之究其所之以放於盡無不廢無不任何遽遲速於其間乎楊朱曰伯成子高不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝爲之乎楊子曰世固非一毛之所濟禽子曰假濟爲之乎楊子弗應禽子出語孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若爲之乎曰爲之孟孫陽曰有斷若一節得一國子爲之乎禽子默然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老聃關尹則子言當矣以吾言問大禹墨翟則吾言當矣孟孫陽因顧與其徒說他事楊朱曰天下之美歸之舜禹周孔天下之惡歸之桀紂然而舜耕於河陽陶於雷澤四體不得蹔安口腹不得美厚父母之所不安弟妹之所不親行年三十不告而娶及受堯之禪年已長智已衰商鈞不才禪位於禹戚戚然以至於死此天人窮毒者也鯀治水土績用不就殛諸羽山禹纂業事讎惟荒土功子産不字過門不入身體偏枯手足胼胝及受舜禪卑宫室美緩冕戚戚然以至於死此天人之憂苦者也武王既終成王幼弱周公攝天子之政召公不悦四國流言居東三年誅兄放弟僅免其身戚戚然以至於死此天人之危懼者也孔子明帝王之道應時君之聘伐樹於宋削迹於衛窮於商周圍於陳蔡受屈於季氏見辱於陽虎戚戚然以至於死此天民之遑遽者也凡彼四聖者生無一日之歡死有萬世之名名者固非實之所取也雖稱之弗知雖賞之不知與株塊無以異矣桀籍累世之資居南面之尊智足以距羣下威足以震海内恣耳目之娱窮意慮之所爲熙熙然以至於死此天民之逸蕩者也紂亦籍累世之資居南面之尊威無不行志無不從肆情於傾宫縱欲於長夜不以禮義自苦熙熙然以至於誅此天民之放縱者也彼二凶也生有從欲之歡死被愚暴之名實者固非名之所與也雖毁之不知雖稱之弗知此與株塊奚以異矣彼四聖雖美之所歸苦以至終同歸於死矣彼二凶雖惡之所歸樂以至終亦同歸於死矣楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能芸而言治天下如運諸掌何也對曰君見其牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣且臣聞之吞舟之魚不游枝流鴻鵠高飛不集汙池何則其極遠也黄鍾大吕不可從煩奏之舞何則其音疏也將治大者不治細成大功者不成小此之謂矣楊朱曰太古之事滅矣孰誌之哉三皇之事若存若亡五帝之事若覺若夢三王之事或隱或顯億不識一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀伏羲已來三十餘萬歲賢愚好醜成敗是非無不消滅但遲速之間爾矜一時之毁譽以焦苦其神形要死後數百年中餘名豈足潤枯骨何生之樂哉楊朱曰人肖天地之類懷五常之性有生之最靈者人也人者爪牙不足以供守衛肌膚不足以自捍禦趨走不足以逃利害無毛羽以禦寒暑必將資物以爲養性任智而不恃力故智之所貴存我爲貴力之所賤侵物爲賤然身非我有也既生不得不全之物非我有也既有不得而去之身固生之主物亦養之主雖全生身不可有其身雖不去物不可有其物有其物有其身是橫私天下之身橫私天下之物其唯聖人乎公天下之身公天下之物其唯至人矣此之謂至至者也楊朱曰生民之不得休息爲四事故一爲壽二爲名三爲位四爲貨有此四者畏鬼畏人畏威畏刑此謂之遁人也可殺可活制命在外不逆命何羨壽不矜貴何羨名不要勢何羨位不貪富何羨貨此謂順民也天下無對制命在内故語有之曰人不婚宧情欲失半人不衣食君臣道息周諺曰田父可坐殺晨出夜入自以性之恒啜菽茹藿自以味之極肌肉麤厚筋節腃驅圓切急一朝處以柔毛綈幕薦以梁肉蘭橘心㾓螢玄切體煩内熱生病矣商魯之君與田父侔地則亦不盈一時而憊矣故野人之所安野人之所美謂天下無過者昔者宋國有田夫常衣緼黂僅以過冬暨春東作自曝於日不知天下之有廣厦隩室綿纊狐狢顧其妻曰負日之暄人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇陟列切於口慘於腹衆哂而怨之其人大慙子此類也楊朱曰豐屋美服厚味姣色有此四者何求於外有此而求外者無厭之性無厭之性陰陽之蠹也忠不足以安君適足以危身義不足以利物適足以害生安上不由於忠而忠名滅焉利物不由於義而義名絶焉君臣兼安物我兼利古之道也鬻子曰去名者無憂老子曰名者實之賔而悠悠者趨名不已名固不可去名固不可賔邪今有名則尊榮亡名則卑辱尊榮則逸樂卑辱則憂苦憂苦犯性者也逸樂順性者也斯實之所係矣名胡可去名胡可賔但惡夫守名而累實守名而累實將恤危亡之不救豈徒逸樂憂苦之間哉說符第八子列子學於壺丘子林壺丘子林曰子知持後則可言持身矣列子曰願聞持後曰顧若影則知之列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈伸任物而不在我此之謂持後而處先關尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也故曰慎爾言將有和之慎爾行將有隨之是故聖人見出以知入觀往以知來此其所以先知之理也度在身稽在人人愛我我必愛之人惡我我必惡之湯武愛天下故王桀紂惡天下故亡此所稽也稽度皆明而不道也譬之出不由門行不從徑也以是求利不亦難乎嘗觀之神農有炎之德稽之虞夏商周之書度諸法士賢人之言所以存亡廢興而非由此道者未之有也嚴恢曰所爲問道者爲富今得珠亦富矣安用道子列子曰桀紂唯重利而輕道是以亡幸哉余未汝語也人而無義唯食而已是鷄狗也彊食靡用勝者爲制是禽獸也爲鷄狗禽獸矣而欲人之尊己不可得也人不尊己則危辱及之矣列子學射中矣請於關尹子尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子尹子曰子知子之所以中乎列子曰知之矣關尹子曰可矣守而勿失也非獨射也爲國與身亦皆如之故聖人不察存亡而察其所以然列子曰色盛者驕力盛者奮未可以語道也故不班白語道失而况行之乎故自奮則人莫之告人莫之告則孤而無輔矣賢者任人故年老而不衰智盡而不亂故治國之難在於知賢而不在自賢宋人有爲其君以玉爲楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧子列子窮容貌有飢色客有言之鄭子陽者曰列禦寇蓋有道之士也居君之國而窮君無乃爲不好士乎鄭子陽即令官遺之粟子列子出見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆使佚樂今有飢色君過而遺先生食先生不受豈不命也哉子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯納之以爲諸公子之傳好兵者之楚以法干楚王王悦之以爲軍正禄富其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘於貧羨施氏之有因從請進趣之方二子以實告孟氏孟氏之一子之秦以術干秦王秦王曰當今諸侯力爭所務兵食而已若用仁義治吾國是滅亡之道遂宫而放之其一子之衛以法干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求安之道若賴兵權滅亡可待矣若全而歸之適於他國爲吾之患不輕矣遂刖之而還諸魯既反孟氏之父子叩胸而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之謬也且天下理無常是事無常非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投隙抵時應事無方屬乎智智苟不足使若博如孔丘術如吕尚焉往而不窮哉孟氏父子舍然無愠容曰吾知之矣子勿重言晋文公出會欲伐衛公子鋤仰天而笑公問何笑曰臣笑鄰之人有送其妻適私家者道見桑婦悦而與言然顧視其妻亦有招之者矣臣竊笑此也公寤其言乃止引師而還未至而有伐其北鄙者矣晋國苦盜有郄乞逆切雍者能視盜之貌察其眉睫之間而得其情晋侯使視盜千百無遺一焉晋侯喜告趙文子曰吾得一人而一國盜爲盡矣奚用多爲文子曰吾君恃伺察而得盜盜不盡矣且郄雍必不得其死焉俄而羣盜謀曰吾所窮者郄雍也遂共盜而殘之晋侯聞而大駭立召文子而告之曰果如子言郄雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之爲於是用隨會知政而羣盜奔秦焉孔子自衛反魯息駕乎河梁而觀焉有懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居也意者難可以濟乎丈夫不以錯意遂度而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信錯吾軀於波流而吾不敢用私所以能入而復出者以此也孔子謂弟子曰二三子識之水且猶可以忠信誠身親之而況人乎白公問孔子曰人可與微言乎孔子不應白公問曰若以石投水何如孔子曰吾之善没者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可與微言乎孔子曰何爲不可唯知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至爲無爲夫淺知之所爭者末矣白公不得已遂死於浴室趙襄子使新穉穆子攻翟勝之取左人中人使遽人來謁之襄子方食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾今趙氏之德行無所施於積一朝而兩城下亡其及我哉孔子聞之曰趙氏其昌乎夫憂者所以爲昌也喜者所以爲亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吴越皆常勝矣然卒取亡焉不達乎持勝也唯有道之主爲能持勝孔子之勁能拓國門之關而不肯以力聞墨子爲守攻公輸般服而不肯以兵知故善持勝者以强爲弱宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先迕後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者太半此人以父子有疾皆免及圍解而疾俱復宋有蘭子者以技干宋元宋元召而使見其技以雙枝長倍其身屬其脛並趨並馳弄七劍迭而躍之五劍常在空中元君大驚立賜金帛又有蘭子又能燕戲者聞之復以干元君元君大怒曰昔有異技干寡人者技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天下之馬者若滅若没若亡若失若此者絶塵弭𨅊臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纏薪菜者有九方臯此其於馬非臣之下也請見之穆公見之使行求馬三月而反報曰已得之矣在沙丘穆公曰何馬也對曰牝而黄使人往取之牡而驪穆公不說召伯樂而謂之曰敗矣子所使求馬者色物牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其麄在其内而忘其外見其所見不見其所不見視其所視而遺其所不視若辠之相者乃有貴乎馬者也馬至果天下之馬也楚莊王問詹何曰治國奈何詹何對曰臣明於治身而不明於治國也楚莊王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也又未嘗聞身亂而國治者也故本在身不敢對以末楚王曰善狐丘丈人謂叔孫敖曰人有三怨子知之乎叔孫敖曰何謂也對曰爵高者人妬之官大者主惡之禄厚者怨逮之叔孫敖曰吾爵益高吾志益下吾官益大吾心益小吾禄益厚吾施益博以是免於三怨可乎叔孫敖疾將死戒其子曰王亟封我矣吾不受也爲我死王則封汝汝必無受利地楚越之間有寢丘者此地不利而名甚惡楚人鬼而越人機可長有者唯此也叔孫敖死果以美地封其子子辭而不受請寢丘與之至今不失牛缺者上地之大儒也下之邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之歡然亡憂吝之色盜進而問其故曰君子不以所養害其所養盜曰嘻賢矣夫既而相謂曰以彼之賢往見趙君使以我爲必困我不如殺之乃相與追而殺之燕人聞之聚族相戒曰遇盜莫如上地之牛缺也皆受教俄而其弟適秦至關下果遇盜憶其兄之戒因與盜力爭既而不如又追而以卑辭請物盜怒曰吾活汝弘矣而追吾不已迹將著焉既爲盜矣仁將焉在遂殺之又傍害其黨四五人焉虞氏者梁之富人也家充殷盛錢帛無量財貨無訾登高樓臨大路設樂陳酒擊博樓上俠客相隨而行樓上博者射明瓊張中反兩㯓記盍切魚而笑飛鳶適墜其腐鼠而中之俠客相與言曰虞氏富樂之日乆矣而常有輕易人之志吾不侵犯之而乃辱我以腐鼠此而不報無以立慬渠客叵靳二切於天下請與若等戮力一志率徒屬必滅其家爲等倫皆許諾至期日之夜聚衆積兵以攻虞氏大滅其家東方有人焉曰爰旌目將有適也而餓於道狐父之盜曰丘見而下壺餐以餔之爰旌目三餔而後能視曰子何爲者也曰我狐父之人丘也爰旌目曰譆汝非盜邪胡爲而餐我吾義不食子之食也兩手據地而嘔之不出喀喀切嘔也然遂伏而死孤父之人則盜矣而食非盜也以人之盜因謂食爲盜而不敢食是失名實者也柱厲叔事莒敖公自爲不知已去居海上夏日則食菱芰冬日則食橡栗莒敖公有難柱厲叔辭其友而往死之其友曰子自以爲不知已故去今往死之是知與不知無辨也柱厲叔曰不然自以爲不知故去今死是果不知我也吾將死之以醜後世之人主不知其臣者也凡知則死之不知則弗死此直道而行者也柱厲叔可謂懟以忘其身者也楊朱曰利出者實及怨往者害來發於此而應於外者唯請是故賢者慎所出楊子之鄰人亡羊既率其黨又請楊子之竪追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路既反問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知所之所以反也楊子戚然變容不言者移時不笑者竟日門人怪之請曰羊賤畜又非夫子之有而損言笑者何哉楊子不答門人不獲所命弟子孟孫陽出以告心都子心都了他日與孟孫陽偕入而問曰昔有昆弟三人游齊魯之間同師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名仲曰仁義使我殺身以成名叔曰仁義使我身名並全彼三術相反而同出於儒孰是孰非邪楊子曰人有濱河而居者習於水勇於泅操舟鬻渡利供百口褁糧就學者成徒而溺死者幾半本學泅不學溺而利害如此若以爲孰是孰非心都子默然而出孟孫陽讓之曰何吾子問之迂夫子答之僻吾惑愈甚心都子曰大道以多岐亡羊學者以多方喪生學非本不同非本不一而末異若是唯歸同反一爲亡得喪子長先生之門習先生之道而不達先生之況也哀哉楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗不知迎而吠之楊布怒將扑之揚朱曰子無扑矣子亦猶是也嚮者使汝狗白而往黑而來豈能無怪哉楊朱曰行善不以爲名而名從之名不與利期而利歸之利不與爭期而爭及之故君子必慎爲善昔人有言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死己所重者莫過乎生彼自喪其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而笑之曰夫所欲學不死其人已死而猶恨之是不知所以爲學胡子曰富子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言而不能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚爲不能言生術哉邯鄲之民以正月之旦獻鳩於簡子簡子大悦厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之故競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰然齊田氏祖於庭食客千人中坐有獻魚雁者田氏視之乃歎曰天之於民厚矣殖五穀生魚鳥以爲之用衆客和之如響鮑氏之子年十二預於次進曰不如君言天地萬物與我並生類也類無貴賤徒以小大智力而相制迭相食非相爲而生之人取可食者而食之豈天本爲人生之是蚊蚋噆膚虎狼食肉非天本爲蚊蚋生人虎狼生肉者哉齊有貧者常乞於城市城市患其亟也衆莫之與遂適田氏之廐從馬醫作役而假食郭中人戲之曰從馬醫而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬醫哉宋人有遊於道得人遺契者歸而藏之密數其齒告鄰人曰吾富可待矣人有枯梧樹者其鄰父言枯梧之樹不祥其鄰人遽而伐之鄰人父因請以爲薪其人乃不悦曰鄰人之父從欲爲薪而教吾伐之也與我鄰若此其險豈可哉人有亡鈇者意其鄰之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無爲而不竊鈇也俄而抇音掘其谷而得其鈇他日復見其鄰人之子動作態度無似竊鈇者白公勝慮亂罷朝而立倒校策錣張剖切策端有鐵也上貫頤血流至地而弗知也鄭人聞之曰頤之忘將何不忘哉意之所屬者其行足躓株塪頭柢植木而不自知也昔齊人有欲金者清旦衣冠而之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金沖虚至德眞經卷下
