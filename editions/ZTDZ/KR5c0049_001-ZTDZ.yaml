body:
  text: 周穆王第三周穆王時西極之國有化人來入水火貫金石反山川移城邑乘虚不墜觸實不硋千變萬化不可窮極既已變物之形又且易人之慮穆王敬之若神事之若君推路寢以居之引三牲以進之選女樂以娱之化人以爲王之宫室卑陋而不可處王之厨饌腥螻而不可饗王之嬪御膻惡而不可親穆王乃爲之改築土木之功赭堊之色無遺巧焉五府爲虚而臺始成其高千仞臨終南之上號曰中天之臺簡鄭衛之處子娥媌靡曼者施芳澤正娥眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環雜芷若以滿之奏承雲六瑩九韶晨露以樂之月月獻玉衣旦旦薦玉食化人猶不舍然不得已而臨之居亡幾何謁王同遊王執化人之袪騰而上者中天迺止暨及化人之宫化人之宫搆以金銀絡以珠玉出雲雨之上而不知下之據望之若屯雲焉耳目所觀聽鼻口所納嘗皆非人間之有王實以爲清都紫微鈞天廣樂帝之所居王俯而視之其宫榭若累塊積蘇焉王自以居數十年不思其國也化人復謁王同游所及之處仰不見日月俯不見河海光影所照王曰眩不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還化人移之王若碩虚焉既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未昲方微切王問所從來左右曰王默存耳由此穆王自失者三月而復更問化人化人曰吾與王神游也形奚動哉且曩之所居奚異王之宫曩之所游奚異王之圃王間恒疑蹔亡變化之極疾徐之間可盡模哉王大悦不恤國事不樂臣妾肆意遠游命駕八駿之乘右服𦽊音華騮而左緑耳右驂赤驥而左白𣚘音義主車則造父爲御𧮼齊𠱛合爲右次車之乘右服渠黄而左踰輪左驂盜驪而右山子栢夭主車叁百爲御奔戎爲右馳驅千里至于巨蒐氏之國巨蒐氏乃獻白鵠之血以飲王具牛馬之湩以洗王之足及二乘之人已飲而行遂宿于崑崙之阿赤水之陽别日升崑崙之丘以觀黄帝之宫而封之以貽後世遂賔于西王母觴于瑶池之上西王母爲王謡王和之其辭哀焉迺觀日之所入一日行萬里王乃歎曰於乎于一人不盈于德而諧於樂後世其追數吾過乎穆王幾神人哉能窮常身之樂猶百年乃徂世以爲登假焉老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生揖而進之於室屏左右而與之言曰昔老聃之徂西也顧而告予曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深固難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉老成子歸用尹文先生之言深思三月遂能存亡自在幡校四時冬起雷夏造冰飛者走走者飛終身不著其術故世莫傳焉子列子曰善爲化者其道密庸其功同人五帝之德三王之功未必盡智勇之力或由化而成孰測之哉覺有八徴夢有六候奚謂八徴一曰故二曰爲三曰得四曰喪五曰哀六曰樂七曰生八曰死此者八徴形所接也奚謂六候一曰正夢二曰蘁夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也不識感變之所起者事至則惑其所由然識感變之所起者事至則知其所由然知其所由然則無所怛一體之盈虚消息皆通於天地應於物類故陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫陰陽俱壯則夢生殺甚飽則夢與甚飢則夢取是以以浮虚爲疾者則夢揚以沈實爲疾者則夢溺藉帶而寢則夢蛇飛鳥銜髮則夢飛將陰夢火將疾夢食飲酒者憂歌儛者哭子列子曰神遇爲夢形接爲事故晝想夜夢神形所遇故神凝者想夢自消信覺不語信夢不達物化之往來者也古之眞人其覺自忘其寢不夢幾虚語哉西極之南隅有國焉不知境界之所接名古莽之國陰陽之氣所不交故寒暑亡辨日月之光所不照故晝夜亡辨其民不食不衣而多眠五旬一覺以夢中所爲者實覺之所見者妄四海之齊謂中央之跨河南北越岱東西萬有餘里其陰陽之審度故一寒一暑昏明之分察故一晝一夜其民有智有愚萬物滋殖才藝多方有君臣相臨禮法相持其所云爲不可稱計一覺一寐以爲覺之所爲者實夢之所見者妄東極之北隅有國曰阜落之國其土氣常燠日月餘光之照其土不生嘉苗其民食草根木實不知火食性剛悍强弱相藉貴勝而不尚義多馳步少休息常覺而不眠周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣而使之彌勤晝則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢爲國君居人民之上總一國之事游燕宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝爲僕虜苦則苦矣夜爲人君其樂無比何所怨哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐背昔夢爲人僕趨走作役無不爲也數駡杖撻無不至也眠中啽囈呻呼徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人遠矣夜夢爲僕苦逸之復數之常也若欲覺夢兼之豈可得邪尹氏聞其友言寬其役夫之程减己思慮之事疾並少間鄭人有薪於野者過駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以爲夢焉順途而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之彼直眞夢者矣室人曰若將是夢見薪者之得鹿邪詎有薪者邪今眞得鹿是若之夢眞邪夫曰吾據得鹿何用知彼夢我夢邪薪者之歸不厭失鹿其夜眞夢藏之之處又夢得之之主爽旦案所夢而尋得之遂訟而爭之歸之士師士師曰若初眞得鹿妄謂之夢眞夢得鹿妄謂之實彼眞取若鹿而與若爭鹿室人又謂夢仞人鹿無人得鹿今據有此鹿請二分之以聞鄭君鄭君曰嘻士師將復夢分人鹿乎訪之國相國相曰夢與不夢臣所不能辨也欲辯覺夢唯黄帝孔丘今亡黄帝孔丘孰辨之哉且恂士師之言可也宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾有瘳乎於是試露之而求衣饑之而求食幽之而求明儒生欣然告其子曰疾可已也然吾之方密傳世不以告人試屛左右獨與居室七日從之莫知其所施爲也而積年之疾一朝都除華子既悟廼大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不知天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須臾之忘可復得乎子貢聞而怪之以告孔子孔子曰此非汝所及乎顧謂顔回記之秦人逢氏有子少而惠及壯而有迷罔之疾聞歌以爲哭視白以爲黑饗香以爲朽嘗甘以爲苦行非以爲是意之所之天地四方水火寒暑無不倒錯者焉楊氏告其父曰魯之君子多術藝將能已乎汝奚不訪焉其父之魯過陳遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之言未必非迷况魯之君子迷之郵者焉能解人之迷哉榮汝之糧不若遄歸也燕人生於燕長於楚及老而還本國過晋國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而嘆指舍曰此若先人之廬乃涓然而泣指壠曰此若先人之冢其人哭不自禁同行者啞然大笑曰予昔紿若此晋國耳其人大慙及至燕眞見燕國之城社眞見先人之廬冢悲心更微仲尼第四仲尼閑居子貢入侍而有憂色子貢不敢問出告顔回顔回援琴而歌孔子聞之果召回入問曰若奚獨樂回曰夫子奚獨憂孔子曰先言爾志曰吾昔聞之夫子曰樂天知命故不憂回所以樂也孔子愀然有間曰有是言哉汝之意失矣此吾昔日之言爾請以今言爲正也汝徒知樂天知命之無憂未知樂天知命有憂之大也今告若其實脩一身任窮達知去來之非我亡變亂於心慮爾之所謂樂天知命之無憂也曩吾脩詩書正禮樂將以治天下遺來世非但脩一身治魯國而已而魯之君臣曰失其序仁義益衰情性益薄此道不行一國與當年其如天下與來世矣吾始知詩書禮樂無救於治亂而未知所以革之之方此樂天知命者之所憂雖然吾得之矣夫樂而知者非古人之所謂樂知也無樂無知是眞樂眞知故無所不樂無所不知無所不憂無所不爲詩書禮樂何棄之有革之何爲顔回北面拜手曰回亦得之矣岀告子貢子貢茫然自失歸家淫思七日不寢不食以至骨立顔回重往喻之乃反丘門弦歌誦書終日不輟陳大夫聘魯私見叔孫氏叔孫氏曰吾國有聖人曰非孔丘邪曰是也何以知其聖乎叔孫氏曰吾嘗聞之顔回曰孔丘能廢心而用形陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老聃之弟子有亢倉子者得聃之道能以耳視而目聽魯侯聞之大驚使上卿厚禮而致之亢倉子應聘而至魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳曰之用魯侯曰此增異矣其道奈何寡人終願聞之亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之内來干我者我必知之乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣魯侯大悦他日以告仲尼仲尼笑而不答商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘博學多識者也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘弗知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者爲聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其爲聖弗知眞爲聖歟眞不聖歟商太宰默然心計曰孔丘欺我哉子夏問孔子曰顔回之爲人奚若子曰回之仁賢於丘也曰子貢之爲人奚若子曰賜之辯賢於丘也曰子路之爲人奚若子曰由之勇賢於丘也曰子張之爲人奚若子曰師之莊賢於丘也子夏避席而問曰然則四子者何爲事夫子曰居吾語汝夫回能仁而不能反賜能辯而不能訥由能勇而不能怯師能莊而不能同兼四子之有以易吾吾弗許也此其所以事吾而不貳也子列子既師壺丘子林友伯昏瞀人乃居南郭從之處者日數而不及雖然子列子亦微焉朝朝相與辯無不聞而與南郭子連墻二十年不相謁請相遇於道目若不相見者門之徒役以爲子列子與南郭子有敵不疑有自楚來者問子列子曰先生與南郭子奚敵子列子曰南郭子貌充心虚耳無聞曰無見口無言心無知形無惕往將奚爲雖然試與汝偕往閲弟子四十人同行見南郭子果若欺魄焉而不可與接顧視子列子形神不相偶而不可與羣南郭子俄而指子列子之弟子未行者與言衎衎若專直而在雄者子列子徒駭之反舍咸有疑色子列子曰得意者無言進知者亦無言用無言爲言亦言無知爲知亦知無言與不言無知與不知亦言亦知亦無所不言亦無所不知亦無所言亦無所知如斯而已汝奚妄駭哉子列子學也三年之後心不敢念是非口不敢言利害始得老商一眄而已五年之後心更念是非曰更言利害老商始一解顔而笑七年之後從心之所念更無是非從口之所言更無利害夫子始一引吾並席而坐九年之後橫心之所念橫口之所言亦不知我之是非利害歟亦不知彼之是非利害歟外内進矣而後眼如耳耳如鼻鼻如口口無不同心凝形釋骨肉都融不覺形之所倚足之所履心之所念言之所藏如斯而已則理無所隱矣初子列子好游壺丘子曰禦寇好游游何所好列子曰游之樂所玩無故人之游也觀其所見我之游也觀其所變游乎游乎未有能辨其游者壺丘子曰禦寇之游固與人同歟而曰固與人異歟凡所見亦恒見其變玩彼物之無故不知我亦無故務外游不知務内觀外游者求備於物内觀者取足於身取足於身游之至也求備於物游之不至也於是列子終身不出自以爲不知游壺丘子曰游其至乎至游者不知所適至觀者不知所眂物物皆游矣物物皆觀矣是我之所謂游是我之所謂觀也故曰游其至矣乎游其至矣乎龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以爲榮國毁不以爲辱得而不喜失而弗憂視生如死視富如貧視人如豕視吾如人處吾之家如逆旅之舍觀吾之鄉如戎蠻之國凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕隸此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯自後向明而望之既而曰嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔流通一孔不達今以聖智爲疾者或由此乎非吾淺術所能已也無所由而常生者道也由生而生故雖終而不亡常也由生而亡不幸也有所由而常死者亦道也由死而死故雖未然而自亡者亦常也由死而生幸也故無用而生謂之道用道得終謂之常有所用而死者亦謂之道用道而得死者亦謂之常季梁之死楊朱望其門而歌隨梧之死楊朱撫其尸而哭隸人之生隸人之死衆人且歌衆人且哭目將眇者先覩秋毫耳將聾者先聞蚋飛口將爽者先辨淄澠鼻將窒者先覺焦朽體將僵者先亟奔佚心將迷者先識是非故物不至者則不反鄭之圃澤多賢東里多才圃澤之役有伯豐子者行過東里遇鄧析鄧析顧其徒而笑曰爲若舞彼來者奚若其徒曰所願知也鄧析謂伯豐子曰汝知養養之義乎受人養而不能自養者犬豕之類也養物而物爲我用者人之力也使汝之徒食而飽衣而息執政之功也長幼群聚而爲牢籍庖厨之物奚異大豕之類乎伯豐子不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎有善治土木者有善治金革者有善治聲樂者有善治書數者有善治軍旅者有善治宗廟者羣才備也而無相位者無能相使者而位之者無知使之者無能而知之與能爲之使焉執政者乃吾之所使子奚矜焉鄧析無以應目其徒而退公儀伯以力聞諸侯堂谿公言之於周宣王王備禮以聘之公儀伯至觀形懦夫也宣王心惑而疑曰女之力何如公儀伯曰臣之力能折春螽之股堪秋蟬之翼王作色曰吾之力者能裂犀兕之革曳九牛之尾猶憾以弱女折春螽之股堪秋蟬之翼而力聞天下何也公儀伯長息退席曰善哉王之問也臣敢以實對臣之師有商丘子者力無敵於天下而六親不知以未嘗用其力故也臣以死事之乃告臣曰人欲見其所不見視人所不窺欲得其所不得修人所不爲故學視者先見輿薪學聽者先聞撞鐘夫有易於内者無難於外於外無難故名不出於一家今臣之名聞於諸侯是臣違師之教顯臣之能者也然則臣之名不以負其力者也以能用其力者也不猶愈於負其力者乎中山公子牟者魏國之賢公子也好與賢人游不恤國事而悦趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悦公孫龍也子輿曰公孫龍之爲人也行無師學無友佞給而不中漫衍而無家好怪而妄言欲惑人之心屈人之口與韓檀等肄之公子牟變容曰何子狀公孫龍之過歟請聞其實子輿曰吾笑龍之詒孔穿言善射者能令後鏃中前括發發相及矢矢相屬前矢造準而無絶落後矢之括猶銜弦視之若一焉孔穿駭之龍曰此未其妙者遠蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢來注眸子而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰智者之言固非愚者之所曉後鏃中前括鈞後於前矢注眸子而眶不睫盡矢之勢也子何疑焉樂正子輿曰子龍之徒焉得不飾其闕吾又言其尤者龍誑魏王曰有意不心有指不至有物不盡有影不移髮引千鈞白馬非馬孤犢未嘗有母其負類反倫不可勝言也公子牟曰子不諭至言而以爲尤也尤其在子矣夫無意則心同無指則皆至盡物者常有影不移者說在改也髮引千鈞勢至等也白馬非馬形名離也孤犢未嘗有母非孤犢也樂正子輿曰子以公孫龍之鳴皆條也設令發於餘竅子亦將承之公子牟默然良乆告退曰請待餘日更謁子論堯治天下五十年不知天下治歟不治歟不知億兆之願戴己歟不願戴己歟顧問左右左右不知問外朝外朝不知問在野在野不知堯乃微服游於康衢聞童兒謡曰立我蒸民莫菲爾極不識不知順帝之則堯喜問曰誰教爾爲此言童兒曰我聞之大夫問大夫大夫曰古詩也堯還宫召舜因禪以天下舜不辭而受之關尹喜曰在已無居形物其著其動若水其靜若鏡其應若響故其道若物者也物自違道道不違物善若道者亦不用耳亦不用目亦不用力亦不用心欲若道而用視聽形智以求之弗當矣瞻之在前忽焉在後用之彌滿六虚廢之莫知其所亦非有心者所能得遠亦非無心者所能得近唯默而得之而性成之者得之知而忘情能而不爲眞知眞能也發無知何能情發不能何能爲聚塊也積塵也雖無爲而非理也湯間第五殷湯問於夏革曰古初有物乎夏革曰古初無物今惡得物後之人將謂今之無物可乎殷湯曰然則物無先後乎夏革曰物之終始初無極已始或爲終終或爲始惡知其紀然自物之外自事之先朕所不知也殷湯曰然則上下八方有極盡乎革曰不知也湯固問革曰無則無極有則有盡朕何以知之然無極之外復無無極無盡之中復無無盡無極復無無極無盡復無無盡朕以是知其無極無盡也而不知其有極有盡也湯又問曰四海之外奚有革曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也朕以是知四海四荒四極之不異是也故大小相含無窮極也含萬物者亦如含天地含萬物也固不窮含天地也故無極朕亦焉知天地之表不有大天地者乎亦吾所不知也然則天地亦物也物有不足故昔者女媧氏練五色石以補其闕斷鼇之足以立四極其後共工氏與顓頊爭爲帝怒而觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉湯又問物有巨細乎有修短乎有同異乎革曰渤海之東不知幾億萬里有大壑焉實惟無底之谷其下無底名曰歸墟八紘九野之水天漢之流莫不注之而無增無减焉其中有五山焉一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊其山高下周旋三萬里其頂平處九千里山之中間相去七萬里以爲鄰居焉其上臺觀皆金玉其上禽獸皆純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相往來者不可數焉而五山之根無所連著常隨潮波上下往還不得蹔峙焉仙聖毒之訴之於帝帝恐流於西極失羣聖之居乃命禺疆使巨鼇十五舉首而戴之迭爲三番六萬歲一交焉五山始峙而不動而龍伯之國有大人舉足不盈數步而暨五山之所一釣而連六鼇合負而趣歸其國灼其骨以數焉於是岱輿貟嶠二山流於北極沉於大海仙聖之播遷者巨億計帝憑怒侵减龍伯之國使阨侵小龍伯之民使短至伏羲神農時其國人猶數千丈從中州以東四十萬里得僬僥國人長一尺五寸東北極有人名曰諍人長九寸荆之南有冥靈者以五百歲爲春五百歲爲秋上古有大樁者以八千歲爲春八千歲爲秋朽壤之上有菌芝者生於朝死於晦春夏之月有蠓蚋者因雨而生見陽而死終髮北之北有溟海者天池也有魚焉其廣數千里其長稱焉其名爲鯤有鳥焉其名爲鵬翼若垂天之雲其體稱焉世豈知有此物哉大禹行而見之伯益知而名之夷堅聞而志之江浦之間生麽蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形𧣾丑豸文余普弭三切俞師曠方夜擿耳俛首而聽之弗聞其聲唯黄帝與容成子居空同之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲吴楚之國有大木焉其名爲櫾碧樹而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北而化爲枳焉鸜鵒不踰濟貉踰汶則死矣地氣然也雖然形氣異也性鈞已無相易已生皆全已分皆足已吾何以識其巨細何以識其脩短何以識其同異哉大形王屋二山方七百里高萬仞本在冀州之南河陽之北北山愚公者年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險指通豫南達于漢陰可乎雜然相許其妻獻疑曰以君之力曾不能損魁父之丘如太形王屋何且焉置土石雜曰投諸渤海之尾隱土之北遂率子孫荷擔者三夫叩石墾壤箕畚運於渤海之尾鄰人京城氏之孀妻有遺男始齓跳往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曾不能毁山之一毛其如土石何北山愚公長息曰汝心之固固不可徹曾不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子又生子子又生孫子子孫孫無窮匱也而山不加增何若而不平河曲智叟亡以應操蛇之神聞之懼其不已也告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南自此冀之南漢之陰無隴斷焉夸父不量力欲追日影逐之於隅谷之際渴欲得飲赴飲河渭河渭不足將走北飲大澤未至道渴而死棄其杖尸膏肉所浸生鄧林鄧林彌廣數千里焉大禹曰六合之間四海之内照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物其形或夭或壽唯聖人能通其道夏革曰然則亦有不待神靈而生不待陰陽而形不待日月而明不待殺戮而夭不待將迎而壽不待五穀而食不待繒纊而衣不待舟車而行其道自然非聖人之所通也禹之治水土也迷而失塗謬之一國濱北海之北不知距齊州幾千萬里其國名曰終北不知際畔之所齊限無風雨霜露不生鳥獸蟲魚草木之類四方悉平周以喬陟當國之中有山山名壺領狀若甔甄頂有口狀若貟環名曰滋穴有水湧出名曰神瀵臭過蘭椒味過醪醴一源分爲四埒注於山下經營一國亡不悉徧土氣和亡札厲人性婉而從物不競不爭柔心而弱骨不驕不忌長幼儕居不君不臣男女雜游不媒不聘縁水而居不耕不稼土氣温適不織不衣百年而死不夭不病其民孳阜亡數有喜樂亡衰老哀苦其俗好聲相携而迭謡終日不輟音饑倦則飲神瀵力志和平過則醉經旬乃醒沐浴神瀵膚色脂澤香氣經旬乃歇周穆王北游過其國三年忘歸既反周室慕其國𢠵然自失不進酒肉不召嬪御者數月乃復管仲勉齊桓公因遊遼口俱之其國幾尅舉隰朋諫曰君舍齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬視撝則諸侯從命亦奚羨於彼而棄齊國之社稷從戎夷之國乎此仲父之耄奈何從之桓公乃止以隰明之言告管仲仲曰此固非朋之所及也臣恐彼國之不可知之也齊國之富奚戀隰朋之言奚顧南國之人祝髮而祼北國之人鞨巾而裘中國之人冠冕而裳九土所資或農或商或田或漁如冬裘夏葛水舟陸車默而得之性而成之越之東有輒休之國其長子生則鮮而食之謂之宜弟其大父死負其大母而棄之曰鬼妻不可與同居處楚之南有炎人之國其親戚死㱙與咼同其肉而棄之然後埋其骨迺成爲孝子秦之西有儀渠文康之國者其親戚死聚柴積而焚之燻則煙上謂之登遐然後成爲孝子此上而爲政下以爲俗而未足爲異也孔子東游見兩小兒辨鬥問其故一兒曰我以日始出時去人近而日中時遠也一兒以日初出遠而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不爲遠者小而近者大乎一兒曰日初出則滄滄凉凉及其日中如探湯此不爲近者熱而遠者凉乎孔子不能决也兩小兒笑曰孰爲汝多知乎均天下之至理也連於形物亦然均髮均縣輕重而髮絶髮不均也均也其絶也莫絶人以爲不然自有知其然者也詹何以獨繭絲爲綸芒鍼爲鈎荆蓧爲竿剖粒爲餌引盈車之魚於百仞之淵汩流之中綸不絶鈎不伸竿不撓楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也弱弓纖繳乘風振之連雙鶬於青雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈釣手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕致重也大王治國誠能若此則天下可運於一握將亦奚事哉楚王曰善魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今爲汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志彊而氣弱故足於謀而寡於斷齊嬰志弱而氣彊故少於慮而傷於專若换汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃已瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄游柱指鈞絃三年不成章師襄曰子可以歸矣師文舍其琴嘆曰文非絃之不能鈞非章之不能成文所存者不在絃所志者不在聲内不得於心外不應於氣故不敢發手而動絃且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商絃以召南吕凉風忽至草木成實及秋而叩角絃以激夾鍾温風徐回草木發榮當夏而叩羽絃以召黄鍾霜雪交下川池暴沍及冬而叩徴絃以激蕤賔陽光熾烈堅冰立散將終命宫而總四絃則景風翔慶雲浮甘露降澧泉涌師襄乃撫心高蹈曰微矣子之彈也雖師曠之清角鄒衍之吹律亡以加之彼將挾琴執管而從子之後耳薛譚學謳於秦青未窮青之技自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲薛譚乃謝求反終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之娥還復爲曼聲長歌一里老幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之故雍門之人至今善歌哭效娥之遺聲伯牙善鼓琴鍾子期善聽伯牙鼓琴志在登高山鍾子期曰善哉峨峨兮若泰山志在流水鍾子期曰善哉洋洋兮若江河伯牙所念鍾子期必得之伯牙游於泰山之陰卒逢暴雨止於巖下心悲乃援琴而鼓之初爲霖雨之操更造崩山之音曲每奏鍾子期輒窮其趣伯牙乃舍琴而歎曰善哉善哉子之聽夫志想象猶吾心也吾於何逃聲哉周穆王西巡狩越崑崙不至弇山反還未及中國道有獻工人名偃師穆王薦之問曰若有何能偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰日以俱來吾與若俱觀之越日偃師謁見王王薦之曰若與偕來者何人對曰臣之所造能倡者穆王驚視之趣步俯仰信人也巧夫鎮其頤則歌合律捧其乎則舞應節千變萬化唯意所適王以爲實人也與盛姬内御並觀之技將終倡者瞬其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傳會革木膠漆白黑丹青之所爲王諦料之内則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也而無不畢具者合會復如初見王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王始悦而歎曰人之巧乃可與造化者同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東門賈禽滑釐聞偃飾之巧以告二子二子終身不敢語藝而時執規矩甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學射於甘蠅而巧過其師紀昌者又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃卧其妻之機下以自承牽挺二年之後雖錐末倒眥而不瞬也以告飛衛飛衛曰未也必學視而後可視小如大視微如著而後告我昌以氂懸虱於牖南面而望之旬日之間浸大也三年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛高蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先窮紀昌遺一矢既發飛衛以棘剌之端扞之而無差焉於是二子泣而投弓相拜於塗請爲父子尅臂以誓不得告術於人造父之師曰泰豆氏造父之始從習御也執禮甚卑泰豆三年不告造父執禮愈謹乃告之曰古詩言良弓之子必先爲箕良冶之子必先爲裘汝先觀吾趣趣如吾然後六轡可持六馬可御造父曰唯命所從泰豆乃立木爲塗僅可容足計步而置履之而行趣走往還無跌失也造父學之三日盡其巧泰豆歎曰子何其敏也得之捷乎凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎轡銜之際而急緩乎脣吻之和正度於胸臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進退履繩而旋曲中規矩取道致遠而氣力有餘誠得其術也得之於銜應之於轡得之于轡應之於手得之於手應之於心則不以目視不以策驅心閑體正六轡不亂而二十四蹄所投無差迴旋進退莫不中節然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之魏黑卵以暱嫌殺丘邴章丘邴章之子來丹謀報父之讎丹氣其猛形甚露計粒而食順風而趣雖怒不能稱兵以報之恥假力於人誓手劍以屠黑卵黑卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔推屈而體無痕撻負其才力視來丹猶雛鷇也來丹之友申他曰子怨黑卵至矣黑卵之易子過矣將奚謀焉來丹垂涕曰願子爲我謀申他曰吾聞衛孔周其袓得殷帝之寳劍一童子服之却三軍之衆奚不請焉來丹遂適衛見孔周執僕御之禮請先納妻子後言所欲孔周曰吾有三劍唯子所擇皆不能殺人且先言其狀一曰含光視之不可見運之不知其有所觸也泯然無際經物而物不覺二曰承影將旦昧爽之交旦夕昏明之際北面而察之淡淡焉若有物存莫識其狀其所觸也竊竊焉有聲經物而物不疾也三曰宵練方晝則見影而不見光方夜見光而不見形其觸物也𩦐然而過隨過隨合覺疾而不血刃焉此三寳者傳之十三世矣而無施於事匣而藏之未嘗啓封來丹曰雖然吾必請其下者孔周乃歸其妻子與齋七日晏陰之間跪而授其下劍來丹再拜受之以歸來丹遂執劍從黑卵時黑卵之醉偃牖下白頸至腰三斬之黑卵不覺來丹以黑卵之死趣而退遇黑卵之子於門擊之三下如投虚黑卵之子方笑曰汝何蚩而三招予來丹知劍之不能殺人也歎而歸黑卵既醒怒其妻曰醉而露我使我嗌疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支彊彼其厭我哉周穆王大征西戎西戎獻錕鋙之劍火浣之布其劍長尺有咫練鋼赤刃用之切玉如切泥焉火浣之布浣之必投於火布則火色垢則布色出火而振之皓然疑乎雪皇子以爲無此物傳之者妄蕭叔曰皇子果於自信果於誣理哉沖虚至德眞經卷中
