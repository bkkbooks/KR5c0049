front:
  text: 列子序張湛字處度湛聞之張湛字處度東晋光禄勲注此真絰先父曰吾先君與劉正輿傳頴根皆王氏之甥也並少詩照反遊外家舅始周姓王張湛祖之舅始周從疾用反兄正宗輔嗣皆好呼教反集文籍先并卑政反得仲宣家書幾將萬卷傳氏亦世為學門三君緫角競録竒書及長丁文反遭永嘉之亂與頴根同避難乃旦反南行車重各稱尺證反力並有所載而㓂虜彌盛前途尚逺張謂傳曰今將不能盡子忍反全所載且共料音聊簡世所希有者各各保録令無遺棄頴根於是唯賫音擠其祖玄父咸予集先君所録書中有列子八篇及至江南僅音覲少也有存者列子唯餘楊朱說符目録三卷比必利反亂正輿為楊州刺史先來過江復扶又反在其家得四卷㝷從輔嗣女壻趙季子家得六卷參校有無始得全備其書大畧明羣有以至虚為宗萬品以終㓕為驗神惠以凝寂常全想念以著直畧反物自䘮息浪反生音敎與化夣等情巨細不限一域窮逹無假智力治身貴於肆任而鴆反順性則所之皆適水火可蹈志懷則無幽不照此其㫖也然所明往往與佛相參大歸同於老荘屬音燭亂引特與荘子相似荘子愼到韓非尸子淮南子玄示㫖歸多稱其言遂注之云爾光禄大臣向所校列子書緑永始三年八月壬寅上沖虚至德真絰序畢乾隆乙卯季冬書鄭輔義擕宋刻列子二册求售適是日余在友人處因留於大兒玉堂書塾中至暮抵家取書閱之宻行細字尚是宋刻之上駟急挑燈校一卷覺世德堂本訛舛已復不少真善本也明晨訪頋抱冲于小讀書堆鄭書友已在座背冲問其直索白鏹六十金余方以為價昂不之得而抱冲已喧傳余之獨得是書矣盖是書先擕至金閭袁綬階處後到余家綬階遂為抱冲言之而抱冲作書於輔義指名相索輔義含糊答忽見余與輔義耳語知是書已留余家故冲以余為必得也余亦以是書不歸江夏即歸武倘惜財物致失異書大是恨事因固留之并不敢重與物主一觀輔義来議價者再三仍執前所言不得已屬其取向所見之宋刻新序同買之許以八十金而始允余雖知是書之貴明為余與抱冲争購之故然此愛書之私終不為所奪在余亦自其癡獃耳歳晚事忙不及叙得書顛末新年以守制居家不出門賀歳午窓新霽展函讀之爰題數行于後俾後之覽者知異書忽來如景星卿雲争先覩之為快癡獃如余尢有甚扵人有不竊相者乎大清嘉慶元年元旦日試筆書此於昭明卷舊居之養恬書屋
