body:
  text: 人黄丕烈列子行世夲以世德堂六子中本為最余舊藏影宋鈔本抱冲曽取以世德堂本校之多所岐異幾自矜為善本矣近得此本佳處更多鈔本遂遜而居乙抱冲從弟澗蘋為余校是書見其中所附音始猶疑為殷敬順釋文後細審之乃知非釋文盖作注者之舊音也且為余為殷敬順乃宋人而託名唐人者如此本字句釋文所云一本作某某皆與此合則此本之在釋文未行以前可知列子善本絶少得此足正羣譌書前跋畢并記數語以傳信扵後
  hash: sha256:3f3391096f8ee83357271a5ba3aa59515e96cbbfe27bf1c1f3b8176eaa524e0a
