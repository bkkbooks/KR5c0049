  text: 沖虚至德眞經卷第三
  hash: sha256:96d1e791ab40afae72b74244eb42cb4ed46144742f795c5e162369f41418f4f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0049_SBCK_003-1a}
body:
  text: 列子張湛處度注周穆王第三夫禀生受有謂之形俛仰變異謂之化神之所交謂之夢形之所接謂之覺原其極也同歸虚僞何者生質根滯百年乃終化情枝淺視瞬而㓕神道恍惚存亡形理顯著若誠實故洞監知生滅之理均覺夢之塗一雖萬變交陳未関神慮愚惑者以顯昧爲成驗遟速而致疑故竊然而自私以形骸爲眞宅孰識生化之本歸之於无物哉周穆王時西極之國有化人來化均人也入水火貫金石反山川移城邑乗虚不墜觸實不硋千變萬化不可窮極旣巳變物之形又且易人之慮能使人暫忘其宿所知識穆王敬之神事之君推路寢以居之引三牲以進之選女樂以娱之化人以爲王之宫室卑陋而不可處王之饌腥螻而不可饗螻蛄臭也王之嬪御膻惡而不可親穆王乃爲之改築土木之功赭堊之色无遺巧焉五府爲虚而臺始成其髙千仞臨終南之上號曰中天之臺鄭衛之處子娥媌靡曼者娥媌妖好也靡曼柔弱也施芳澤正蛾眉設䈂珥䈂首飾珥瑱也衣阿錫阿細榖錫細布曳齊紈齊名紈所出也粉白黛黒珮玉環雜芷芷若香草以滿之充滿臺館奏承雲六九韶晨露以樂之承雲黃帝樂六帝嚳樂九韶舜樂晨露湯樂月月獻玉衣旦旦薦玉食言其珍異化人猶不舎然不得巳而臨之居亡幾何謁王同游王執化人之祛祛衣䄂也騰而上者中天迺止曁及化人之宫化人之宮構以金銀絡以珠玉出雲雨之上而不知下之據望之屯雲焉耳目所觀聽鼻口所納甞皆非人閒之有王實以爲清都紫微鈞天廣樂帝之所居清都紫微天帝之所居也傳記云奏穆公疾不知人旣寤曰我之帝所甚樂與百神游鈞天廣樂九奏萬舞不三代之樂其聾動心一說云趙簡子亦然也王府而視之其宫榭累塊積蘇焉王自以居數十年不思其國也所謂易人之慮也化人復謁王同游所及之處仰不見日月俯不見河海光影所照王目不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還太虚恍惚之域固非俗人之所渉心目亂惑自然之數也化人移之移猶推也王磒虚焉磒墜也旣寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未䀟扶貴反王問所從來左右曰王黙存耳由此穆王自失者三月而復更問化人問其形不移之意化人曰吾與王神㳺也形奚動哉所謂神者不疾而速不行而至以近事喻之假一昔所夢或百年之事所見或絶域之物其在覺也俛仰之須臾再撫六合之外邪想湟念猶得如此況神心獨運不假形器圓通立照寂然凝虚者乎且曩之所居奚異王之宫曩之所游奚異王之圃王閒恒疑蹔亡彼之與此俱非眞物習其常存疑其蹔亡者心之惑也變化之極徐疾之間可盡模哉變化不可窮極徐疾理亦无閒欲以智㝷象模未可測王大恱不恤國事不樂臣妾感至言故遺丗事之治亂忘君臣之尊卑也肆意逺游命駕八駿之乗右服古華字騮而左緑耳右驂赤而左白古義字主車則造父爲御上齊下合此古字末審爲右次車之乗右服渠黃而左踰輪左驂盜驪而右山子柏天主車參百爲御奔戎爲右馳驅千里至于巨蒐氏之國巨蒐氏乃獻白鵠之血以飲王具牛馬之湩以洗王之足湩乳也以巳所珍貴獻之至尊及二乗之人巳飲而行遂宿于崑崙之阿赤水之陽山海經云崑崙山有五色水也别日升于崑崙之以觀黃帝之宫而封之以詒後丗遂賔于西王母觴于瑶池之上西王母人也虎齒蓬髮戴勝菩嘯也出山海經西王母爲王謡徒歌曰謡詩名白雲王和之和荅也詩名東歸其辭哀焉迺觀曰之所入穆天子傳云西登弇山一日行萬里王乃歎曰於乎予一人不盈于德而諧於樂諧辨後丗其追數吾過乎自此巳上至命駕八駿之乗事見穆天子傳穆王幾神人哉言非神也能窮當身之樂猶百年乃徂知丗事无常故肆其心也丗以爲登假焉假字當作遐丗以爲登遐明其實死也老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生揖而進之於室屏左右而與之言曰昔老聃之徂西也顧而告予曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻窮二儀之數握隂陽之紀者陶運萬形不覺其難也造物者其巧妙其功深固難窮難終造物者豈有心哉自然似妙耳夫氣質憒薄結而成形隨化而往故未即消滅也因形者其巧顯其功淺故隨起隨滅假物而爲變革者與成形而推移故暫生暫没功顯事著故物皆駁知幻化之不異生死也始可與學幻矣注篇目巳詳其義吾與汝亦幻也奚須學哉身則是幻而復欲學幻則是幻幻相學也老成子歸用尹文先生之言深思三月遂能存亡自在憣校四時冬起雷夏造冰飛者走走者飛深思一時猶得其道况不思而自得者乎夫生必由理形必由生失有有生而无理有而无生生之與形形之與理雖精麤不同而迭爲賔主往復流遷未始蹔停是以變動不居或聚或散撫之有倫則功替而事著脩之失度則跡顯而變彰今四時之令或乖則三辰錯序雷冰反用器物蒸爍則飛鍊雲沙以成水傾得之於常衆所不疑推此也盡隂陽之妙數極萬物之情者則陶鑄羣有與造化同功矣夫偏達數術以氣質相引俛仰則一出一没顧盻則飛走易形蓋術之末者子終身不箸其術固丗莫傳焉日用而百姓不知聖人之道也顯竒以駭一丗常人之事耳子列子曰善爲化者其道密庸其功同人取濟丗安物而巳故其功潜著而人莫知焉五帝之德三王之功未必盡智勇之力或由化而成孰測之哉帝王之功德丗爲之名非所以爲帝王也揖讓干戈果是所假之塗亦奚爲而不假幻化哉但駭丗之迹聖人密用而不顯焉覺有八徴夢有六候㣲驗也候占也六夢之占義見周官奚謂八徴一曰故故事二曰爲爲作也三曰得四曰喪五曰哀六曰樂七曰生八曰死此者八徴形所接也奚謂六候一曰正夢平居自夢二曰蘁夢周官注云蘁當爲驚愕之愕謂驚愕而夢三曰思夢因思念而夢四曰寤夢覺時道之而夢五曰喜夢因喜恱而夢六曰懼夢因恐怖而夢此六者神所交也此一章大旨亦明覺夢不異者也不識感變之所起者事至則惑其所由然識感變之所起者事至則知其所由然知其所由然則無所怛夫變化云爲皆有因而然事以未來而不㝷其本者莫不改惑誠識所由雖譎怪萬端而心无所駭也一體之盈虚消息皆通於天地應於物人與隂陽通氣身與天地並形吉凶往復不得不相關通也故隂氣壯則夢涉大水而恐懼失其中和則濡溺恐懼也陽氣壯則夢涉大火而燔火性猛烈遇則燔也隂陽俱壯則夢生殺隂陽以和爲用者也抗則自相利害故或生或殺也甚飽則夢與甚饑則夢取有餘故欲施不足故渉取此亦與覺相也是以以浮虚爲疾者則夢揚以沈實爲疾者則夢溺藉帶而寢則夢蛇飛鳥銜髪則夢飛此以物致感將隂夢火將疾夢食飲酒者憂歌儛者哭此皆明夢或國事致感或造極相反即周禮六夢六義理无妄然子列子曰神遇爲夢形接爲事莊子曰其寐也神交其覺也形開故晝想夜夢神形所遇此想謂覺時有情慮之事非如丗間常語晝日想有此事而後隨而夢也故神凝者想夢自消晝無情念夜无夢寐信覺不語信夢不達物化之往來者也夢爲鳥而厲於天夢爲魚而潛於淵此情化徃復也古之眞人其覺自忘其寢不夢幾虛語哉眞人无往不忘乃當不眠何夢之有此亦寓言以明理也西極之南隅有國焉不知境界之所接名古莽之國隂陽之氣所不交故寒暑亡辨日月之光所不照故晝夜亡辨其民不食不衣而多眠五旬一覺以夢中所爲者實覺之所見者妄四海之齊謂中央之國即今四海之内跨河南北越岱東西萬有餘里其隂陽之審度故一寒一暑昏明之分察故一晝一夜其民有智有愚萬物滋殖才藝多方有君臣相臨禮法相持其所云爲不可稱計一覺一寐以爲覺之所爲者實夢之所見者妄東極之北隅有國曰阜落之國其土氣常燠日月餘光之照其土不生嘉苗其民食草根水實不知火食性剛悍彊弱相藉貴勝而不尚義多馳歩少休息常覺而不眠方俗之異猶覺夢反用動寢殊性各適一方未足相非者也周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣而使之彌勤晝則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢爲國君居人民之上緫一國之事遊燕宫觀恣意所欲其樂无比覺則復役人有慰喻其懃者役夫曰人生百年晝夜各分分半也吾晝爲僕虜苦則苦矣夜爲人君其樂无比何所怨哉尹氏心謍丗事慮鍾家業心形俱疲夜亦昏憊而寐昔昔夢爲人僕趨走作役无不爲也數罵杖撻无不至也眠中啽囈呻呼啽吾南反囈音藝徹且息焉尹氏病之以訪其友友曰位足榮身資財有餘勝人遠矣夜夢爲僕苦逸之復數之常也夫盛衰相襲樂極哀生故覺之所美夢或惡焉欲覺夢兼之豈可得邪尹氏聞其友言寛其役夫之程減已思慮之事疾並少閒此章亦明覺夢不異苦樂各適一方則投夫懃於晝而逸於夜尹氏榮於晝而辱於夜理苟不兼未足相跨也鄭人有薪於野者遇駭鹿御而擊之御迎斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以爲夢焉順塗而詠其事傍人有聞者用其言而取之旣歸告其室人曰向薪者夢得鹿而而不知其處吾今得之彼直眞夢者矣室人曰將是夢見薪者之得鹿邪詎有薪者邪今眞得鹿是之夢眞邪夫曰吾據得鹿何用知彼夢我夢邪薪者之歸不厭失鹿其夜眞夢藏之之處又夢得之之主爽旦案所夢而㝷得之遂訟而爭之歸之士師士師曰眞得鹿妄謂之夢眞夢得鹿妄謂之實彼眞取鹿而與爭鹿室人又謂夢仞人鹿无人得鹿今據有此鹿請二分之以聞鄭君鄭君曰嘻士師將復夢分人鹿乎訪之國相國相曰夢與不夢臣所不能辨也欲辨覺夢唯黃帝孔丘聖人之辨覺夢何邪直知其不異耳今亡黃帝孔丘孰辨之哉且恂士師之言可也恂信也音荀因喜怒而迷或猶不復辨覺夢之虚實況本无覺夢也宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而之弗占謁巫而禱之弗禁謁醫而攻之弗巳魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占夫機理萌於彼感於此故吉凶可因卦兆而推情匿可假象數而尋今忘者之心泊爾釣於死灰廓焉同乎府宅聖人將无所客其鑒豈卦兆之所占非祈請之所禱夫信順之可以祈福慶正誠之可以消邪僞自然之勢也故負愧於神明致怨於人理者莫不因兹以自極至於情无專惑行无狂僻則非祈請之所禱也非藥石之所攻疾痾結於府藏疾病散於肌體者必攻脉診以察其盈虚役藥石以攻其身苦心非食慾所亂病非寒暑所傷則醫師之用冝其廢也吾試化其心變其慮庶幾其瘳乎大忘者都无心慮將何所化此義自云易令有心反令有慮蓋辭有左右耳於是試露之而求衣饑之而求食幽之而求明先奪其攻巳之物以試之儒生欣然告其子曰疾可巳也然吾之方密傳丗不以告人試屏左右獨與居室七日從之莫知其所施爲也儒者之多方固非一塗所驗也而積年之疾一朝都除土句云使巫醫術之所絶思而儒生獨能巳其所病者先引華子之忘同於自然以明无心之極非數術而得復推儒生之功有過史巫者明理不冥足則可以多方相誘又欲令忘者之悟知曩之忘懷實幾乎至理也華子旣悟迺大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不覺天地之有无今頓識旣往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須之忘可復得乎疾病與至理相似者猶能期況體極乎子貢聞而怪之以告孔子孔子曰此非汝所及乎顧謂顔回記之此理亦當是腸之所逯所以抑之者欲妙賞於大賢耳秦人逢氏有子少而惠及壯而有迷罔之疾惠非迷也而用惠之必之於迷焉聞歌以爲哭視白以爲黒饗香以爲朽月令曰其臭朽常甘以爲苦行非以爲是意之所之天地四方水火寒暑无不倒錯者焉楊氏告其父曰魯之君子多術藝將能巳乎汝奚不訪焉其父之魯過陳遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一郷一郷之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之此言未必非迷而況魯之君子迷之郵者魯之君子盛稱仁義明言是非故曰迷之郵者也焉能解人之迷哉榮汝之糧不遄歸也榮棄也此章明是非之理未可全定皆衆寡相傾以成辨爭也燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此里之社乃喟然而歎指舍曰此先人之廬乃㳙然而泣指壠曰此先人之冢其人哭不自禁同行者啞然大曰子昔紿此晉國耳其人大慙及至燕眞見燕國之城社眞見先人之廬家悲心更微此章明情有一至哀樂旣過則向之所感皆无欣戚者也列子沖虚至德眞經卷第三
