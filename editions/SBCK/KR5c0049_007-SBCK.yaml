  text: 沖虚至德眞經卷第七
  hash: sha256:be1d8b1da148b22fffa0da0f1292ba98033b344702bd429f1056deda751de177
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0049_SBCK_007-1a}
body:
  text: 列子張湛處度注楊朱第七夫生者一氣之蹔聚一物之蹔靈蹔聚者終散蹔靈者歸虚而好逸惡勞物之常性故當生之所樂者厚味美服好色音聲而巳耳而復不能肆性情之所安耳目之所娱以仁義爲鍵用禮敎爲衿帶自枯槁於當年求餘名於後丗者是不達乎生生之趣也楊朱游於魯舎於孟氏孟氏問曰人而巳矣奚以名爲曰以名者爲冨旣冨矣奚不巳焉曰爲貴旣貴矣奚不巳焉曰爲死旣死矣奚爲焉曰爲子孫夫事爲无巳故情无猒足名奚益於子孫曰名乃苦其身燋其心夫名者因僞以求眞假虚以招實矯性而行之有爲而爲之者豈得无勤憂之邪乗其名者澤及宗族利兼郷黨況子孫乎凡爲名者必廉廉斯貧爲名者必讓讓斯賤此難家之辭也今有廉讓之名而不免貧賤者此爲善而不求利也曰管仲之相齊也君淫亦淫君奢亦奢言不專美惡於已志合言從道行國霸死之後管氏而巳田氏之相齊也君盈則已降君斂則已施此推惡於君也民皆歸之因有齊國子孫享之至今不絶實名貧僞名冨爲善不以爲名名自生者實名也爲名以招利而丗莫知者僞名也僞名則得利者也曰實無名名無實名者僞而巳矣不僞則不足以招利昔者堯舜僞以天下讓許由善卷而不失天下享祚百年僞實之迹因事而生致僞者由堯舜之迹而聖人无僞也伯夷叔齊實以竹君讓而終亡其國餓死於首陽之山實僞之辯如此其省也省猶察也楊朱曰百年壽之大齊得百年者千无一焉設有一者孩抱以逮昬老幾居其半矣夜眠之所弭晝覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中逌然而自得亡介焉之慮者亦亡一時之中爾則人之生也奚爲哉奚樂哉爲美厚爾爲聲色爾而美厚復不可常猒足聲色不可常翫聞仍復爲刑賞之所禁勸名法之所進退遑遑爾競一時之虚譽規死後之餘榮偊偊爾順耳目之觀聽惜身意之是非徒失當年之至樂不能自肆於一時重囚纍梏何以异哉异異也古字太古之人知生之暫來知死之暫往生實暫來死實長往是丗俗常談而云死復暫往卒然覽之有似字誤然此書大㫖自以爲存亡往復形氣轉續生死變化未始絶滅也注天瑞篇中巳具詳其義矣故從心而動不違自然所好當身之娱非所去也故不爲名所觀爲善不近名者從性而游不逆萬物所好死後之名非所取也故不爲刑所及爲惡不近刑者名譽先後年命多少非所量也楊朱曰萬物所異者生也所同者死也生則有賢愚貴賤是所異也死則有臭腐消滅是所同也雖然賢愚貴賤非所能也臭腐消滅亦非所能也故生非所生死非所死賢非所賢愚非所愚貴非所貴賤非所賤皆自然爾非能之所爲也然而萬物齊生齊死齊賢齊愚齊貴齊賤皆同歸於自然十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則腐骨生則桀紂死則腐骨腐骨一矣孰知其異且趣當生奚遑死後此譏計後者之惑也夫不謀其前不慮其後无戀當今者徳之至也楊朱曰伯夷非亡欲矜清之卸音尤以放餓死守餓至死展李非亡情矜貞之卸以放寡宗淸貞之誤善之若此此誣賢負實之言然欲有所抑揚不得不責於髙勝者耳楊朱曰原憲窶於魯子貢殖於衛窶貧也殖貨殖原憲之窶損生子貢之殖累身然則窶亦不可殖亦不可其可焉在曰可在樂生可在逸身故善樂生者不窶足己之所資不至乏匱也善逸身者不殖不勞心以營貨財也楊朱曰古語有之生相憐死相此語至矣相憐之道非唯情也勤能使逸饑能使飽寒能使温窮能使達也相之道非不相哀也不含珠玉不服文錦不陳犠牲不設明器也晏平仲問養生於管夷吾管夷吾曰肆之而巳勿壅勿閼晏平仲曰其目柰何夷吾曰恣耳之所欲聽恣目之所欲視恣鼻之所欲向恣口之所欲言恣體之所欲安恣意之所欲行管仲功名人耳相齊致霸動因威謀任運之道旣非所冝且於事勢不容此言又上篇復能勸桓公適終北之國恐此皆寓言也夫耳之所欲聞者音聲而不得聽謂之閼聦閼塞目之所欲見者美色而不得視謂之閼明鼻之所欲向者椒蘭而不得嗅謂之閼顫鼻通曰顫顫音舒延切口之所欲道者是非而不得言謂之閼智體之所欲安者美厚而不得從謂之閼適意之所欲爲者放逸而不得行謂之閼性凡此諸閼廢虐之生廢大也去廢虐之主熙熙然以俟死一日一月一年十年吾所謂養任情極性窮歡盡娱雖近期促年且得盡當生之樂也拘此廢虐之主録而不舎戚戚然以至久生百年千年萬年非吾所謂養惜名拘禮内懷於矜懼憂苦以至死者長年遐期非所貴也管夷吾曰吾旣告子養生矣送死柰何晏平仲曰送死略矣將何以告焉管夷吾曰吾固欲聞之平仲曰旣死豈在我哉焚之亦可沈之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可衮文繡裳而納諸石椁亦可唯所遇焉晏嬰墨者也自以儉省治身動遵法度非達生死之分所以舉此二賢以明治身者唯取其奢儉之異子管夷吾顧謂鮑叔黃子曰生死之道吾二人進之矣當其有知則制不由物及其无知則非我所聞也子産相鄭專國之政三年善者服其化惡者畏其禁鄭國以治諸侯憚之而有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒干鐘積麴成封望門百歩糟漿之氣逆於人鼻方其荒於酒也不知丗道之安危人理之悔室内之有亡九族之親踈存亡之哀樂也雖水火兵刃交於前弗知也穆之後庭比房數十皆擇稚齒婑媠者婑音烏果切媠音奴坐切以盈之方其於色也屏親昵絶交游逃於後庭以書足夜三月一出意猶未愜郷有處子之娥姣者必賄而招之楳而挑之弗獲而後巳子産日夜以爲戚密造鄧析而謀之曰喬聞治身以及家治家以及國此言自於近至於遠也喬爲國則治矣而家則亂矣其道逆邪將奚方以救二子子其詔之鄧析曰吾怪之久矣未敢先言子奚不時其治也喻以性命之重誘以禮義之尊乎子産用鄧析之言因閒以謁其兄弟而告之曰人之所以貴於禽獸者智慮智慮之所將者禮義禮義成則名位至矣若觸情而動聃於嗜慾則性命危矣子納喬之言則朝自悔而夕食禄矣朝穆曰吾知之久矣擇之亦久矣覺事行多端選所好而爲之耳豈待言而後識之哉凡生之難遇而死之易及以難遇之生俟易及之死可孰念哉而欲尊禮義以夸人矯情性以招名吾以此爲弗死矣達哉此言若夫刻意從俗違性順物失當身之蹔樂懷長愁於一丗雖支體具存實鄰於死者爲欲盡一生之歡窮當年之樂唯患腹溢而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也且以治國之能夸物欲以說辭亂我之心榮禄喜我之意不亦鄙而可憐哉我又欲與别之别之猶辨也夫善治外者物未必治而身交苦善治内者物未必亂而性交逸以之治外其法可蹔行於一國未合於人心以我之治内可推之於天下君臣之道息矣吾常欲以此術而喻之反以彼術而敎我哉子産忙然无以應之他日以告鄧析鄧析曰子與眞人居而不知也孰謂子智者乎鄭國之治偶耳非子之功也不知眞人則不能治國治國者偶爾此一篇辭義太逕挺抑抗不似君子之音氣然其旨欲去自拘束者之累故有過逸之言者耳衞端木叔者子貢之丗也藉其先貲家累萬金不治丗故放意所好其生民之所欲爲人意之所欲玩者无不爲也无不玩也牆屋臺榭園囿池沼飲食車服聲樂嬪御擬齊楚之君焉至其情所欲好耳所欲聽目所欲視口所欲甞雖殊方偏國偏邊非齊土之所産育者无不必致之猶藩牆之物也及其游也雖山川阻險塗逕脩逺无不必之猶人之行咫步也賔客在庭者日百往庖厨之下不絶煙火堂廡之上不絶聲樂奉養之餘先散之宗族宗族之餘次散之邑里邑里之餘乃散之一國行年六十氣幹將衰棄其家事都散其庫藏珍寶車服妾媵一年之中盡焉不爲子孫留財及其病也无藥石之儲及其死也无瘞埋之資達於理者知萬物之无常財賀之蹔聚聚之非我之功也且盡奉養之冝散之非我之施也且明物不常聚斯人者豈名譽所勸禮法所拘哉一國之人受其施者相與賦而藏之反其子孫之財焉禽骨又屈釐聞之曰端木叔狂人也辱其祖矣叚干生聞之曰木叔達人也德過其祖矣其所行也其所爲也聚意所經而誠理所取衞之君子多以禮敎自持固未足以得此人之心也孟孫陽問楊子曰有人於此貴生愛身以蘄不死可乎曰理无不死以蘄久生可乎曰理无久生生非貴之所能存身非愛之所能厚且久生奚爲設令久生亦非所願五情好惡古猶今也四體安危古猶今也丗事苦樂古猶今也變易治亂古猶今也旣聞之矣旣見之矣旣更之矣百年猶厭其多況久生之苦也乎夫一生之經歷如此而巳或好或惡或安或危如循環之无窮以爲樂邪則重來之物无所復欣以爲邪則切已之患不可再經故生彌久而憂彌積也孟孫陽曰然速亡愈於久生則踐鋒刃入湯火得所志矣楊子曰不然旣生則廢而任之究其所欲以侯於死但當肆其情以待終耳將死則廢而任之究其所之以放於盡制不在我則尤所顧戀也无不廢无不任何遽遟速於其閒乎楊朱曰伯成子髙不以一毫利物舎國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一丗汝爲之乎疑楊子貴身太過故發此問也楊子曰丗固非一毛之所濟嫌其不達已趣故亦相荅對也禽子曰假濟爲之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾請言之有侵肌膚獲萬金者爲之乎曰爲之孟孫陽曰有斷一節得一國子爲之乎禽子黙然有閒孟孫陽曰一毛微於肌膚肌膚微於一節省矣省察然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物柰何輕之乎禽子曰吾不能所以荅子然則以子之言問老聃尹則子言當矣聃尹之敎貴身而賤物也以吾言問大禹墨翟則吾言當矣禹翟之敎忘巳而濟物也孟孫陽因顧與其徙說他事楊朱曰天下之美歸之舜禹周孔天下之惡歸之桀紂然而舜耕於河陽陶於雷澤四體不得蹔安口腹不得美厚父母之所不愛弟妹之所不親行年三十不告而娶及受堯之禪年巳長智巳衰商鈞不才禪位於禹戚戚然以至於死此天人窮毒者也鮌治水土績用不就殛諸羽山禹纂業事讎惟荒土功子産不字過門不入身體偏枯手足胼胝及受舜禪卑宫室美紱冕戚戚然以至於死此天人之憂苦者也武王旣終成王幼弱周公攝天子之政邵公不恱四國流言居東三年誅兄放弟僅免其身戚戚然以至於死此天人之危懼者也孔子明帝王之道應時君之聘伐樹於宋削迹於衛窮於商周圍於陳蔡受屈於季氏見辱於陽虎戚戚然以至於死此天民之遑遽者也凡彼四聖者生无一日之歡死有萬丗之名名者固非實之所取也雖稱之弗知雖賞之不知與株塊无以異矣觀形即事憂危之迹著矣求諸方寸未有不嬰拂其心者將明至理之言必舉美惡之極以相對偶者也桀藉累丗之資居南面之尊智足以距羣下威足以震海内恣耳目之所娱窮意慮之所爲熙熈然以至於死此天民之逸蕩者也紂亦藉累丗之資居南面之尊威无不行志无不從肆情於傾宫縱欲於長夜不以禮義自苦熙熈然以至於誅此天民之放縱者也彼二凶也生有從欲之歡死被愚暴之名實者固非名之所與也雖毀之不知雖稱之弗知此與株塊奚以異矣盡驕奢之極恣无厭之性雖養以四海未始愜其心此乃憂苦窮年也彼四聖雖美之所歸苦以至終同歸於死矣彼二凶雖惡之所歸樂以至終亦同歸於死矣楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三之園而不能芸而言治天下如運諸掌何也對曰君見其牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣且臣聞之吞舟之魚不游枝流鴻鵠髙飛不集汙池何則其極逺也黃鐘大吕不可從煩奏之舞何則其音䟽也將治大者不治細成大功者不成小此之謂矣楊朱曰太古之事滅矣孰誌之哉三皇之事存亡五帝之事覺夢三王之事或隱或顯億不識一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀但伏羲巳來三十餘萬嵗賢愚好醜成敗是非无不消滅但遟速之閒耳以遟速而致惑奔競而不巳豈不鄙哉矜一時之毀譽以焦苦其神形要死後數百年中餘名豈足潤枯骨何生之樂哉楊朱曰人肖天地之懷五常之性肖似也同隂陽性稟五行也有生之最靈者人也人者爪牙不足以供守衛肌膚不足以自捍禦趨走不足以逃利害无毛羽以禦寒暑必將資物以爲養性任智而不恃力故智之所貴存我爲貴力之所賤侵物爲賤然身非我有也旣生不得不全之物非我有也旣有不得不去之身固生之主物亦養之主雖全生身不可有其身雖不去物不可有其物有其物有其身是橫私天下之身撗私天下之物其唯聖人乎知身不可私物不可有者唯聖人可也公天下之身公天下之物其唯至人矣此之謂至至者也天下之身同之我身天下之物同之我物非至人如何旣覺私之爲非又知公之爲是故曰至至也楊朱曰生民之不得休息爲四事故一爲壽不敢恣其嗜慾二爲名不敢恣其所行三爲位曲意求通四爲貨專利惜費有此四者畏畏人畏威畏刑此謂之遁人也違其自然者也可殺可活制命在外全則不係於己不逆命何羨壽不矜貴何羨名不要勢何羨位不貪冨何羨貨此之謂順民也得其生理天下无對制命在內外物所不能制故語有之曰人不㛰宦情欲失半人不衣食君臣道息周諺曰田父可坐殺晨出夜入自以性之啜菽茹藿自以味之極肌麤厚筋節急音區位切一朝處以柔毛綈幕薦以蘭橘心㾓體煩内熱生病矣商魯之君與田父侔地則亦不盈一時而憊矣言有所安習者皆不可卒改易況自然乎故野人之所安野人之所美謂天下无過者昔者宋國有田夫常衣緼黂黂亂麻僅以過冬曁春東作自曝於曰不知天下之有廣夏隩室綿纊狐狢顧謂其妻曰負日之煊人莫知者以獻吾君將有重賞里之冨室告之曰昔人有美戎菽甘枲莖芹萍子者對郷豪稱之鄉豪里之貴者郷豪取而甞之蜇於口慘於腹衆哂而怨之其人大慙子此也楊朱曰豐屋美服厚味姣色有此四者何求於外有此而求外者无猒之性无猒之性隂陽之蠧也非但累其身乃侵損正氣忠不足以安君適足以危身義不足以利物適足以害生安上不由於忠而忠名滅焉利物不由於義而義名絶焉君臣皆安物我兼利古之道也鬻子曰去名者无憂老子曰名者實之賔而悠悠者趨名不巳名固不可去名固不可賔邪今有名則尊榮亡名則卑辱尊榮則逸樂卑辱則憂苦憂苦犯性者也逸樂順性者也斯實之所係矣名胡可去名胡可賔但惡夫守名而累實守名而累實將恤危亡之不救豈徒逸樂憂苦之閒哉沖虚至德眞經卷第七
