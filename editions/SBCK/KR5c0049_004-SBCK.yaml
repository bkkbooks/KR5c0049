body:
  text: 列子張湛處度注仲尼第四智者不知而自知者也忘智故无所知用智則无所能知體神而獨運忘情而任理則寂然照者也仲尼閒居子貢入侍而有憂色子貢不敢問子貢雖不及性與天道至於夫子文章究聞之矣聖人之无憂常流所不及況於賜哉所以不敢問者將發明至理惟起余於大賢然後微言乃宣耳出告顔回顔回援琴而歌孔子聞之果召回入問曰奚獨樂回曰夫子奚獨憂回不言欲宣問故歌以激發夫子之言也孔子曰先言爾志曰吾昔聞之夫子曰樂天知命故不憂回所以樂也天者自然之分命者窮達之數也孔子愀然有閒曰有是言哉將明此言之不至故示有疑閒之色汝之意失矣此吾昔日之言爾請以今言爲正也昔日之言因事而興今之所明盡其極也汝徒知樂天知命之无憂未知樂天知命有憂之大也无所不知无所不樂无所不憂故曰大也今告其實脩一身任窮達知去來之非我止變亂於心慮爾之所謂樂天知命之无憂也此直能定内外之分辨榮辱之境如斯而巳豈能无可无不可哉曩吾脩詩書正禮樂將以治天下遺來丗詩書禮樂治丗之具聖人因而用之以救一時之用失其道則无益於理也非但脩一身治魯國而巳夫聖人智周萬物道濟天下安一身救一國非所以爲聖也而魯之君臣日失其序仁義益衰情性益薄此道不行一國與當年其如天下與來丗矣治丗之術實須仁義丗旣治矣則所用之術冝廢㑹盡事終執而不舎則情之者寡而利之者衆衰薄之始誠由於此以一國而觀天下當今而觀來丗致豈異唯圎通无閡者能惟變所適不滯一方吾始知詩書禮樂无救於治亂而未知所以革之之方此樂天知命者之所憂唯棄禮樂之失不棄禮樂之用禮樂故不可棄故曰未知所以革之之方而引此以爲憂者將爲下義張本故先有此言耳雖然吾得之矣夫樂而知者非古人之謂所樂知也莊子曰樂窮通物非聖人故古人不以无樂爲樂亦不以无知為知任其所樂則理自无樂任其所知則理自無知无樂无知是眞樂眞知都无所樂都无所知則能樂天下之樂知天下之知而我无心者也故无所不樂无所不知无所不憂无所不爲居宗體備故能无爲而无不爲也詩書禮樂何棄之有革之何爲欲損詩書易治術者豈救之道即而不去爲而不恃物自全矣顔回北面拜手曰回亦得之矣所謂不違如愚者也出告子貢子貢茫然自失未能盡符至言故遂至自失也歸家淫思七日不寢不食以至骨立發憤思道忘眠食也顔回重往喻之乃反丘門絃歌誦書終身不輟旣悟至理則亡餘事陳大夫聘魯私見叔孫氏叔孫氏曰吾國有聖人曰非孔丘邪曰是也何以知其聖乎至哉此問夫聖人之道絶於羣智之表萬物所不闚擬見其㑹通之迹因謂之聖耳豈識所以聖也叔孫氏曰吾常聞之顔回至哉此荅自非體二備形者何能言其髣髴瞻其先後乎以顔子之量猶不能爲其稱謂况下斯者乎曰孔丘能廢心而用形此顔回之辭夫聖人旣无所廢亦无所用廢用之稱亦因事而生耳故俯仰萬機對接丗務皆形迹之事耳冥絶而灰寂者固泊然而不動矣陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老聃之弟子有亢古郎反又音庚倉子者得聃之道老聃猶不言自得其道亢倉於何得之蓋得名以明至理之不絶於物理者耳能以耳視而目聽夫形質者心智之室宇耳目者視聽之戸牖神茍徹焉則視聽不因戸牖照察不閡牆壁耳魯侯聞之大驚不怪仲尼之用不怪耳目之易任同於物故物无駭心使上卿厚禮而致之亢倉子應聘而至汎然无心者无東西之非巳魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳目之用夫易耳目之用者未是都无所用都无所用者則所假之器廢也魯侯曰此増異矣其道奈何寡人終願聞之亢倉子曰我體合於心此形智不相違者也心合於氣此又逺其形智之用任其泊然之氣也氣合於神此寂然不動都忘其智智而都忘則神理獨運感无不通矣神合於无同无則神矣同神則无矣二者豈有形乎直有其智者不得不親无以自通忘其心者則與无而爲一也其有介然之有唯然之音雖逺在八荒之外近在眉睫之内來干我者我必知之唯豁然之无不干聖慮耳渉於有分神明所照不以逺近爲差也乃不知是我七孔四支之所覺心腹六藏之所知其自知而巳矣所適都忘豈復覺知之至邪魯侯大恱他日以告仲尼仲尼而不荅亢倉言之盡矣仲尼將何所云今以不荅爲苔故之一也商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢丗之所謂聖者據其跡耳豈知所以聖所以不聖者哉然則丘博學多識者也示現愽學多識耳實无所學實无所識也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘不知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知孔丘之博學湯武之干戈堯舜之揖讓羲農之簡朴此皆聖人因丗應務之麤迹非所以爲聖者所以爲聖者固非言迹之所逮者也商太宰大駭丗之所謂聖者孔子皆云非聖商太宰所以大駭也曰然則孰者爲聖孔子動容有閒曰西方之人聖豈有定所哉趣舉絶逺而言之也有聖者焉不治而不亂不以治治之故不可亂也不言而自信言者不信不化而自行爲者則不能化此能盡无爲之極也蕩蕩乎民无能名焉何晏无名論曰爲民所譽則有名者以无譽无名者也夫聖人名无名譽无譽謂无名爲道无譽爲大則夫无名者可以言有名矣无譽者可以言有譽矣然與夫可譽可名者豈同用哉此比於无所有故皆有所有矣而於有所有之中當與无所有相從而與夫有所有者不同同類无遠而相應異无近而不相違譬如隂中之陽陽中之隂各以物自相求從夏日爲陽而夕夜逺與冬日共爲隂冬日爲隂而朝晝逺與夏日同爲陽皆異於近而同於逺也詳此異同而後无名之論可知矣凡所以至於此者何哉夫道者惟无所有者也自天地巳來皆有所有矣然猶謂之道者以其能復用无所有也故雖處有名之域而沒其无名之象由以在陽之逺體而忘其自有隂之逺類也夏侯玄曰天地以自然運聖人以自然用自然者道也道本无名故老氏曰彊爲之名仲尼稱堯蕩蕩无能名焉下云巍巍成功則彊爲之名取丗所知而稱耳豈有名而更當云无能名焉者邪夫唯无名故可得徧以天下之名名之然豈其名也哉惟此足喻而終莫悟是觀泰山崇崛而謂元氣不洁芒者也丘疑其爲聖弗知眞爲聖歟眞不聖歟聖理冥絶故不可擬言唯疑之者也商太宰嘿然心計曰孔丘欺我哉此非常識所及故以爲欺罔也子夏問孔子曰顔回之爲人奚若子曰回之仁賢於丘也曰子貢之爲人奚子曰賜之辯賢於丘也曰子路之爲人奚若子曰由之勇賢於丘也曰子張之爲人奚子曰師之莊賢於丘也猶矜莊子夏避席而問曰然則四子者何爲事天子曰居吾語汝夫回能仁而不能反反變也失守一而不變无權智以應物則所適必閡矣賜能辯而不能訥由能勇而不能怯師能莊而不能同辯而不能訥必虧忠信之實勇而不能怯必傷仁恕之道莊而不能同有違和光之義此皆滯於一方也兼四子之有以易吾吾弗許也子各是一行之極設使兼而有之求變易吾之道非所許此其所以事吾而不貳也㑹同要當之於聖人故欲罷而不能也子列子旣師壺丘子林日損之師友伯昏瞀人乃居南郭從之處者日數而不及來者相尋雖復日日料簡猶不及盡也雖然子列子亦微焉列子亦自不知其數也朝朝相與辯无不聞師徒相與講肄聞於逺近而與南郭子連牆二十年不相謁請其道玄合故至老不相往來也相遇於道目不相見者道存則視廢也門之徒役以爲子列子與南郭子有敵不疑敵讎有自楚來者問子列子曰先生與南郭子奚敵子列子曰南郭子貌充心虛耳无聞目无見口无言心无知形无惕往將奚爲充猶全也心虚則形全矣故耳不惑聲目不滯色口不擇言心不用知内外冥一則形无震動也雖然試與汝偕往閱弟子四十人同行此行也豈復簡優劣計長短數有四十故直而記之也見南郭子果欺魄焉而不可與接欺魄土人也一說云欺頭神凝形喪外物不能得闚之顧視子列子形神不相偶而不可與羣神役形者也心无思慮則貌无動用故似不相攝御豈物所得羣也南郭子俄而指子列子之弟子末行者與言偶在未行非有貴賤之位遇感而應非有心於物也衎衎然專直而在雄者夫理至者无言及其有言則彼我之辯生矣聖人對接俯仰自同於物故觀其形者似求是而尚勝也子列子之徒駭之見其尸居則自同土木見其接物則有是非所以驚反舎咸有疑色欲發列子之言子列子曰得意者无言進知者亦无言窮理體極故言意兼忘用无言爲言亦言无知爲知亦知方欲以无言廢言无知遣知希言傍宗之徒固未免於言知也无言與不言无知亦不知亦言亦知比方亦復欲全自然處无言无知之域此即復是遣无所遣知无所知遣无所遣者未能離遣知无所知者曷甞忘知固非自然而忘言知也亦无所不言亦无所不知亦无所言亦无所知夫无言者有言之宗也无知者有知之主也至人之心豁然洞虚應物而言而非我言即物而知而非我知故終日不言而无亥黙之稱終日用知而无役慮之名故得无所不言无所不知也如斯而巳汝奚妄駭哉不悟至妙之所㑹者更麤至髙之所適者反下而便怪其應寂之異容動止之殊貌非寺驚如何子列子學也上章云列子學寒風之道三年之後心不敢念是非口不敢言利害始得老商一眄而巳五年之後心更念是非口更言利害老商始一解顔而七年之後從心之所念更无是非從口之所言更无利害夫子始一引吾並席而坐眄並坐似有襃貶昇降之情夫聖人之心應事而感以外物少多爲度豈定於方哉一九年之後橫心之所念橫口之所言亦不知我之是非利害歟亦不知彼之是非利害歟外内進矣而後眼如耳耳如鼻鼻如口口无不同心凝形釋骨都融不覺形之所足之所履心之所念言之所藏如斯而巳則理无所隱矣黃帝篇巳有此章釋之詳矣所以重出者先明得性之極則乘變化而无窮後明順心之理則无幽而不照二羣雙出各有攸極可不察哉初子列子好游壷丘子曰禦宼好游游何所好列子曰游之樂所玩无故言所適常所也人之游也觀其所見我之游也觀其所變人謂凡人小人也惟觀榮神珠觀以爲休戚未覺與化俱往勢不暫停游乎游乎未有能辨其游者人與列子游則同所以游則異故曰游乎游乎明二觀之不同也未有辯之者言知之者鮮壷丘子曰禦宼之游固與人同歟而曰固與人異歟凡所見亦見其變苟无蹔停之處則今之所見常非向之所見則觀所以見觀所以變无以爲異者也玩彼物之无故不知我亦无故彼之與我與化俱往務外游不知務内觀外游者求備於物内觀者取足於身取足於身游之至也求備於物游之不至也人雖七尺之形而天地之理備矣故首圎足方取象二儀鼻口窊比象山谷肌連於土壤血脉屬於川瀆温蒸同乎炎火氣息不異風雲内觀諸色靡有一物不備豈須仰觀俯察履淩朝野然後備所見於是列子終身不出自以爲不知游旣聞至言則廢其游觀不出者非自匿於門庭者也壷丘子曰游其至乎向者難列子之言游也未論游之以至故重敘也至游者不知所適至觀者不知所眡内足於已故不知所適反觀於身固不知所眡物物皆游矣物物皆觀矣忘游故能遇物而游忘觀固能遇物而觀是我之所謂游是我之所謂觀也我之所是蓋是无所是耳所適常通而无所凝滯則我之所謂游觀故曰游其至矣乎游其至矣乎龍叔謂文摰曰子之術微矣吾有疾子能巳乎文摰曰唯命所聽然先言子所病之證龍叔曰吾郷譽不以爲榮國毀不以爲辱得而不喜失而弗憂視生如死視富如貧視人如豕无往不齊則視萬物皆无好惡貴賤視吾如人忘彼我也處吾之家如逆旅之舎不有其家觀吾之郷如戎蠻之國天下爲一凡此衆庶爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕隷夫人所以受制於物者以心有美惡體有利害苟能以萬殊爲一貫其視萬物豈覺有无之異故天子所不能得臣諸侯不能得友妻子不能得親僕不能得狎也此奚疾哉奚方能巳之乎文摯乃命龍叔背明而立文摯自後向明而望之旣而曰嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔流通一孔不達舊說聖人心有七孔也今以聖智爲疾者或由此乎非吾淺術所能巳也无所由而常生者道也忘懷任遇通亦通窮亦通其无死地此聖人之道者也由生而生故雖終而不亡常也老子曰死而不亡者壽通攝生之理不失元吉之會雖至於死所以爲生之道常有此賢人之分非能忘懷闇得自然而全者也由生而亡不幸也役智求全貴身賤物違害就利務内役外雖之於死蓋由於不幸也有所由而常死者亦道也行必死之理而之必死之地此事實相應亦自然之道也由死而死故雖未終而自亡者亦常常之於死雖未至於終而生理巳盡亦是理之常也由死而生幸也犯理違順應死而未及於死此誤生者也故无用而生謂之道用道得終謂之常用聖人七道存亡得理也有所用而死者亦謂之道用道而得死者亦謂之常乗凶危之理以害其身亦道之常也季梁之死楊朱望其門而歌盡生順之道以至於亡故无所哀也隨梧之死楊朱撫其尸而哭生不幸而死故可哀也隷人之生隷人之死衆人且歌衆人且哭隷猶羣輩也亦不知所以生亦不知所以死故哀樂失其中或歌或哭也目將眇者先睹秋毫耳將聾者先聞蚋飛口將爽者先辨淄澠爽差也淄澠水異味旣合則難别也將窒者先覺焦朽焦朽有節之氣亦㣲而難别也體將僵者先亟犇佚僵仆也如顔淵知東野之衘馬將奔也與人理亦然心將迷者先識是非目耳口鼻身心此六者常得中和之道則不可側變居亢極之莫不頓盡故物之必先始於盈滿然後之於虧損矣窮上反下極盛必衰自然之數是以聖人居中履和視目之所見聽耳之所聞任體之所能順心之所識故智周萬物終身全具者也故物不至者則不反要造極而後還故聦明強識皆爲闇昧衰迷之所資鄭之圃澤多賢有道德而隱黙者也東里多才有治能而參國政者圃澤之役有伯豐子者役猶弟子行過東里遇鄧析鄧析鄭國辯智之士執爾可之說而時无抗者作竹書子産用之也鄧析顧其徒而曰爲舞彼來者奚丗或謂相朝謂爲舞弄也其徒曰所願知也知猶聞也鄧析謂伯豐子曰汝知養養上音余亮下音余賞之義乎受人養而不能自養者犬豕之類也養物而物爲我用者人之力也使汝之徒食而飽衣而息執政之功也喻彼爲犬豕自以爲執政者也長幼羣聚而爲牢藉庖之物奚異犬豕之類乎伯豐子不應非不能應譏而不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎機巧也多巧能之人有善治土木者有善治金革者有善治聲樂者有善治書數者有善治軍旅者有善治宗廟者羣才備也而无相位者无能相使者事立則有所不周藝成則有所不兼巧偏而智敵者則不能相君衘者也而位之者无知使之者无能而知之與能爲之使焉不能知衆人之所知不能爲衆人之所能羣才並爲之用者不居知能之地而无惡无好无彼无此則以无爲心者也故明者爲視聽者爲聦智者爲謀勇者爲戰而我无事焉荀粲謂傅嘏夏侯曰子等在丗榮問功名勝我識減我耳嘏曰夫能成功名者識也天下孰有本不足而有餘於未者邪荅曰成功名者志也局之所也然則志局自一物也固非識之所獨濟我以能使子等爲貴而未必能濟子之所爲也執政者廼吾之所使子奚矜焉鄧析无以應目其徒而退公儀伯以力聞諸侯堂谿公言之於周宣王王備禮以聘之公儀伯至觀形懦夫也懦弱也音奴亂切宣王心惑而疑曰女之力何如公儀伯曰臣之力能折春螽之股堪秋蟬之翼堪猶勝也王作色曰吾之力者能裂犀兕之革曵九牛之尾猶憾其弱憾恨女折春螽之股堪秋蟬之翼而力聞天下何也公儀伯長息退席曰善哉王之問也臣敢以實對臣之師有商丘子者力无敵於天下而六親不知以未甞用其力故也以至柔之道御物物无與對故其功不顯臣以死事之乃告臣曰人欲見其所不見視人所不窺欲得其所不得修人所不爲人每攻其所難我獨爲其所易故學眎者先見輿薪學聽者先聞撞鍾夫有易於内者无難於外古人有言曰善力舉秋毫善聽聞雷霆亦此之謂也於外无難故名不出其一道道至功故其名不彰也今臣之名聞於諸侯是臣違師之敎顯臣之能者也未能令名迹不顯也然則臣之名不以負其力者也猶免於矜故能致稱以能用其力者也善用其力者不用其力也不猶愈於負其力者乎矜能顯用中山公子牟者魏國之賢公子也公子牟文侯子作書四篇號曰道家魏伐得中山以邑子牟因曰中山公子牟也好與賢人游不恤國事而恱趙人公孫龍公子牟公孫龍似在列子後而今稱之恐後人所增益以廣書義苟於統例无所乖錯而足有所明亦奚傷乎諸如此皆存而不除樂正子輿之徒之公子牟曰子何牟之恱公孫龍也子輿曰公孫龍之爲人也行无師學无友不祖宗聖賢也佞給而不中雖才辯而不合理也漫衍而无家儒墨刑名亂行而无定家好怪而妄言愛竒異而虛誕其辭欲惑人之心屈人之口與韓檀等肄之韓檀人姓名共習其業莊子云桓國公孫龍能勝人之口不能服人之心辯者之固公子牟變容曰何子狀公孫龍之過歟請聞其實不平其言故形於色罪狀龍太過故責其實驗也子輿曰吾龍之詒孔穿孔穿孔子之孫丗記云爲龍弟子詒欺也言善射者能令後鏃中前括發發相及矢矢相屬前矢造準而无絶落後矢之括猶銜弦視之一焉箭相連屬无絶落處前箭著堋後箭復中前箭而後所湊者猶銜弦視之如一物之相連也孔穿駭之龍曰此未其妙者逢蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭烏號黄帝弓綦地名出美箭衞羽也射其目矢來注眸子而眶不睫矢墜地而塵不揚箭行極雖箸而不覺所謂彊弩之末不能穿魯縞也是豈智者之言與公子牟曰智者之言固非愚者之所曉以此言戲子輿後鏃中前括鈞後於前同後發於前發則无不中也近丗有人擲五木百擲百盧者人以爲有道以告王夷甫王夷甫曰此无竒直後擲如前擲耳子嵩聞之曰王公之言闇得理皆此也矢注眸子而眶不睫盡矢之勢也夫能量弓矢之勢逺近之分則入物之與不入在心手之所銓不患所差趺今設令至拙者闇射箭之所至要當其極當其極也則豪分不復進闇其極則隨遠近而制其深淺矣劉道語張叔竒云甞與樂彦輔論此云不必是中賢之所能孔顔射者則必知此湛以為形用之事理之麤者偏得其道則能盡之庖丁之投刃匠石之運斤是偏達於一事不待聖賢而後能爲之也子何疑焉樂正子輿曰子龍之徒焉得不飾其闕吾又言其尤者尤甚龍誑魏王曰有意不心夫心寂然无想者也橫生意慮則失心之本矣有指不至夫以指求至者則必因我以正物因我以正物則未造其極唯忘其所因則彼此玄得矣惠子曰指不至也有物不盡在於麤有之域則常有有在於物盡之際則其一常在其一常在而不可分雖欲損之理不可盡唯因而不損即而不違則泰山之崇崛无氣之浩芒泯然爲一矣惠子曰一尺之桱日取其半萬丗不竭也有影不移夫影因光而生光苟不移則影更生也夫萬物濳變莫不如此而惑者未悟故借喻於影惠子曰飛鳥之影未宜動也髮引千鈞夫物之所以斷絶者必有不均之處處處皆均則不可断故髪雖細而得秤重㫮者至均故也白馬非馬此論見存多有辯之者辯之者皆不弘通故闕而不論也犢未甞有母不詳此義其負反倫不可勝言也負猶背也同也言如此之比皆不可備載也公子牟曰子不諭至言而以爲尤也尤其在子矣尤失反在子輿夫无意則心同同於无也无指則皆至忘指故无所不至也盡物者常有常有盡物之心物旣不盡而心更滯有也影不移者說在改也影改而更生非向之影墨子曰影不移說在改爲也髪引千鈞勢至等也以其至等之故故不絶絶則由於不等故墨子亦有此說也白馬非馬形名離也離猶分也白馬論曰馬者所以命形也白者所以命色也命色者非命形也尋此等語如何可解而猶不歷然孤犢未甞有母非犢也此語近於鄙不可解樂正子輿曰子以公孫龍於馬皆條也言龍之言无異於馬而皆謂有條貫也設令發於餘竅子亦將承之旣疾龍之辯又忿牟之辭故遂吐鄙之慢言也公子牟黙然良乆告退曰請待餘日更謁子論旣忿氣方盛而不可理諭故遜辭告退也堯治天下天下欲治故堯治之五十年不知天下治歟不治歟不知億兆之願戴巳歟不願戴已歟夫道洽於物者則治名滅矣治名旣滅則堯不覺在物上物不覺在堯下顧問左右左右不知問外朝外朝不知問在野在野不知有知者則治道未至也堯乃微服游於康衢聞見童謡曰立我蒸民莫匪爾極不識不知順帝之則蒸衆也夫能使萬物咸得其極者不犯其自然之性也以識知制物之性豈順天之道哉堯喜問曰誰教爾爲此言童見曰我聞之大夫問大夫大夫曰古詩也當今而言古詩則今同於古也堯還宫召舜因禪以天下功成身退舜不辭而受之㑹至而應尹喜曰在己无居汎然无係豈有執守之所形物其箸形物猶事理也事理自明非我之功也其動水順物而動故水也其靜鏡應而不藏故鏡也其應響應而不唱故響也故其道物者也物自違道道不違物同於道者道亦得之善道者亦不用耳亦不用目亦不用力亦不用心唯忘所用乃合道耳欲道而用視聽形智以求之弗當矣瞻之在前忽焉在後用之彌滿六虚廢之莫知其所道豈有前後多少哉隨所求而應之亦非有心者所能得逺亦非无心者所能得近以有心无心而求道則逺近其於非當兩忘有无先後其於无二心矣唯黙而得之而性成之者得之自然无假者則无所失矣知而亡情能而不爲眞知眞能也知極則同於无情能盡則歸於不爲發无知何能情發不能何能爲聚塊也積塵也此則府宅雖无而非理也列子沖虚至德眞經卷第四
