body:
  text: 黃帝第二黄帝即位十有五年喜天下戴己養正命娱耳目供鼻口焦然肌色皯居按切黣昏然五情爽惑又十有五年憂天下之不治竭聰明進智力營百姓焦然肌色皯黣眉回切昏然五情爽惑黄帝乃喟然讚曰朕之過淫矣養一己其患如此治萬物其患如此於是放萬機舍宫寢去直侍徹鐘懸减厨膳退而間居大庭之館齋心服形三月不親政事晝寢而夢遊於華胥氏之國華胥氏之國在弇州之西台州之北不知斯齊國幾千萬里蓋非舟車足力之所及神遊而已其國無帥長自然而已其民無嗜慾自然而已不知樂生不知惡死故無夭殤不知親己不知疏物故無愛憎不知背逆不知向順故無利害都無所愛惜無所畏忌入水不溺入火不熱斫撻無傷痛指擿無痟音簫癢乘空如履實寢虚若處牀雲霧不硋與礙同其視雷霆不亂其聽美惡不滑共心山谷不躓其步神行而已黄帝既寤怡然自得召天老力牧太山稽告之曰朕間居三月齋心服形思有以養身治物之道弗獲其術疲而睡所夢若此今知至道不可以情求矣朕知之矣朕得之矣而不能以告若矣又二十有八年天下大治幾若華胥氏之國而帝登假百姓號之二百餘年不輟列姑射山在海河洲中山上有神人焉吸風飲露不食五穀心如淵泉形如處女不偎不愛仙聖爲之臣不畏不怒原慤爲之使不施不惠而物自足不聚不歛而己無愆陰陽常調日月常明四時常若風雨常均宇育常時年穀常豐而土無札傷人無夭惡物無疵癘鬼無靈響焉列子師老商氏友伯高子進二子之道乘風而歸尹生聞之從列子居數月不省舍因問請蘄其術者十反而十不告尹生懟而請辭列子又不命尹生退數月意不已又往從之列子曰女何去來之頻尹生曰曩章戴有請於子子不我告固有憾於子今復脱然是以又來列子曰曩吾以汝爲達今汝之鄙至此乎姬將告女所學於夫子者矣自吾之事夫子友若人也三年之後心不敢念是非口不敢言利害始得夫子一盻而已五年之後心更念是非口更言利害夫子始一解顔而笑七年之後從心之所念更無是非從口之所言更無利害夫子始一引吾並席而坐九年之後橫心之所念横口之所言亦不知我之是非利害歟亦不知彼之是非利害歟亦不知夫子之爲我師若人之爲我友内外進矣而後眼如耳耳如鼻鼻如口無不同也心凝形釋骨肉都融不覺形之所倚足之所履隨風東西猶木葉幹殻竟不知風乘我邪我乘風乎今女居先生之門曾未浹時而懟憾者再三汝之片體將氣所不受汝之一節將地所不載履虚乘風其可幾乎尹生甚怍屛息良乆不敢復言列子問關尹曰至人潜行不空蹈火不熱行乎萬物之上而不慓請問何以至於此關尹曰是純氣之守也非智巧果敢之列姬魚語女凡有貌像聲色者皆物也物與物何以相遠也夫奚足以至乎先是色而已則物之造乎不形而止乎無所化夫得是而窮之者焉得而正焉彼將處乎不深之度而藏乎無端之紀游乎萬物之所終始壹其性養其氣含其德以通乎物之所造夫若是者其天守全其神無却物奚自入焉夫醉者之墜於車也雖疾不死骨節與人同而犯害與人異其神全也乘亦弗知也墜亦弗知也死生驚懼不入乎其胸是故遻物而不慴彼得全於酒而猶若是而況得全於天乎聖人藏於天故物莫之能傷也列禦寇爲伯昏無人射引之盈貫措盃水其肘上發之鏑矢復沓方矢復寓當是時也猶象人也伯昏無人曰是射之射非不射之射也當與汝登高山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖禦寇而進之禦寇伏地汗流至踵伯昏無人曰夫至人者止闚青天下潜黄泉揮斥八極神氣不變今汝怵然有恂目之志爾於中也殆矣夫范氏有子曰子華善養私名舉國服之有寵於晋君不仕而居三卿之右目所偏視晋國爵之口所偏肥晋國黜之遊其庭者侔於朝子華使其俠客以智鄙相攻强弱相凌雖傷破於前不用介意終日夜以此爲戲樂國殆成俗禾生子伯范氏之上客出行經坰外宿於田更商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘於饑寒潜於牖北聽之因假糧荷畚之子華之門子華之門徒皆世族也縞衣乘軒緩步闊視顧見商丘開年老力弱面目黧黑衣冠不檢莫不眲之仍吏切既而狎侮欺詒儻止兩切㧙必結切挨倚海切抌勇主切亡所不爲商丘開常無愠容而諸客之技單憊於戲笑遂與商丘開俱乘高臺於衆中漫言曰有能自投下者賞百金衆皆競應商丘開以爲信然遂先投下形若飛鳥揚於地𩨒骨無䃣范氏之黨以爲偶然未詎怪也因復指河曲之淫隈曰彼中有寳珠泳可得也商丘開復從而泳之既出果得珠焉衆昉同疑子華昉令豫肉食衣帛之次俄而范氏之藏大火子華曰若能入火取錦者從所得多少賞若商丘開往無難色入火往還埃不漫身不焦范氏之黨以爲有道乃共謝之曰吾不知子之有道而誕子吾不知子之神人而辱子子其愚我也子其聾我也子其盲我也敢問其道商丘開曰吾亡道雖吾之心亦不知所以雖然有一於此試與子言之曩子二客之宿吾舍也聞譽范氏之勢能使存者亡亡者存富者貧貧者富吾誠之無二心故不遠而來及來以子黨之言皆實也唯恐誠之之不至行之之不及不知形體之所措利害之所存也心一而物亡迕者如斯而已今昉知子黨之誕我我内藏猜慮外矜觀聽追幸昔日之不焦溺也怛然内熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝弗知乎夫至信之人可以感物也動天地感鬼神橫六合而無逆者豈但履危險入水火而已哉商丘開信僞物猶不逆況彼我皆誠哉小子識之周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之類無不柔馴者雌雄在前孳尾成羣異類雜居不相搏噬也王慮其術終於其身令毛丘園傳之梁鴦曰鴦賤役也何術以告爾懼王之謂隱於爾也且一言我養虎之法凡順之則喜逆之則怒此有血氣者之性也然喜怒豈妄發哉皆逆之所犯也夫食虎者不敢以生物與之爲其殺之之怒也不敢以全物與之爲其碎之之怒也時其饑飽達其怒心虎之與人異類而媚養己者順也故其殺之逆也然則吾豈敢逆之使怒哉亦不順之使喜也夫喜之復也必怒怒之復也常喜皆不中也令吾心無逆順者也則鳥獸之視吾猶其儕也故遊吾園者不思高林曠澤寢吾庭者不願深山幽谷理使然也顔回問乎仲尼曰吾嘗濟乎觴深之淵矣津人操舟若神吾問焉曰操舟可學邪曰可能游者可教也善游者數能乃若夫没人則未嘗見舟而謖操之者也吾問焉而不告敢問何謂也仲尼曰𧮒吾與若玩其文乆矣而未達其實而固且道與能游者可教也輕水也善游者之數能也忘水也乃若夫没人之未嘗見舟也而謖操之也彼視淵若陵視舟之覆猶其車却也覆却萬物方陳乎前而不得入其舍惡往而不暇以瓦摳者巧以鈎摳者憚以黄金摳者惛巧一也而有所矜則重外也凡重外者拱内孔子觀於吕梁懸水三十仞流沫三十里黿鼉魚鼈之所不能游也見一丈夫游之以爲似有苦而欲死者也使弟子並流而承之數百步而出被髮行歌而游於棠行孔子從而問之曰吕梁懸水三十仞流沫三十里黿鼉魚鼈所不能游向吾見子道之以爲有苦而欲死者使弟子並流將承子子出而被髮行歌吾以子爲鬼也察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齎俱入與汨偕出從水之道而不爲私焉此吾所以道之也孔子曰何謂始乎故長乎性成乎命也曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也仲尼適楚出於林中見痀瘻者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月纍現音九二而不墜則失者錙銖纍三而不墜則失者十一纍五而不墜猶掇之也吾處也若橛株駒吾執臂若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲而不得孔子顧謂弟子曰用志不分乃疑於神其痀瘻丈人曰汝逢衣徒也亦何知問是乎修汝所以而後載言其上海上之人有好漚鳥者每旦之海上從漚鳥游漚鳥之至者百住而不止其父曰吾聞漚鳥皆從汝游汝取來吾玩之明日之海上漚鳥舞而不下也故曰至言去言至爲無爲齊智之所知則淺矣趙襄子率徒十萬狩於中山籍芿燔林扇赫百里有一人從石壁中出隨煙燼上下衆謂鬼物火過徐行而出若無所經涉者襄子怪而留之徐而察之形色七竅人也氣息音聲人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火襄子曰而向之所出者石也而向之所涉者火也其人曰不知也魏文侯聞之問子夏曰彼何人哉子夏曰以商所聞夫子之言和者大同於物物無得傷閡者游金石踏水火皆可也文侯曰吾子奚不爲之子夏曰刳心去智商未之能雖然試語之有暇矣文侯曰夫子奚不爲之子夏曰夫子能之而能不爲者也文侯大說有神巫自齊來處於鄭命曰季咸知人死生存亡禍福壽夭期以歲月旬日如神鄭人見之皆避而走列子見之而心醉而歸以告壺丘子曰始吾以夫子之道爲至矣則又有至焉者矣壺子曰吾與女既其文未既其實而固得道歟衆雌而無雄而又奚卵焉而以道與世抗必信矣夫故使人得而相汝嘗試與來以予示之明日列子與之見壺子出而謂列子曰譆子之先生死矣弗活矣不可以旬數矣吾見怪焉見濕灰焉列子入涕泣沾衿以告壺子壺子曰向吾示之以地文罪合作萌乎不誫合作震不止是殆見吾杜德幾也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣灰然有生矣吾見杜權矣列子入告壺子壺子曰向吾示之以天壤名實不入而幾發於踵此爲杜權是殆見吾善者幾也嘗又與來明日又與之見壺子出而謂列子曰子之先生坐不齋吾無得而相焉試齋將且復相之列子入告壺子壺子曰向吾示之以太冲莫朕是殆見吾衡氣幾也鯢旋之潘爲淵止水之潘爲淵流水之潘爲淵濫水之潘爲淵沃水之潘爲淵沈水之潘爲淵雍水之潘爲淵汧水之潘爲淵肥水之潘爲淵是爲九淵焉嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之而不及反以報壺子曰已滅矣已失矣吾不及也壺子曰向吾示之以未始出吾宗吾與之虚而猗移不知其誰何因以爲茅靡因以爲波流故逃也然後列子自以爲未始學而歸三年不出爲其妻爨食狶如食人於事無親雕琢復朴塊然獨以其形立㤋然而封戎壹以是終子列子之齊中道而反遇伯昏瞀人伯昏瞀人曰奚方而反曰吾驚焉惡乎驚吾食於十漿而五漿先饋伯昏瞀人曰若是則汝何爲驚已曰夫内誠不解形諜成光以外鎮人心使人輕乎貴老而𩐎其所患夫漿人特爲食羹之貨無多餘之嬴其爲利也薄其爲權也輕而猶若是而況萬乘之主身勞於國而智盡於事彼將任我以事而效我以功吾是以驚伯昏瞀人曰善哉觀乎汝處已人將保汝矣無幾何而往則户外之屨滿矣伯昏瞀人北面而立敦杖蹙之乎頤立有間不言而出賔者以告列子列子提履徒跣而走暨乎門問曰先生既來曾不廢藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無汝保也而焉用之感也感豫出異且必有感也揺而本身又無謂也與汝遊者莫汝告也彼所小言盡人毒也莫覺莫悟何相孰也楊朱南之沛老聃西遊於秦邀於郊至梁而遇老子老子中道仰天而嘆曰始以汝爲可教今不可教也楊朱不答至舍進涫漱巾櫛脱履户外膝行而前曰向者夫子仰天而嘆曰始以汝爲可教今不可教弟子欲請夫子辭行不間是以不敢今夫子問矣請問其過老子曰而睢睢而盱盱而誰與居大白若辱盛德若不足楊朱蹙然變容曰敬聞命矣其往也舍者迎將家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣楊朱過宋東之於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤楊子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也楊子曰弟子記之行賢而去自賢之行安往而不愛哉天下有常勝之道有不常勝之道常勝之道曰柔常不勝之道曰强二者亦知而人未之知故上古之言强先不己若者柔先出於己者先不己若者至於若己則殆矣先出於己者無所殆矣以此勝一身若徒以此任天下若徒謂不勝而自勝不任而自任也粥子曰欲剛必以柔守之欲强必以弱保之積於柔必剛積於弱必强觀其所積以知禍福之鄉强勝不若己至於若己者剛柔勝出於己者其力不可量老聃曰兵强則滅木强則折柔弱者生之徒堅强者死之徒狀不必童而智童智不必童而狀童聖人取童智而遺童狀衆人近童狀而疏童智狀與我童近而愛之狀與我異者疏而畏之有七尺之骸手足之異戴髮舍齒倚而趣者謂之人而未必無獸心雖有獸心以狀而見親矣傳翼戴角分牙布爪仰飛伏走謂之禽獸而禽獸未必無人心雖有人心以狀而見疏矣疱犧氏女蝸氏神農氏夏后氏蛇身人面牛首虎鼻此有非人之狀而有大聖之德夏桀殷紂魯桓楚穆狀貌七竅皆同於人而有禽獸之心而衆人守一狀以求至智未可幾也黄帝與炎帝戰於阪泉之野帥熊羆狼豹貙虎爲前驅鵰鵾鷹鳶爲旗幟此以力使禽獸者也堯使夔典樂擊石拊石百獸率舞簫韶九成鳳凰來儀此以聲致禽獸者也然則禽獸之心奚爲異人形音與人異而不知接之之道焉聖人無所不知無所不通故得引而使之焉禽獸之智有自然與人童者其齊欲攝生亦不假智於人也牝牡相偶母子相親避平依險違寒就温居則有群行則有列小者居内壯者居外飲則相携食則鳴群太古之時則與人同處與人並行帝王之時始驚駭散亂矣逮於末世隱伏逃竄以避患害今東方介氏之國其國人數數解六畜之語者蓋偏知之所得太古神聖之人備知萬物情態悉解異類音聲會而聚之訓而受之同於人民故先會鬼神魑魅次達八方人民末聚禽獸蟲蛾言血氣之類心智不殊遠也神聖知其如此故其所教訓者無所遺逸焉宋有狙公者愛狙養之成羣能解狙之意狙亦得公之心損其家口充狙之欲俄而匱焉將限其食恐衆狙之不馴於己也先誑之曰與若芧朝三而暮四足乎衆狙皆起而怒俄而曰與若芧朝四而暮三足乎衆狙皆伏而喜物之以能鄙相籠皆猶此也聖人以智籠羣愚亦猶狙公之以智籠衆狙也名實不虧使其喜怒哉紀渻子爲周宣王養鬥鷄十日而問鷄可鬥已乎曰未也方虚驕而恃氣十日又問曰未也猶應影響十日又問曰未也猶疾視而盛氣十日又問曰幾矣鷄雖有鳴者已無變矣望之似木鷄矣其德全矣異鷄無敢應者反走耳惠盎見宋康王康王蹀足聲欬疾言曰寡人之所說者勇有力也不說爲仁義者也客將何以教寡人惠盎對曰臣有道於此使人雖有勇刺之不入雖有力擊之弗中大王獨無意邪宋王曰善此寡人之所欲聞也惠盎曰夫刺之不入擊之不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力弗敢擊夫弗敢非無其志也臣有道於此使人本無其志也夫無其志者未有愛利之心也臣有道於此使天下丈夫女子莫不驩然皆欲愛利之此其賢於勇有力也四累之上也大王獨無意邪宋王曰此寡人之所欲得也惠盎對曰孔墨是已孔丘墨翟無地而爲君無官而爲長天下丈夫女子莫不延頸舉踵而願安利之今大王萬乘之主也誠有其志則四境之内皆得其利矣其賢於孔墨也遠矣宋王無以應惠盎趨而出宋王謂左右曰辯矣客之以說服寡人也沖虚至德眞經卷上
