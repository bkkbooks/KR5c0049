body:
  text: 周穆王第三周穆王時西極之國有化人來入水火貫金石反山川移城邑乘虚不墜觸實不硋千變萬化不可窮極既已變物之形又且易人之慮穆王敬之若神事之若君推路寢以居之引三牲以進之選女樂以娱之化人以爲王之宫室卑陋而不可處王之厨饌腥螻而不可饗王之嬪御膻惡而不可親穆王乃爲之改築土木之功赭堊之色無遺巧焉五府爲虚而臺始成其高千仞臨終南之上號曰中天之臺簡鄭衛之處子娥媌靡曼者施芳澤正娥眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環雜芷若以滿之奏承雲六瑩九韶晨露以樂之月月獻玉衣旦旦薦玉食化人猶不舍然不得已而臨之居亡幾何謁王同遊王執化人之袪騰而上者中天迺止暨及化人之宫化人之宫搆以金銀絡以珠玉出雲雨之上而不知下之據望之若屯雲焉耳目所觀聽鼻口所納嘗皆非人間之有王實以爲清都紫微鈞天廣樂帝之所居王俯而視之其宫榭若累塊積蘇焉王自以居數十年不思其國也化人復謁王同游所及之處仰不見日月俯不見河海光影所照王曰眩不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還化人移之王若碩虚焉既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未昲方微切王問所從來左右曰王默存耳由此穆王自失者三月而復更問化人化人曰吾與王神游也形奚動哉且曩之所居奚異王之宫曩之所游奚異王之圃王間恒疑蹔亡變化之極疾徐之間可盡模哉王大悦不恤國事不樂臣妾肆意遠游命駕八駿之乘右服𦽊音華騮而左緑耳右驂赤驥而左白𣚘音義主車則造父爲御𧮼齊𠱛合爲右次車之乘右服渠黄而左踰輪左驂盜驪而右山子栢夭主車叁百爲御奔戎爲右馳驅千里至于巨蒐氏之國巨蒐氏乃獻白鵠之血以飲王具牛馬之湩以洗王之足及二乘之人已飲而行遂宿于崑崙之阿赤水之陽别日升崑崙之丘以觀黄帝之宫而封之以貽後世遂賔于西王母觴于瑶池之上西王母爲王謡王和之其辭哀焉迺觀日之所入一日行萬里王乃歎曰於乎于一人不盈于德而諧於樂後世其追數吾過乎穆王幾神人哉能窮常身之樂猶百年乃徂世以爲登假焉老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生揖而進之於室屏左右而與之言曰昔老聃之徂西也顧而告予曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深固難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉老成子歸用尹文先生之言深思三月遂能存亡自在幡校四時冬起雷夏造冰飛者走走者飛終身不著其術故世莫傳焉子列子曰善爲化者其道密庸其功同人五帝之德三王之功未必盡智勇之力或由化而成孰測之哉覺有八徴夢有六候奚謂八徴一曰故二曰爲三曰得四曰喪五曰哀六曰樂七曰生八曰死此者八徴形所接也奚謂六候一曰正夢二曰蘁夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也不識感變之所起者事至則惑其所由然識感變之所起者事至則知其所由然知其所由然則無所怛一體之盈虚消息皆通於天地應於物類故陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫陰陽俱壯則夢生殺甚飽則夢與甚飢則夢取是以以浮虚爲疾者則夢揚以沈實爲疾者則夢溺藉帶而寢則夢蛇飛鳥銜髮則夢飛將陰夢火將疾夢食飲酒者憂歌儛者哭子列子曰神遇爲夢形接爲事故晝想夜夢神形所遇故神凝者想夢自消信覺不語信夢不達物化之往來者也古之眞人其覺自忘其寢不夢幾虚語哉西極之南隅有國焉不知境界之所接名古莽之國陰陽之氣所不交故寒暑亡辨日月之光所不照故晝夜亡辨其民不食不衣而多眠五旬一覺以夢中所爲者實覺之所見者妄四海之齊謂中央之跨河南北越岱東西萬有餘里其陰陽之審度故一寒一暑昏明之分察故一晝一夜其民有智有愚萬物滋殖才藝多方有君臣相臨禮法相持其所云爲不可稱計一覺一寐以爲覺之所爲者實夢之所見者妄東極之北隅有國曰阜落之國其土氣常燠日月餘光之照其土不生嘉苗其民食草根木實不知火食性剛悍强弱相藉貴勝而不尚義多馳步少休息常覺而不眠周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣而使之彌勤晝則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢爲國君居人民之上總一國之事游燕宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝爲僕虜苦則苦矣夜爲人君其樂無比何所怨哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐背昔夢爲人僕趨走作役無不爲也數駡杖撻無不至也眠中啽囈呻呼徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人遠矣夜夢爲僕苦逸之復數之常也若欲覺夢兼之豈可得邪尹氏聞其友言寬其役夫之程减己思慮之事疾並少間鄭人有薪於野者過駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以爲夢焉順途而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之彼直眞夢者矣室人曰若將是夢見薪者之得鹿邪詎有薪者邪今眞得鹿是若之夢眞邪夫曰吾據得鹿何用知彼夢我夢邪薪者之歸不厭失鹿其夜眞夢藏之之處又夢得之之主爽旦案所夢而尋得之遂訟而爭之歸之士師士師曰若初眞得鹿妄謂之夢眞夢得鹿妄謂之實彼眞取若鹿而與若爭鹿室人又謂夢仞人鹿無人得鹿今據有此鹿請二分之以聞鄭君鄭君曰嘻士師將復夢分人鹿乎訪之國相國相曰夢與不夢臣所不能辨也欲辯覺夢唯黄帝孔丘今亡黄帝孔丘孰辨之哉且恂士師之言可也宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾有瘳乎於是試露之而求衣饑之而求食幽之而求明儒生欣然告其子曰疾可已也然吾之方密傳世不以告人試屛左右獨與居室七日從之莫知其所施爲也而積年之疾一朝都除華子既悟廼大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不知天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須臾之忘可復得乎子貢聞而怪之以告孔子孔子曰此非汝所及乎顧謂顔回記之秦人逢氏有子少而惠及壯而有迷罔之疾聞歌以爲哭視白以爲黑饗香以爲朽嘗甘以爲苦行非以爲是意之所之天地四方水火寒暑無不倒錯者焉楊氏告其父曰魯之君子多術藝將能已乎汝奚不訪焉其父之魯過陳遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之言未必非迷况魯之君子迷之郵者焉能解人之迷哉榮汝之糧不若遄歸也燕人生於燕長於楚及老而還本國過晋國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而嘆指舍曰此若先人之廬乃涓然而泣指壠曰此若先人之冢其人哭不自禁同行者啞然大笑曰予昔紿若此晋國耳其人大慙及至燕眞見燕國之城社眞見先人之廬冢悲心更微
