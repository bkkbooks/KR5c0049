body:
  text: 湯間第五殷湯問於夏革曰古初有物乎夏革曰古初無物今惡得物後之人將謂今之無物可乎殷湯曰然則物無先後乎夏革曰物之終始初無極已始或爲終終或爲始惡知其紀然自物之外自事之先朕所不知也殷湯曰然則上下八方有極盡乎革曰不知也湯固問革曰無則無極有則有盡朕何以知之然無極之外復無無極無盡之中復無無盡無極復無無極無盡復無無盡朕以是知其無極無盡也而不知其有極有盡也湯又問曰四海之外奚有革曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也朕以是知四海四荒四極之不異是也故大小相含無窮極也含萬物者亦如含天地含萬物也固不窮含天地也故無極朕亦焉知天地之表不有大天地者乎亦吾所不知也然則天地亦物也物有不足故昔者女媧氏練五色石以補其闕斷鼇之足以立四極其後共工氏與顓頊爭爲帝怒而觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉湯又問物有巨細乎有修短乎有同異乎革曰渤海之東不知幾億萬里有大壑焉實惟無底之谷其下無底名曰歸墟八紘九野之水天漢之流莫不注之而無增無减焉其中有五山焉一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊其山高下周旋三萬里其頂平處九千里山之中間相去七萬里以爲鄰居焉其上臺觀皆金玉其上禽獸皆純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相往來者不可數焉而五山之根無所連著常隨潮波上下往還不得蹔峙焉仙聖毒之訴之於帝帝恐流於西極失羣聖之居乃命禺疆使巨鼇十五舉首而戴之迭爲三番六萬歲一交焉五山始峙而不動而龍伯之國有大人舉足不盈數步而暨五山之所一釣而連六鼇合負而趣歸其國灼其骨以數焉於是岱輿貟嶠二山流於北極沉於大海仙聖之播遷者巨億計帝憑怒侵减龍伯之國使阨侵小龍伯之民使短至伏羲神農時其國人猶數千丈從中州以東四十萬里得僬僥國人長一尺五寸東北極有人名曰諍人長九寸荆之南有冥靈者以五百歲爲春五百歲爲秋上古有大樁者以八千歲爲春八千歲爲秋朽壤之上有菌芝者生於朝死於晦春夏之月有蠓蚋者因雨而生見陽而死終髮北之北有溟海者天池也有魚焉其廣數千里其長稱焉其名爲鯤有鳥焉其名爲鵬翼若垂天之雲其體稱焉世豈知有此物哉大禹行而見之伯益知而名之夷堅聞而志之江浦之間生麽蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形𧣾丑豸文余普弭三切俞師曠方夜擿耳俛首而聽之弗聞其聲唯黄帝與容成子居空同之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲吴楚之國有大木焉其名爲櫾碧樹而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北而化爲枳焉鸜鵒不踰濟貉踰汶則死矣地氣然也雖然形氣異也性鈞已無相易已生皆全已分皆足已吾何以識其巨細何以識其脩短何以識其同異哉大形王屋二山方七百里高萬仞本在冀州之南河陽之北北山愚公者年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險指通豫南達于漢陰可乎雜然相許其妻獻疑曰以君之力曾不能損魁父之丘如太形王屋何且焉置土石雜曰投諸渤海之尾隱土之北遂率子孫荷擔者三夫叩石墾壤箕畚運於渤海之尾鄰人京城氏之孀妻有遺男始齓跳往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曾不能毁山之一毛其如土石何北山愚公長息曰汝心之固固不可徹曾不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子又生子子又生孫子子孫孫無窮匱也而山不加增何若而不平河曲智叟亡以應操蛇之神聞之懼其不已也告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南自此冀之南漢之陰無隴斷焉夸父不量力欲追日影逐之於隅谷之際渴欲得飲赴飲河渭河渭不足將走北飲大澤未至道渴而死棄其杖尸膏肉所浸生鄧林鄧林彌廣數千里焉大禹曰六合之間四海之内照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物其形或夭或壽唯聖人能通其道夏革曰然則亦有不待神靈而生不待陰陽而形不待日月而明不待殺戮而夭不待將迎而壽不待五穀而食不待繒纊而衣不待舟車而行其道自然非聖人之所通也禹之治水土也迷而失塗謬之一國濱北海之北不知距齊州幾千萬里其國名曰終北不知際畔之所齊限無風雨霜露不生鳥獸蟲魚草木之類四方悉平周以喬陟當國之中有山山名壺領狀若甔甄頂有口狀若貟環名曰滋穴有水湧出名曰神瀵臭過蘭椒味過醪醴一源分爲四埒注於山下經營一國亡不悉徧土氣和亡札厲人性婉而從物不競不爭柔心而弱骨不驕不忌長幼儕居不君不臣男女雜游不媒不聘縁水而居不耕不稼土氣温適不織不衣百年而死不夭不病其民孳阜亡數有喜樂亡衰老哀苦其俗好聲相携而迭謡終日不輟音饑倦則飲神瀵力志和平過則醉經旬乃醒沐浴神瀵膚色脂澤香氣經旬乃歇周穆王北游過其國三年忘歸既反周室慕其國𢠵然自失不進酒肉不召嬪御者數月乃復管仲勉齊桓公因遊遼口俱之其國幾尅舉隰朋諫曰君舍齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬視撝則諸侯從命亦奚羨於彼而棄齊國之社稷從戎夷之國乎此仲父之耄奈何從之桓公乃止以隰明之言告管仲仲曰此固非朋之所及也臣恐彼國之不可知之也齊國之富奚戀隰朋之言奚顧南國之人祝髮而祼北國之人鞨巾而裘中國之人冠冕而裳九土所資或農或商或田或漁如冬裘夏葛水舟陸車默而得之性而成之越之東有輒休之國其長子生則鮮而食之謂之宜弟其大父死負其大母而棄之曰鬼妻不可與同居處楚之南有炎人之國其親戚死㱙與咼同其肉而棄之然後埋其骨迺成爲孝子秦之西有儀渠文康之國者其親戚死聚柴積而焚之燻則煙上謂之登遐然後成爲孝子此上而爲政下以爲俗而未足爲異也孔子東游見兩小兒辨鬥問其故一兒曰我以日始出時去人近而日中時遠也一兒以日初出遠而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不爲遠者小而近者大乎一兒曰日初出則滄滄凉凉及其日中如探湯此不爲近者熱而遠者凉乎孔子不能决也兩小兒笑曰孰爲汝多知乎均天下之至理也連於形物亦然均髮均縣輕重而髮絶髮不均也均也其絶也莫絶人以爲不然自有知其然者也詹何以獨繭絲爲綸芒鍼爲鈎荆蓧爲竿剖粒爲餌引盈車之魚於百仞之淵汩流之中綸不絶鈎不伸竿不撓楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也弱弓纖繳乘風振之連雙鶬於青雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈釣手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕致重也大王治國誠能若此則天下可運於一握將亦奚事哉楚王曰善魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今爲汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志彊而氣弱故足於謀而寡於斷齊嬰志弱而氣彊故少於慮而傷於專若换汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃已瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄游柱指鈞絃三年不成章師襄曰子可以歸矣師文舍其琴嘆曰文非絃之不能鈞非章之不能成文所存者不在絃所志者不在聲内不得於心外不應於氣故不敢發手而動絃且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商絃以召南吕凉風忽至草木成實及秋而叩角絃以激夾鍾温風徐回草木發榮當夏而叩羽絃以召黄鍾霜雪交下川池暴沍及冬而叩徴絃以激蕤賔陽光熾烈堅冰立散將終命宫而總四絃則景風翔慶雲浮甘露降澧泉涌師襄乃撫心高蹈曰微矣子之彈也雖師曠之清角鄒衍之吹律亡以加之彼將挾琴執管而從子之後耳薛譚學謳於秦青未窮青之技自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲薛譚乃謝求反終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之娥還復爲曼聲長歌一里老幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之故雍門之人至今善歌哭效娥之遺聲伯牙善鼓琴鍾子期善聽伯牙鼓琴志在登高山鍾子期曰善哉峨峨兮若泰山志在流水鍾子期曰善哉洋洋兮若江河伯牙所念鍾子期必得之伯牙游於泰山之陰卒逢暴雨止於巖下心悲乃援琴而鼓之初爲霖雨之操更造崩山之音曲每奏鍾子期輒窮其趣伯牙乃舍琴而歎曰善哉善哉子之聽夫志想象猶吾心也吾於何逃聲哉周穆王西巡狩越崑崙不至弇山反還未及中國道有獻工人名偃師穆王薦之問曰若有何能偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰日以俱來吾與若俱觀之越日偃師謁見王王薦之曰若與偕來者何人對曰臣之所造能倡者穆王驚視之趣步俯仰信人也巧夫鎮其頤則歌合律捧其乎則舞應節千變萬化唯意所適王以爲實人也與盛姬内御並觀之技將終倡者瞬其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傳會革木膠漆白黑丹青之所爲王諦料之内則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也而無不畢具者合會復如初見王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王始悦而歎曰人之巧乃可與造化者同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東門賈禽滑釐聞偃飾之巧以告二子二子終身不敢語藝而時執規矩甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學射於甘蠅而巧過其師紀昌者又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃卧其妻之機下以自承牽挺二年之後雖錐末倒眥而不瞬也以告飛衛飛衛曰未也必學視而後可視小如大視微如著而後告我昌以氂懸虱於牖南面而望之旬日之間浸大也三年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛高蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先窮紀昌遺一矢既發飛衛以棘剌之端扞之而無差焉於是二子泣而投弓相拜於塗請爲父子尅臂以誓不得告術於人造父之師曰泰豆氏造父之始從習御也執禮甚卑泰豆三年不告造父執禮愈謹乃告之曰古詩言良弓之子必先爲箕良冶之子必先爲裘汝先觀吾趣趣如吾然後六轡可持六馬可御造父曰唯命所從泰豆乃立木爲塗僅可容足計步而置履之而行趣走往還無跌失也造父學之三日盡其巧泰豆歎曰子何其敏也得之捷乎凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎轡銜之際而急緩乎脣吻之和正度於胸臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進退履繩而旋曲中規矩取道致遠而氣力有餘誠得其術也得之於銜應之於轡得之于轡應之於手得之於手應之於心則不以目視不以策驅心閑體正六轡不亂而二十四蹄所投無差迴旋進退莫不中節然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之魏黑卵以暱嫌殺丘邴章丘邴章之子來丹謀報父之讎丹氣其猛形甚露計粒而食順風而趣雖怒不能稱兵以報之恥假力於人誓手劍以屠黑卵黑卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔推屈而體無痕撻負其才力視來丹猶雛鷇也來丹之友申他曰子怨黑卵至矣黑卵之易子過矣將奚謀焉來丹垂涕曰願子爲我謀申他曰吾聞衛孔周其袓得殷帝之寳劍一童子服之却三軍之衆奚不請焉來丹遂適衛見孔周執僕御之禮請先納妻子後言所欲孔周曰吾有三劍唯子所擇皆不能殺人且先言其狀一曰含光視之不可見運之不知其有所觸也泯然無際經物而物不覺二曰承影將旦昧爽之交旦夕昏明之際北面而察之淡淡焉若有物存莫識其狀其所觸也竊竊焉有聲經物而物不疾也三曰宵練方晝則見影而不見光方夜見光而不見形其觸物也𩦐然而過隨過隨合覺疾而不血刃焉此三寳者傳之十三世矣而無施於事匣而藏之未嘗啓封來丹曰雖然吾必請其下者孔周乃歸其妻子與齋七日晏陰之間跪而授其下劍來丹再拜受之以歸來丹遂執劍從黑卵時黑卵之醉偃牖下白頸至腰三斬之黑卵不覺來丹以黑卵之死趣而退遇黑卵之子於門擊之三下如投虚黑卵之子方笑曰汝何蚩而三招予來丹知劍之不能殺人也歎而歸黑卵既醒怒其妻曰醉而露我使我嗌疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支彊彼其厭我哉周穆王大征西戎西戎獻錕鋙之劍火浣之布其劍長尺有咫練鋼赤刃用之切玉如切泥焉火浣之布浣之必投於火布則火色垢則布色出火而振之皓然疑乎雪皇子以爲無此物傳之者妄蕭叔曰皇子果於自信果於誣理哉沖虚至德眞經卷中沖虚至德眞經卷下慕九力命第六力謂命曰若之功奚若我哉命曰汝奚功於物而欲比朕力曰壽夭窮達貴賤貧富我力之所能也命曰彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽四八仲尼之德不出諸侯之下而困於陣蔡殷紂之行不出三仁之上而居君位季札無爵於吴田恒專有齊國夷齊餓于首陽季氏富於展禽若是汝力之所能奈何壽彼而夭此窮聖而達逆賤賢而貴愚貧善而富惡邪力曰若如是言我固無功於物而物若此耶此則若之所制邪命曰既謂之命奈何有制之者邪朕直而推之曲而任之自壽自夭逢窮自達自貴自賤自富自貧朕豈能識之哉朕豈能識之
