body:
  text: 說符第八子列子學於壺丘子林壺丘子林曰子知持後則可言持身矣列子曰願聞持後曰顧若影則知之列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈伸任物而不在我此之謂持後而處先關尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也故曰慎爾言將有和之慎爾行將有隨之是故聖人見出以知入觀往以知來此其所以先知之理也度在身稽在人人愛我我必愛之人惡我我必惡之湯武愛天下故王桀紂惡天下故亡此所稽也稽度皆明而不道也譬之出不由門行不從徑也以是求利不亦難乎嘗觀之神農有炎之德稽之虞夏商周之書度諸法士賢人之言所以存亡廢興而非由此道者未之有也嚴恢曰所爲問道者爲富今得珠亦富矣安用道子列子曰桀紂唯重利而輕道是以亡幸哉余未汝語也人而無義唯食而已是鷄狗也彊食靡用勝者爲制是禽獸也爲鷄狗禽獸矣而欲人之尊己不可得也人不尊己則危辱及之矣列子學射中矣請於關尹子尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子尹子曰子知子之所以中乎列子曰知之矣關尹子曰可矣守而勿失也非獨射也爲國與身亦皆如之故聖人不察存亡而察其所以然列子曰色盛者驕力盛者奮未可以語道也故不班白語道失而况行之乎故自奮則人莫之告人莫之告則孤而無輔矣賢者任人故年老而不衰智盡而不亂故治國之難在於知賢而不在自賢宋人有爲其君以玉爲楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧子列子窮容貌有飢色客有言之鄭子陽者曰列禦寇蓋有道之士也居君之國而窮君無乃爲不好士乎鄭子陽即令官遺之粟子列子出見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆使佚樂今有飢色君過而遺先生食先生不受豈不命也哉子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯納之以爲諸公子之傳好兵者之楚以法干楚王王悦之以爲軍正禄富其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘於貧羨施氏之有因從請進趣之方二子以實告孟氏孟氏之一子之秦以術干秦王秦王曰當今諸侯力爭所務兵食而已若用仁義治吾國是滅亡之道遂宫而放之其一子之衛以法干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求安之道若賴兵權滅亡可待矣若全而歸之適於他國爲吾之患不輕矣遂刖之而還諸魯既反孟氏之父子叩胸而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之謬也且天下理無常是事無常非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投隙抵時應事無方屬乎智智苟不足使若博如孔丘術如吕尚焉往而不窮哉孟氏父子舍然無愠容曰吾知之矣子勿重言晋文公出會欲伐衛公子鋤仰天而笑公問何笑曰臣笑鄰之人有送其妻適私家者道見桑婦悦而與言然顧視其妻亦有招之者矣臣竊笑此也公寤其言乃止引師而還未至而有伐其北鄙者矣晋國苦盜有郄乞逆切雍者能視盜之貌察其眉睫之間而得其情晋侯使視盜千百無遺一焉晋侯喜告趙文子曰吾得一人而一國盜爲盡矣奚用多爲文子曰吾君恃伺察而得盜盜不盡矣且郄雍必不得其死焉俄而羣盜謀曰吾所窮者郄雍也遂共盜而殘之晋侯聞而大駭立召文子而告之曰果如子言郄雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之爲於是用隨會知政而羣盜奔秦焉孔子自衛反魯息駕乎河梁而觀焉有懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居也意者難可以濟乎丈夫不以錯意遂度而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信錯吾軀於波流而吾不敢用私所以能入而復出者以此也孔子謂弟子曰二三子識之水且猶可以忠信誠身親之而況人乎白公問孔子曰人可與微言乎孔子不應白公問曰若以石投水何如孔子曰吾之善没者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可與微言乎孔子曰何爲不可唯知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至爲無爲夫淺知之所爭者末矣白公不得已遂死於浴室趙襄子使新穉穆子攻翟勝之取左人中人使遽人來謁之襄子方食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾今趙氏之德行無所施於積一朝而兩城下亡其及我哉孔子聞之曰趙氏其昌乎夫憂者所以爲昌也喜者所以爲亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吴越皆常勝矣然卒取亡焉不達乎持勝也唯有道之主爲能持勝孔子之勁能拓國門之關而不肯以力聞墨子爲守攻公輸般服而不肯以兵知故善持勝者以强爲弱宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先迕後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者太半此人以父子有疾皆免及圍解而疾俱復宋有蘭子者以技干宋元宋元召而使見其技以雙枝長倍其身屬其脛並趨並馳弄七劍迭而躍之五劍常在空中元君大驚立賜金帛又有蘭子又能燕戲者聞之復以干元君元君大怒曰昔有異技干寡人者技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天下之馬者若滅若没若亡若失若此者絶塵弭𨅊臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纏薪菜者有九方臯此其於馬非臣之下也請見之穆公見之使行求馬三月而反報曰已得之矣在沙丘穆公曰何馬也對曰牝而黄使人往取之牡而驪穆公不說召伯樂而謂之曰敗矣子所使求馬者色物牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其麄在其内而忘其外見其所見不見其所不見視其所視而遺其所不視若辠之相者乃有貴乎馬者也馬至果天下之馬也楚莊王問詹何曰治國奈何詹何對曰臣明於治身而不明於治國也楚莊王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也又未嘗聞身亂而國治者也故本在身不敢對以末楚王曰善狐丘丈人謂叔孫敖曰人有三怨子知之乎叔孫敖曰何謂也對曰爵高者人妬之官大者主惡之禄厚者怨逮之叔孫敖曰吾爵益高吾志益下吾官益大吾心益小吾禄益厚吾施益博以是免於三怨可乎叔孫敖疾將死戒其子曰王亟封我矣吾不受也爲我死王則封汝汝必無受利地楚越之間有寢丘者此地不利而名甚惡楚人鬼而越人機可長有者唯此也叔孫敖死果以美地封其子子辭而不受請寢丘與之至今不失牛缺者上地之大儒也下之邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之歡然亡憂吝之色盜進而問其故曰君子不以所養害其所養盜曰嘻賢矣夫既而相謂曰以彼之賢往見趙君使以我爲必困我不如殺之乃相與追而殺之燕人聞之聚族相戒曰遇盜莫如上地之牛缺也皆受教俄而其弟適秦至關下果遇盜憶其兄之戒因與盜力爭既而不如又追而以卑辭請物盜怒曰吾活汝弘矣而追吾不已迹將著焉既爲盜矣仁將焉在遂殺之又傍害其黨四五人焉虞氏者梁之富人也家充殷盛錢帛無量財貨無訾登高樓臨大路設樂陳酒擊博樓上俠客相隨而行樓上博者射明瓊張中反兩㯓記盍切魚而笑飛鳶適墜其腐鼠而中之俠客相與言曰虞氏富樂之日乆矣而常有輕易人之志吾不侵犯之而乃辱我以腐鼠此而不報無以立慬渠客叵靳二切於天下請與若等戮力一志率徒屬必滅其家爲等倫皆許諾至期日之夜聚衆積兵以攻虞氏大滅其家東方有人焉曰爰旌目將有適也而餓於道狐父之盜曰丘見而下壺餐以餔之爰旌目三餔而後能視曰子何爲者也曰我狐父之人丘也爰旌目曰譆汝非盜邪胡爲而餐我吾義不食子之食也兩手據地而嘔之不出喀喀切嘔也然遂伏而死孤父之人則盜矣而食非盜也以人之盜因謂食爲盜而不敢食是失名實者也柱厲叔事莒敖公自爲不知已去居海上夏日則食菱芰冬日則食橡栗莒敖公有難柱厲叔辭其友而往死之其友曰子自以爲不知已故去今往死之是知與不知無辨也柱厲叔曰不然自以爲不知故去今死是果不知我也吾將死之以醜後世之人主不知其臣者也凡知則死之不知則弗死此直道而行者也柱厲叔可謂懟以忘其身者也楊朱曰利出者實及怨往者害來發於此而應於外者唯請是故賢者慎所出楊子之鄰人亡羊既率其黨又請楊子之竪追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路既反問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知所之所以反也楊子戚然變容不言者移時不笑者竟日門人怪之請曰羊賤畜又非夫子之有而損言笑者何哉楊子不答門人不獲所命弟子孟孫陽出以告心都子心都了他日與孟孫陽偕入而問曰昔有昆弟三人游齊魯之間同師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名仲曰仁義使我殺身以成名叔曰仁義使我身名並全彼三術相反而同出於儒孰是孰非邪楊子曰人有濱河而居者習於水勇於泅操舟鬻渡利供百口褁糧就學者成徒而溺死者幾半本學泅不學溺而利害如此若以爲孰是孰非心都子默然而出孟孫陽讓之曰何吾子問之迂夫子答之僻吾惑愈甚心都子曰大道以多岐亡羊學者以多方喪生學非本不同非本不一而末異若是唯歸同反一爲亡得喪子長先生之門習先生之道而不達先生之況也哀哉楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗不知迎而吠之楊布怒將扑之揚朱曰子無扑矣子亦猶是也嚮者使汝狗白而往黑而來豈能無怪哉楊朱曰行善不以爲名而名從之名不與利期而利歸之利不與爭期而爭及之故君子必慎爲善昔人有言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死己所重者莫過乎生彼自喪其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而笑之曰夫所欲學不死其人已死而猶恨之是不知所以爲學胡子曰富子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言而不能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚爲不能言生術哉邯鄲之民以正月之旦獻鳩於簡子簡子大悦厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之故競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰然齊田氏祖於庭食客千人中坐有獻魚雁者田氏視之乃歎曰天之於民厚矣殖五穀生魚鳥以爲之用衆客和之如響鮑氏之子年十二預於次進曰不如君言天地萬物與我並生類也類無貴賤徒以小大智力而相制迭相食非相爲而生之人取可食者而食之豈天本爲人生之是蚊蚋噆膚虎狼食肉非天本爲蚊蚋生人虎狼生肉者哉齊有貧者常乞於城市城市患其亟也衆莫之與遂適田氏之廐從馬醫作役而假食郭中人戲之曰從馬醫而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬醫哉宋人有遊於道得人遺契者歸而藏之密數其齒告鄰人曰吾富可待矣人有枯梧樹者其鄰父言枯梧之樹不祥其鄰人遽而伐之鄰人父因請以爲薪其人乃不悦曰鄰人之父從欲爲薪而教吾伐之也與我鄰若此其險豈可哉人有亡鈇者意其鄰之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無爲而不竊鈇也俄而抇音掘其谷而得其鈇他日復見其鄰人之子動作態度無似竊鈇者白公勝慮亂罷朝而立倒校策錣張剖切策端有鐵也上貫頤血流至地而弗知也鄭人聞之曰頤之忘將何不忘哉意之所屬者其行足躓株塪頭柢植木而不自知也昔齊人有欲金者清旦衣冠而之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金沖虚至德眞經卷下
