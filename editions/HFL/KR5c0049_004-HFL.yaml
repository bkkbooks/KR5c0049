body:
  text: 仲尼第四仲尼閑居子貢入侍而有憂色子貢不敢問出告顔回顔回援琴而歌孔子聞之果召回入問曰若奚獨樂回曰夫子奚獨憂孔子曰先言爾志曰吾昔聞之夫子曰樂天知命故不憂回所以樂也孔子愀然有間曰有是言哉汝之意失矣此吾昔日之言爾請以今言爲正也汝徒知樂天知命之無憂未知樂天知命有憂之大也今告若其實脩一身任窮達知去來之非我亡變亂於心慮爾之所謂樂天知命之無憂也曩吾脩詩書正禮樂將以治天下遺來世非但脩一身治魯國而已而魯之君臣曰失其序仁義益衰情性益薄此道不行一國與當年其如天下與來世矣吾始知詩書禮樂無救於治亂而未知所以革之之方此樂天知命者之所憂雖然吾得之矣夫樂而知者非古人之所謂樂知也無樂無知是眞樂眞知故無所不樂無所不知無所不憂無所不爲詩書禮樂何棄之有革之何爲顔回北面拜手曰回亦得之矣岀告子貢子貢茫然自失歸家淫思七日不寢不食以至骨立顔回重往喻之乃反丘門弦歌誦書終日不輟陳大夫聘魯私見叔孫氏叔孫氏曰吾國有聖人曰非孔丘邪曰是也何以知其聖乎叔孫氏曰吾嘗聞之顔回曰孔丘能廢心而用形陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老聃之弟子有亢倉子者得聃之道能以耳視而目聽魯侯聞之大驚使上卿厚禮而致之亢倉子應聘而至魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳曰之用魯侯曰此增異矣其道奈何寡人終願聞之亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之内來干我者我必知之乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣魯侯大悦他日以告仲尼仲尼笑而不答商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘博學多識者也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘弗知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者爲聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其爲聖弗知眞爲聖歟眞不聖歟商太宰默然心計曰孔丘欺我哉子夏問孔子曰顔回之爲人奚若子曰回之仁賢於丘也曰子貢之爲人奚若子曰賜之辯賢於丘也曰子路之爲人奚若子曰由之勇賢於丘也曰子張之爲人奚若子曰師之莊賢於丘也子夏避席而問曰然則四子者何爲事夫子曰居吾語汝夫回能仁而不能反賜能辯而不能訥由能勇而不能怯師能莊而不能同兼四子之有以易吾吾弗許也此其所以事吾而不貳也子列子既師壺丘子林友伯昏瞀人乃居南郭從之處者日數而不及雖然子列子亦微焉朝朝相與辯無不聞而與南郭子連墻二十年不相謁請相遇於道目若不相見者門之徒役以爲子列子與南郭子有敵不疑有自楚來者問子列子曰先生與南郭子奚敵子列子曰南郭子貌充心虚耳無聞曰無見口無言心無知形無惕往將奚爲雖然試與汝偕往閲弟子四十人同行見南郭子果若欺魄焉而不可與接顧視子列子形神不相偶而不可與羣南郭子俄而指子列子之弟子未行者與言衎衎若專直而在雄者子列子徒駭之反舍咸有疑色子列子曰得意者無言進知者亦無言用無言爲言亦言無知爲知亦知無言與不言無知與不知亦言亦知亦無所不言亦無所不知亦無所言亦無所知如斯而已汝奚妄駭哉子列子學也三年之後心不敢念是非口不敢言利害始得老商一眄而已五年之後心更念是非曰更言利害老商始一解顔而笑七年之後從心之所念更無是非從口之所言更無利害夫子始一引吾並席而坐九年之後橫心之所念橫口之所言亦不知我之是非利害歟亦不知彼之是非利害歟外内進矣而後眼如耳耳如鼻鼻如口口無不同心凝形釋骨肉都融不覺形之所倚足之所履心之所念言之所藏如斯而已則理無所隱矣初子列子好游壺丘子曰禦寇好游游何所好列子曰游之樂所玩無故人之游也觀其所見我之游也觀其所變游乎游乎未有能辨其游者壺丘子曰禦寇之游固與人同歟而曰固與人異歟凡所見亦恒見其變玩彼物之無故不知我亦無故務外游不知務内觀外游者求備於物内觀者取足於身取足於身游之至也求備於物游之不至也於是列子終身不出自以爲不知游壺丘子曰游其至乎至游者不知所適至觀者不知所眂物物皆游矣物物皆觀矣是我之所謂游是我之所謂觀也故曰游其至矣乎游其至矣乎龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以爲榮國毁不以爲辱得而不喜失而弗憂視生如死視富如貧視人如豕視吾如人處吾之家如逆旅之舍觀吾之鄉如戎蠻之國凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕隸此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯自後向明而望之既而曰嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔流通一孔不達今以聖智爲疾者或由此乎非吾淺術所能已也無所由而常生者道也由生而生故雖終而不亡常也由生而亡不幸也有所由而常死者亦道也由死而死故雖未然而自亡者亦常也由死而生幸也故無用而生謂之道用道得終謂之常有所用而死者亦謂之道用道而得死者亦謂之常季梁之死楊朱望其門而歌隨梧之死楊朱撫其尸而哭隸人之生隸人之死衆人且歌衆人且哭目將眇者先覩秋毫耳將聾者先聞蚋飛口將爽者先辨淄澠鼻將窒者先覺焦朽體將僵者先亟奔佚心將迷者先識是非故物不至者則不反鄭之圃澤多賢東里多才圃澤之役有伯豐子者行過東里遇鄧析鄧析顧其徒而笑曰爲若舞彼來者奚若其徒曰所願知也鄧析謂伯豐子曰汝知養養之義乎受人養而不能自養者犬豕之類也養物而物爲我用者人之力也使汝之徒食而飽衣而息執政之功也長幼群聚而爲牢籍庖厨之物奚異大豕之類乎伯豐子不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎有善治土木者有善治金革者有善治聲樂者有善治書數者有善治軍旅者有善治宗廟者羣才備也而無相位者無能相使者而位之者無知使之者無能而知之與能爲之使焉執政者乃吾之所使子奚矜焉鄧析無以應目其徒而退公儀伯以力聞諸侯堂谿公言之於周宣王王備禮以聘之公儀伯至觀形懦夫也宣王心惑而疑曰女之力何如公儀伯曰臣之力能折春螽之股堪秋蟬之翼王作色曰吾之力者能裂犀兕之革曳九牛之尾猶憾以弱女折春螽之股堪秋蟬之翼而力聞天下何也公儀伯長息退席曰善哉王之問也臣敢以實對臣之師有商丘子者力無敵於天下而六親不知以未嘗用其力故也臣以死事之乃告臣曰人欲見其所不見視人所不窺欲得其所不得修人所不爲故學視者先見輿薪學聽者先聞撞鐘夫有易於内者無難於外於外無難故名不出於一家今臣之名聞於諸侯是臣違師之教顯臣之能者也然則臣之名不以負其力者也以能用其力者也不猶愈於負其力者乎中山公子牟者魏國之賢公子也好與賢人游不恤國事而悦趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悦公孫龍也子輿曰公孫龍之爲人也行無師學無友佞給而不中漫衍而無家好怪而妄言欲惑人之心屈人之口與韓檀等肄之公子牟變容曰何子狀公孫龍之過歟請聞其實子輿曰吾笑龍之詒孔穿言善射者能令後鏃中前括發發相及矢矢相屬前矢造準而無絶落後矢之括猶銜弦視之若一焉孔穿駭之龍曰此未其妙者遠蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢來注眸子而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰智者之言固非愚者之所曉後鏃中前括鈞後於前矢注眸子而眶不睫盡矢之勢也子何疑焉樂正子輿曰子龍之徒焉得不飾其闕吾又言其尤者龍誑魏王曰有意不心有指不至有物不盡有影不移髮引千鈞白馬非馬孤犢未嘗有母其負類反倫不可勝言也公子牟曰子不諭至言而以爲尤也尤其在子矣夫無意則心同無指則皆至盡物者常有影不移者說在改也髮引千鈞勢至等也白馬非馬形名離也孤犢未嘗有母非孤犢也樂正子輿曰子以公孫龍之鳴皆條也設令發於餘竅子亦將承之公子牟默然良乆告退曰請待餘日更謁子論堯治天下五十年不知天下治歟不治歟不知億兆之願戴己歟不願戴己歟顧問左右左右不知問外朝外朝不知問在野在野不知堯乃微服游於康衢聞童兒謡曰立我蒸民莫菲爾極不識不知順帝之則堯喜問曰誰教爾爲此言童兒曰我聞之大夫問大夫大夫曰古詩也堯還宫召舜因禪以天下舜不辭而受之關尹喜曰在已無居形物其著其動若水其靜若鏡其應若響故其道若物者也物自違道道不違物善若道者亦不用耳亦不用目亦不用力亦不用心欲若道而用視聽形智以求之弗當矣瞻之在前忽焉在後用之彌滿六虚廢之莫知其所亦非有心者所能得遠亦非無心者所能得近唯默而得之而性成之者得之知而忘情能而不爲眞知眞能也發無知何能情發不能何能爲聚塊也積塵也雖無爲而非理也
