front:
  text: 哉北宫子謂西門子曰朕與子並世也而人子達並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則短褐食則粢糲居則蓬室出則徒行子衣則文錦食則粱肉居則連欐山宜切出則結駟在家熙然有棄朕之心在朝諤然有敖朕之色請謁不相及遨遊不同行固有年矣子自以德過朕邪西門子曰予無以知其實汝造事而窮予造事而達此厚薄之驗歟而皆謂與予並汝之顔厚矣北宫子無以應自失而歸中塗遇東郭先生先生曰汝奚往而反偊偊而步有深愧之色邪北宫子言其狀東郭先生曰吾將舍汝之愧與汝更之西門氏而問之曰汝奚辱北宫子之深乎固且言之西門子曰北宫子言世族年貌言行與予並而賤貴貧富與予異予語之曰予無以知其實汝造事而窮予造事而達此將厚薄之驗歟而皆謂與予並汝之顔厚矣東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宫子厚於德薄於命汝厚於命薄於德汝之達非智得也北宫子之窮非愚失也皆天也非人也而汝以命厚自矜北宫子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣予不敢復言北宫子既歸衣其短褐有狐貉之温進其茙菽有稻粱之味庇其蓬室若廣厦之蔭乘其蓽輅若文軒之飾終身逌然不知榮辱之在彼在我也東郭先生聞之曰北宫子之寐久矣一言而能寤易悟也哉管夷吾鮑叔牙二人相友甚戚同處於齊管夷吾事公子糾鮑叔牙事公子小白齊公族多寵嫡庶並行國人懼亂管仲與召忽奉公子糾奔魯鮑叔奉公子小白奔莒既而公孫無知作亂齊無君二公子爭入管夷吾與小白戰於莒道射中小白既立脅魯殺子糾召忽死之管夷吾被囚鮑叔牙謂桓公曰管夷吾能可以治國桓公曰我讎也願殺之鮑叔牙曰吾聞賢君無私怨且人能爲其主亦必能爲人君如欲霸王非夷吾其弗可君必舍之遂召管仲魯歸之齊鮑叔牙郊迎釋其囚桓公禮之而位於高國之上鮑叔牙以身下之任以國政號曰仲父桓公遂霸管仲嘗歎曰吾少窮困時嘗與鮑叔牙賈分財多自與鮑叔不以我爲貪知我貧也吾嘗爲鮑叔謀事而大窮困鮑叔不以我爲愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我爲不肖知我不遭時也吾嘗三戰三北鮑叔不以我爲怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我爲無恥知我不羞小節而恥名不顯於天下也生我者父母知我者鮑叔也此世稱管鮑善交者小白善用能者然實無善交實無用能也實無善交實無用能者非更有善交更有善用能也召忽非能死不得不死鮑叔非能舉賢不得不舉小白非能用讎不得不用及管夷吾有病小白問之曰仲父之病病矣可不諱云至於大病則寡人惡乎屬國而可夷吾曰公誰欲歟小白曰鮑叔牙可曰不可其爲人潔廉善士也其於不已若者不比之人一聞人之過終身不忘使之埋國上且鈎乎君下且逆乎民其得罪於君也將弗乆矣小白曰然則孰可對曰勿已則隰朋可其爲人也上忘而下不叛愧其不若黄帝而哀不已若者以德分人謂之聖人以財分人謂之賢人以賢臨人未有得人者也以賢下人者未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可然則管夷吾非薄鮑叔也不得不薄非厚隰朋也不得不厚厚之於始或薄之於終或厚之於始厚薄之去來弗由我也鄧析操兩可之說設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之然則子産非能用竹刑不得不用鄧析非能屈子産不得不屈子産非能誅鄧析不得不誅也可以生而天福也可以死而死天福也可以生而不生天罰也可以死而不死天罰也可以生可以死得生得死有矣不可以生不可以死或死或生有矣然而生生死死非物非我皆命也智之所無奈何故曰窈然無際天道自會漠然無分天道自運天地不能犯聖智不能干鬼魅不能欺自然者默之成之平之寧之將之迎之楊朱之友曰季梁季梁得疾七日大漸其子環而泣之請醫季梁謂楊朱曰吾子不肖如此之甚汝奚不爲我歌以曉之楊朱歌曰天其弗識人胡能覺匪祐自天弗孽由人我乎汝乎其弗知乎醫乎巫乎其知之乎其子弗曉終謁三醫一曰矯氏二曰俞氏三曰廬氏診其所疾矯氏謂季梁曰汝寒温不節虚實失度病由飢飽色慾精慮煩散非天非鬼雖漸可攻也季梁曰衆醫也亟屛之俞氏曰女始則胎氣不足乳湩有餘病非一朝一夕之故其所由來漸矣弗可已也季梁曰良醫也且食之廬氏曰汝疾不由天亦不由人亦不由鬼禀生受形既有制之者矣亦有知之者矣藥石其如汝何季梁曰神醫也重貺遺之俄而季梁之疾自瘳生非貴之所能存身非愛之所能厚生亦非賤之所能夭身亦非輕之所能薄故貴之或不生賤之或不死愛之或不厚輕之或不薄此似反也非反也此自生自死自厚自薄或貴之而生或賤之而死或愛之而厚或輕之而薄此似順也非順也此亦自生自死自厚自薄鬻熊語文王曰自長非所增自短非所損算之所亡若何老聃語關尹曰天之所惡孰知其故言迎天意揣利害不如其已楊布問曰有人於此年兄弟也才兄弟也貌兄弟也而壽夭父子也貴賤父子也名譽父子也愛憎父子也吾惑之楊子曰古之人有言吾嘗識之將以告若不知所以然而然命也今昏昏昧昧紛紛若若隨所爲隨所不爲日去曰來孰能知其故皆命也夫信命者亡壽夭信理者亡是非信心者亡逆順信性者亡安危則謂之都亡所信都亡所不信眞矣慤矣奚去奚就奚哀奚樂奚爲奚不爲黄帝之書云至人居若死動若械亦不知所以居亦不知所以不居亦不知所以動亦不知所以不動亦不以衆人之觀易其情貎亦不謂衆人之不觀不易其情貌獨往獨來獨出獨入孰能礙之墨音眉杘敕夷女履二切單音戰至音咥嘽豈然切咺許元火遠二切憋蒲結切懯芳無切四人相與游於世胥如志也窮年不相知情自以智之深也巧佞愚直婩魚踐午漢二切斫夫約切便辟四人相與游於世胥如志也窮年而不相語術自以巧之微也㺒何交切㤉午交魚駕二切情露讓許偃居辰二切極凌誶四人相與游於世胥如志也窮年不相曉悟自以爲才之得也眠莫典切娗徒典切諈主蘂切諉勇敢怯疑四人相與游於世胥如志也窮年不相讁發自以行無戾也多偶自專乘權隻立四人相與游於世胥如志也窮年不相顧眄自以時之適也此衆態也其貌不一而咸之於道命所歸也佹佹俱爲切成者俏仙妙切成也初非成也佹佹敗者俏敗者也初非敗也故迷生於俏俏之際昧然於俏而不昧然則不駭外禍不喜内福隨時動隨時止智不能知也信命者於彼我無二心於彼我而有二心者不若揜目塞耳背坂面隍亦不墜仆也故曰死生自命也貧窮自時也怨夭折者不知命者也怨貧窮者不知時者也當死不懼在窮不威知命安時也其使多智之人量利害料虚實度人情得亦中亡亦中其少智之人不量利害不料虚實不度人情得亦中亡亦中量與不量料與不料度與不度奚以異唯亡所量亡所不量則全而亡喪亦非知全亦非知喪自全也自亡也自喪也齊景公游於牛山北臨其國城而流涕曰美哉國乎鬱鬱芊芊若何滴滴去此國而死乎使古無死者寡人將去斯而之何史孔梁丘據皆從而泣曰臣賴君之賜跪食惡肉可得而食駑馬稜車可得而乘也且猶不欲死而況吾君乎晏子獨笑於旁公雪涕而顧晏子曰寡人今日之游悲孔與據皆從寡人而泣子之獨笑何也晏子對曰使賢者常守之則太公桓公將常守之矣使有勇者而常守之則莊公靈公將常守之矣數君者將守之吾君方將披簑笠而立乎畎畝之中唯事之恤行假念死乎則吾君又安得此位而立焉以其迭處之迭去之至於君也而獨爲之流涕是不仁也見不仁之君見謟諛之臣臣見此二者臣之所爲獨竊笑也景公慙焉舉觴自罰罰二臣者各二觴焉魏人有東門吴者其子死而不憂其相室曰公之愛子天下無有今子死不憂何也東門吴曰吾常無子無子之時不憂今子死乃與嚮無子同詎奚憂焉農赴時商趣利工追術仕逐勢勢使然也然農有水旱商有得失工有成敗仕有遇否命使然也
