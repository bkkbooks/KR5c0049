body:
  text: 於衛故列子叩其二端使萬物自求其中苟得其中則智動者不以權力亂其素分矜名者不以矯抑虧其形生發言之旨其在於斯嗚呼覽者可不察哉北宫子謂西門子曰朕與子並丗也而人子達並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則豆褐食則粢糲居則蓬室出則徒行子衣則文錦食則居則連欐出則結駟在家熈然有棄朕之心在朝諤然有敖朕之色請謁不相及遨游不同行固有年矣子自以德過朕邪西門子曰予无以知其實汝造事而窮予造事而達此厚薄之驗歟謂德有厚薄也而皆謂與子並汝之顔厚矣北宫子无以應自失而歸中塗遇東郭先生先生曰汝奚往而反偊偊而歩有深愧之色邪北宫子言其東郭先生曰吾將舎汝之愧與汝更之西門氏而問之曰汝奚辱北宫子之深乎固且言之西門子曰北宫子言丗族年貌言行與予並而賤貴貧冨與予異予語之曰子无以知其實汝造事而窮予造事而達此將厚薄之驗歟而皆謂與予並汝之顔厚矣東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宫子厚於徳薄於命汝厚於命薄於德汝之達非智得也北宫子之窮非愚失也皆天也非人也此自然而然非由人事巧拙也而汝以命厚自矜北宫子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣予不敢復言聞理而服北宫子旣歸衣其豆褐有狐貉之温進其莪菽有稻之味庇其蓬室廣厦之䕃乗其蓽輅若文軒之飾終身逌然不知榮辱之在彼也在我也一達於理則外物多少不足以槩意也東郭先生聞之曰北宫子之寐久矣一言而能寤易悟也哉管夷吾鮑叔牙二人相友甚戚同處於齊管夷吾事公子糾鮑叔牙事公子小白齊公族多寵嫡庶並行齊僖公母弟夷仲年生公孫无知僖公爱之令禮䄮同於太子也國人懼亂管仲與召忽奉公子糾奔魯糾襄公之次弟鮑叔奉公子小白奔莒小白糾之夫弟旣而公孫无知作亂襄公立絀无知秩服遂殺襄公而自立國人㝷殺之齊无君二公子爭入管夷吾與小白戰於莒道射中小白帶鉤小白旣立小白即桓公也脅魯殺子糾召忽死之管夷吾被囚齊告魯曰子糾兄弟弗忍加誅請殺之召忽管仲讎也請得而甘心醢之不然將滅魯魯患之遂殺子糾召忽自殺管仲請囚也鮑叔牙謂桓公曰管夷吾能可以治國桓公曰我讎也願殺之鮑叔牙曰吾聞賢君无私怨且人能爲其主亦必能爲人君如欲霸王非夷吾其弗可君必舎之遂召管仲魯歸之齊鮑叔牙郊迎釋其囚桓公禮之鮑叔親迎管仲於堂阜而脫其桎拾於齊郊而見桓公也而位於髙國之上鮑叔牙以身下之髙國齊之丗族任以國政號曰仲父桓公遂霸管仲甞歎曰吾少窮困人賈分財多自與鮑叔不以我爲貪知我貧也吾甞爲鮑叔謀事而大窮困鮑叔不以我爲愚知時有利不利也吾甞三仕三見逐於君鮑叔不以我爲不肖知我不遭時也吾甞三戰三北鮑叔不以我爲怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我爲无恥知我不羞小節而恥名不顯於天下也生我者父母知我者鮑叔也此丗稱管鮑善交者小白善用能者然實无善交實无用能也實无善交實无用能者非更有善交更有善用能也此明理无善交用能非但管鮑桓公而巳召忽非能死不得不死鮑叔非能舉賢不得不舉小白非能用讎不得不用此皆冥中自相驅使非人理所制也及管夷吾有病小白問之曰仲父之病病矣可不諱云言病之甚不可復諱而不言也至於大病則寡人惡乎屬國而可夷吾曰公誰欲歟小白曰鮑叔牙可曰不可其爲人㓗廉善士也清巳而巳其於不已者不比之人欲以已善齊物也一聞人之過終身不忘不能棄瑕録善使之理國上且鉤乎君下且逆乎民必引君令其道不道苟不弘則逆民而不能納矣其得罪於君也將弗久矣小白曰然則孰可對曰勿巳則隰朋可非君然而可也其爲人也上忘而下不叛居髙而自忘則不憂下之離散愧其不黃帝而哀不已者慙其道之不及聖矜其民之不逮巳故能无棄人也以德分人謂之聖人化之使合道而不宰割也以財分人謂之賢人旣以與人巳愈有也以賢臨人未有得人者也求備於人則物所不與也以賢下人者未有不得人者也與物升降者物必歸其於國有不聞也其於家有不見也道行則不煩聞見故曰不瞽不聾不能成功勿巳則隰朋可郭象曰若有聞見則事鍾於己而羣下无所措其手足故遺之可也未能盡其道故僅之可也然則管夷吾非薄鮑叔也不得不薄非厚隰朋也不得不厚厚之於始或薄之於終薄之於終或厚之於始厚薄之去來弗由我也皆天理也鄧析操兩可之說設无窮之辭當子産執政作竹刑竹刑简法鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之此傳云子産誅鄧析左傳云駟歂殺鄧析而用其竹刑子産卒後二十年而鄧析死也然則子産非能用竹刑不得不用鄧析非能屈子産不得不屈子産非能誅鄧析不得不誅也此義例與上章同也可以生而生或積德履仁或遇時而通得當年之歡騁於一巳之志似由報應若出智力也天福也自然生耳自然泰耳未必由仁德與智力然交履信順之行得騁一巳之志終年而无憂虞非天福如之何也可以死而死或積惡行暴或饑寒窮困故不顧刑戮不賴生存而威之於死似由身招應事而至也天福也自然死耳自然窮耳未必由凶虐與愚弱然肆凶虐之心居不賴生之地而威之於死是之死得死者故亦曰天福者也可以生而不生居榮泰之地願獲長年而早終天罰也願生而不得生故曰天罰也可以死而不死居困辱之地不願久生而更不死也天罰也輕死而不之死復是天罰可以生可以死得生得死有矣此之生而得生此之死而得死不可以生不可以死或死或生有矣此義之生而更死之死而更生者也此二句上義巳該之而重出疑書誤然而生生死死非物非我皆命也智之所无柰何生死之理旣不可測則死不由物生不在我豈智之所如故曰窈然无際天道自㑹漠然无分天道自運无際无分是自然之極自㑹自運豈有役之哉天地不能犯天地雖大不能違自然也聖智不能干神聖雖妙不能逆時運也魅不能欺魅雖妖不能詐眞正也自然者黙之成之黙无也平之寧之平寧无所施爲將之迎之功无遺喪似若將迎楊朱之友曰季梁季梁得疾十日大漸漸劇也其子環而泣之請醫季梁謂楊朱曰吾子不肖如此之甚汝奚不爲我歌以曉之楊朱歌曰天其弗識人胡能覺匪祐自天弗孽由人我乎汝乎其弗知乎醫乎巫乎其知之乎言唯我與汝識死生有命耳非醫巫所知也其子弗曉終謁三醫不解楊朱歌旨謂與巳同也一曰矯氏二曰俞氏三曰盧氏診其所疾矯氏謂季梁曰汝寒温不節虚實失度病由飢飽色欲精慮煩散非夭非雖漸可攻也季梁曰衆醫也亟屏之俞氏曰女始則胎氣不足乳湩有餘病非一朝一夕之故其所由來漸矣弗可巳也季梁曰良醫也且食之盧氏曰汝疾不由天亦不由人亦不由稟生受形旣有制之者矣亦有知之者矣夫死生之分脩短之期咸定於无爲天理之所制矣但愚時者之所惑女逹者之所悟也藥石其如汝何季梁曰神醫也重貺遣之俄而季梁之疾自瘳生非貴之所能存身非愛之所能厚生亦非賤之所能夭身亦非輕之所能薄故貴之或不生䏼之或不死愛之或不厚輕之或不薄此似反也非反也此自生自死自厚自薄或貴之而生或賤之而死或愛之而厚或輕之而薄此似順也非順也此亦自生自死自厚自薄鬻熊語文王鬻熊文王師也曰自長非所増自短非所損算之所亡何算猶智也老語尹曰天之所惡孰知其故王弼曰孰誰也言誰能知天意即其唯聖人也言迎天意揣利害不如其巳夫順天理而无心者則神不能犯人事不能干迎天意羽伏處順以去逆就利而違害此方與逆害爲巨對用智之精巧者耳未能使吉凶不生禍福兼盡也楊布楊朱弟也問曰有人於此年兄弟也言兄弟也才兄弟也貌兄弟也而壽夭父子也貴賤父子也名譽父子也愛憎父子也吾惑之楊子曰古之人有言吾甞識之將以告不知所以然而然命也自然之理故不可以智知今昏昏昧昧紛紛隨所爲隨所不爲日去日來孰能知其故皆命也夫信命者亡壽夭有壽夭則非命信理者亡是非有是非則非理信心者亡逆順有逆順則非心信性者亡安危有安危則非性則謂之都亡所信亡所不信理亦无信與不信也眞矣慤矣奚去奚就奚哀奚樂奚爲奚不爲理苟无心則无所不爲亦无所爲也黃帝之書云至人居死動械此舉无心之極亦不知所以居亦不知所以不居亦不知所以動亦不知所以不動亦不以衆人之觀易其情貌亦不謂衆人之不觀不易其情貌不爲外物視聽改其度也獨往獨來獨出獨入孰能礙之物往亦往物來亦來任物出入故莫有礙墨音眉杘勑夷單音戰至音咥嘽齒然咺許爰憋妨滅懯音敷此皆黙詐輕發汗緩急之貌四人相與游於丗胥如志也窮年不相知情自以智之深也巧佞愚直婩魚略斫齒略便辟婩斫不解悟之貌四人相與游於丗胥如志也窮年而不相語術自以巧之微也㺒苦交㤉苦牙情露音蹇極淩誶音碎此皆多誶訥辯給之貌四人相與游於丗胥如志也窮年不相曉悟自以爲才之得也眠莫典娗徒繭諈止累諉如僞勇敢怯疑眠娫不開通之貌諈諉煩重之貌四人相與游於丗胥如志也窮年不相讁發自以行无戾也多偶自專乗權立四人相與游於丗胥如志也窮年不相顧眄自以時之適也此衆態也貌不一而咸之於道命所歸也佹佹姑危成者俏成也俏音肖俏似也初非成也佹佹敗者俏敗者也初非敗也丗有幾得幾失之言而理實无幾也故迷生於俏惑其以成敗而不能辯迷之所由也俏之際昧然於俏而不昧然際猶㑹也言冥昧難分耳則不駭外禍不喜内福禍福豈有内外皆理之定者也見其卒起因謂外至見其漸著因謂内成也隨時動隨時止智不能知也動止非我則非智所識也信命者於彼我无二心無喜懼之情也於彼我而有二心者不揜目塞耳背坂面隍亦不墜仆也此明用智計之不如任自然也故曰死生自命也其非命則仁智者必夀凶愚者必夭而未必然也貧窮自時也其非時則勤儉者必冨而奢惰者必貧亦未必然怨夭折者不知命者也怨貧窮者不知時者也此皆不識自然之理當死不懼在窮不戚知命安時也其使多智之人量利害料虚實度人情得亦中亡亦中中半也其少智之人不量利害不料虚實不度人情得亦中亡亦中量與不量料與不料度與不度奚以異唯亡所量不役智也亡所不量任智之所知也則全而亡喪亦非知全亦非知喪自全也自亡也自喪也自全者非用心之所能自敗者非行失之所致也齊景公游於牛山北臨其國城而流涕曰美哉國乎鬱鬱芉何滴滴去此國而死乎使古无死者寡人將去斯而之何史孔梁丘據皆從而泣曰臣賴君之賜跪食惡可得而食駑馬稜車可得而乗也且猶不欲死而況吾君乎晏子獨於旁公雪涕而顧晏子曰寡人今日之游悲孔與據皆從寡人而泣子之獨何也晏子對曰使賢者常守之則太公桓公將常守之矣使有勇者而常守之則莊公靈公將常守之矣數君者將守之吾君方將被蓑笠而立乎畎畝之中唯事之恤行假念死乎行假當作何暇則吾君又安得此位而立焉以其迭處之迭去之至於君也而獨爲之流涕是不仁也見不仁之君見謟諛之臣臣見此二者臣之所爲獨竊也景公慙焉舉觴自罰罰二臣者各二觴焉魏人有東門呉者其子死而不憂其相室曰公之愛子天下无有今子死不憂何也東門吳曰吾常无子无子之時不憂今子死乃與嚮无子同臣奚憂焉農赴時商趣利工追術仕逐勢勢使然也然農有水旱商有得失工有成敗仕有遇否命使然也自然冥運也沖虚至德眞經卷第六
