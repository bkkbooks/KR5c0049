front:
  text: 沖虛至德真經卷第五
  hash: sha256:8210633e9dfeb2c5b86b245331933ea798846f53720306183a777ebeccc036e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0049_SBCK_005-1a}
body:
  text: 列子張湛處度注湯問第五夫智之所限知莫其所不知而丗齊所見以限物是以犬聖發問窮理者對也殷湯問於夏革革字莊子音曰古初有物乎疑直混茫而巳夏革無物今惡得物今所以有物由古有物故後之人將謂今之無物可乎後丗古丗丗為循環矣設令後人謂今亦無物則不可矣殷湯曰然則物無先後乎夏革曰物之終始初無極巳始或為終終或為始惡知其紀今之所謂終者或為物始所謂始者或是物終終始相循竟不可分也然自物之外自事之先朕所不知也謂物外事先廓然都無故無所指言也殷湯曰然則上下八方有極盡乎湯革雖相答然於視聽猶未歷無故重發此問今盡然都了革曰不知也非不知也不可以智知子湯固問革曰無則無極有則有盡朕何以知之欲窮無而限有不知而推也然無極之外復無無極無盡之中復無無盡既謂之無何得有外既謂之虛何得有中所謂無無極無無盡乃真極真盡矣無極復無無極無盡復無無盡或者將謂無極之外更有無極無盡之中復有無盡故重明無極復無無極無盡復無無盡也朕以是知其無極無盡也而不知其有極有盡也知其無則無所不知不知其有則乃是真知也湯又問曰四海之外奚有革曰猶齊州也齊中也湯曰汝奚以實之革曰朕東行至營人民猶是也如是閒也問營之東復猶營也西行至人民猶是也問之西復猶豳也朕以是知四海四荒四極之不異是也四海四荒四極義見爾雅知其不異是閒則是是矣故大小相含無窮極也含萬物者亦如含天地夫含萬物者天地容天地者太虛也含萬物也故不窮乾坤含化隂陽受氣庶物流形代謝相因不止於一生不盡於一形故不窮也含天地也故無極天地籠罩三光包羅四海大則大矣然形器之物㑹有限極窮其限極非虛如何計天地在太虛之中則如有如無耳故凡在有方之域皆巨細相形多少相懸推之至無之極豈窮於一天極於一地則天地之與萬物互相包裏迭為國邑豈能知其盈虛測其頭數者哉朕亦焉知天地之表不有大天地者乎夫太虛也無窮天地也有限以無窮而容有限則天地未必形之大者然則鄒子之所言蓋其掌握耳亦吾所不知也夫萬事可以理推不可以器徴故信其心智所知及而不知所知之有極者膚識也誠其耳目所聞見而不知視聽之有限者俗士也至於逹人融心智之所滯悟智外之妙理豁視聽之所閡逺得物外之形夫封情慮於有方之境循局步於六合之間者將謂寫載盡於三墳五典歸藏窮於四海九州焉知太虛之遼廓巨細之無限天地為一宅萬物為游塵皆拘短見於當年昧然而俱終故列子闡無內之至言以坦心智之所滯恢無外之宏唱以開視聽之所閡使希風者不覺矜伐之自束教者不知桎梏之自解故刳斫儒墨指斥大方豈直好竒尚異而徒為夸大哉悲夫聃周既獲譏於丗論吾子亦獨以何免之乎然則天地亦物也物有不足故昔者女媧氏練五色石以補其闕隂陽失度三辰盈縮是使天地之闕不必形體虧殘也女媧神人故能練五常之精以調和隂陽使晷度順序不必以器質相也斷鼇之足鼇巨也以立四極其後共工氏與顓頊爭為帝怒而觸不周之山共工氏興霸於伏羲神農之間其後苗裔恃其彊與顓頊爭為帝顓頊黃帝孫不周山在西北之極折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉湯又問物有巨細乎有修短乎有同異乎革曰㴾海之東不知幾億萬里有大壑焉實惟無底之谷事見大荒經詩含神霧云東注無底之谷其下無底稱其無底者蓋舉深之極耳上句云無無極限有不可盡實使無底亦無所駭名曰歸墟莊子云尾閭八九野之水天漢之流莫不注之而無增無減焉八紘八極也九野天之八方中央也丗傳天河與海通其中有五山焉一曰岱輿二曰貟嶠三曰方壷四曰瀛洲五曰蓬萊其山髙下周旋三萬里其頂平處九千里山之中閒相去七萬里以為鄰居焉其上臺觀皆金玉其上禽獸皆純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相往來者不可數焉兩山閒相去七萬里五山之間凡二十八萬里而日夜往來往來者乃可得數風雲之揮霍不足逾其速而五山之根無所連箸此之山猶浮於海上以此推之則凡有形之域皆寄於太虛之中故無所根蒂常隨潮波上下往還不得暫峙焉仙聖毒之訴之於帝帝恐流於西極失羣聖之居乃命禺彊大荒經曰此極之神名禺彊靈為之使也使巨鼇十五舉首而戴之離騷曰巨鼇戴山其何以安也迭為三番六萬歲一交焉五山始峙而不動而龍伯之國有大人舉足不盈數千而暨五山之所一釣而連六鼇合負而趣歸其國灼其骨以數焉以髙下周圍三萬里山而一鼇頭之所戴而此六鼇復為一釣之所引龍伯之人能并而負之又鑽其骨以十計此人之形當百餘萬里鯤鵬方之猶蚊蚋蚤虱耳則太虛之所受亦奚所不容哉於是岱輿貟嶠二山流於北極沈於大海仙聖之播遷者巨億計帝憑怒憑大也侵減龍伯之國使厄侵小龍伯之民使短至伏羲神農時其國人猶數十丈山海經云東海之外大荒之中有大人之國河圖玉板云從崑崙以北九萬里得龍伯之國人長四十丈生萬八千歲始死從中州以東四十萬里得僬僥國人長一尺五寸事見詩含神霧東北極有人名曰諍人長九寸見山海經詩含神霧云東北極有此人既言其大因明其小耳荆之南有靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋朽壤之上有菌芝者生於朝死於晦春夏之月有蠓蚋者因雨而生見陽而死終北之北莊子云窮髮有溟海者天池也有魚焉其廣數千里其長稱焉其名為鯤有鳥焉其名為鵬翼垂天之雲其體稱焉莊子云鯤化為鵬丗豈知有此物哉玩其所常見習其所常聞雖語之猶將不信焉大禹行而見之伯益知而名之夷堅聞而志之夫竒見異聞衆之所疑禹益堅豈直空言譎怪以駭一丗蓋明必有此物以遣執守者之固陋除視聽者之冒聾耳夷堅未聞亦古博物者也江浦之閒生麼蟲庶細也其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥揚眉而望之弗見其形離朱黃帝時明目人能百步望秋毫之末子羽未聞䚦俞師曠方夜擲耳俯首而聽之弗聞其聲䚦俞未聞也師曠晉平公時人夏革無緣得稱之此後著書記事者潤益其辭耳夫用心智賴耳目以視聽者未能見至微之物也唯黃帝與容成子居空桐之上同齊三月心死形廢所謂心同死灰形若枯木徐以神視神者寂然照而巳不假於目塊然見之嵩山之阿以有形涉於神明之境嵩山未足喻其巨徐以氣聽氣者任其自然而不資外用也砰然聞之電霆之聲以有聲涉於空寂之域雷霆之音未足以喻其大也吳楚之國有大木焉其名為柚音柚碧樹而冬生實丹而味酸食其皮汁巳憤厥之疾齊州珍之渡淮而北而化為枳焉鸜鵒不踰濟貉踰汶則死矣地氣然也此事義見周官雖然形氣異也性鈞巳無相易巳生皆全巳分皆足巳吾何以識其巨細何以識其修短何以識其同異哉萬品萬形萬性萬情各安所適任而不執則鈞於全足不願相易也豈智所能辨哉太形王屋二山形當作行太行在河內野王縣王屋在河東東垣縣方七百里髙萬仞本在兾州之南河陽之北北山愚公者俗謂之愚者未必非智也年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險指通豫南達于漢隂可乎雜然相許雜猶僉也其妻獻疑獻疑猶致難也曰以君之力曽不能損魁父之丘如太形王屋何魁父小山也在陳留界且焉置土石雜曰投諸渤海之尾隱土之北淮南云東北得州曰隱土遂率子孫荷擔者三夫叩石墾壞箕畚運於渤海之尾鄰人京城氏之孀妻孀寡也有遺男始齓跳往助之寒暑易節始一反焉河曲智叟而止之俗謂之智者未必非愚也曰甚矣汝之不惠以殘年餘力曽不能毁山之一毛其如土石何北山愚公長息曰汝心之固固不可徹曽不孀妻弱子雖我之死有子存焉子又生孫孫又生子子又有子子又有孫子子孫孫無窮匱也而山不加增何苦而不平河曲智叟亡以應屈其理而服其志也操蛇之神聞之大荒經云山海神皆執蛇懼其不巳也必其不巳則山㑹平矣丗咸知積小可以髙大而不悟損多可以至少夫九層起於纍土髙岸遂為幽谷苟功無廢舍不期朝夕則無微而不積無大而不虧矣今砥礪之與乃劒相磨不巳則知其將盡二物如此則丘壑消盈無所致疑以大小遲速為惑者未能推也告之於帝帝感其誠感愚公之至心也命夸蛾氏二子夸蛾氏傳記所未聞蓋有神力者也負二山一厝朔東一厝雍南自此兾之南漢之隂無隴斷焉夫期功於旦夕者聞歲暮而致歎取美於當年者在身後而長悲此故俗士之近心一丗之常情也至於大人以天地為一朝億代為曠息忘懹以造事無心而為功在我之與在彼在身之與在人弗覺其殊别莫知其先後故北山之愚與妻之孤足以哂河曲之智嗤一丗之惑悠悠之徒可不察與夸父不量力欲追日影逐之於隅谷之際隅谷虞淵也日所入渴欲得斂赴飲河渭河渭不足將走北飲大澤未至道渴而死棄其杖尸膏所浸生鄧林鄧林彌廣數千里焉山海經云夸父死棄其杖而為鄧林大禹曰六合之閒四海之內照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物異形或夭或壽唯聖人能通其道聖人順天地之道因萬物之性在其所通通其逆順使羣異各得其方壽夭咸盡其分也夏革白然則亦有不待神靈而生不待隂陽而形不待日月而明夫生者自生形者固形明者自明忽然自爾固無所因假也不待殺戮而夭不待將迎而壽自天者不由禍害自壽者不由接養不持五榖而食不待繒纊而衣不待舟車而行其道自然自然者都無所假也非聖人之所通也聖人不違自然而萬物自運豈樂通物哉自地草巳上皆夏革所告殷湯也禹之治水上也迷而失塗謬之一國游絶恨之外者非用心之所還故言迷謬也濵北海之北不知距齊州幾千萬里距去也其國名曰終北不知際畔之所齊限無風霜露不生鳥獸蟲魚草木之四方悉平周以喬陟山之重壟也當國之中有山山名壼領狀若甔擔甄捶頂有口狀貟環名曰滋穴有水湧出名曰神瀵山頂之泉曰瀵臭過蘭椒味過醪醴一源分為四埒注於山下山上水流曰埓經營一國亡不悉遍土氣和亡札厲人性婉而從物不競不爭柔心而弱骨不驕不忌長幼儕居不君不臣男女雜游不媒不聘緣水而居不耕不稼土氣溫適不織不衣百年而死不夭不病其民孳阜亡數有喜樂亡衰老哀苦其俗好聲相携而迭謡終日不輟音饑惓則飲神瀵力志和平過則醉經旬乃醒沐浴神瀵膚色脂澤香氣經旬乃歇周穆王北游過其國三年忘歸既反周室慕其國然自失不進酒不召嬪御者數月乃復管仲勉齊桓公因游遼口俱之其國幾剋舉隰朋諫曰君舍齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬肆疑作叱視撝則諸侯從命視疑作指亦奚羡於彼而棄齊國之社稷從戎夷之國乎此仲父之耄奈何從之桓公乃止以隰朋之言告管仲仲曰此固非朋之所及也朋之知極於齊國豈知彼國之巨偉故管仲駭之也臣恐彼國之不可知之也齊國之冨奚戀隰朋之言奚顧此國自不可得往耳豈以朋之言故止也南國之人被髮而裸力果北國之人鞨巾而裘中國之人冠冕而裳九土所資或農或商或田或漁如冬裘夏葛水舟陸車默而得之性而成之夫方士所資自然而能故吳越之用舟燕朔之乘馬得之於水陸之冝不假學於賢智愼到曰治水者茨防決塞雖在夷貊相似如一學之於水不學之於禹也越之東有沐又休之國其長子生則鮮而食之謂之冝弟其大父死負其大母而棄之曰妻不可與同居處楚之南有炎人之國其親戚死其而棄之然後埋其骨乃成為孝子秦之西有儀渠又康之國者其親戚死聚祡積而焚之燻則煙上謂之登遐然後成為孝子此上以為政下以為俗而未足為異也此事亦見墨子孔子東游見兩小兒辨問其故一兒曰我以日始出時去人近而日中時逺也一兒以日初出逺而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不為逺者小而近者大乎一兒曰日初出滄滄涼涼及其日中如探湯此不為近者熱而逺者涼乎孔子不能決也兩小兒曰孰為汝多知乎所謂六合之外聖人存而不論二童子致笑未必不達此旨或互相起豫也均天下之至理也物物事事皆平皆均則理無不至也連於形物亦然連屬也屬於器物者亦須平焉均髮均縣輕重而髮絶髮不均也髮甚微脆而至不絶者至約故也今所以絶者猶輕重相傾有不均處也均也其絶也其均也寧有絶理莫絶言不絶也人以為不然凡人不逹理也自有知其然者也㑹自有知此理為然者墨子亦有此說詹何詹何楚人以善釣聞於國以獨繭絲為綸芒針為鈎荆篠為竽剖粒為餌引盈車之魚家語曰鯤魚其大盈車於百仞之淵汩流之中綸不絶鈎不伸竿不橈夫飾芳餌挂微鈎下沈青泥上乘驚波因水而施舍頡頑委縱與之沈浮及其㢮絶故生而獲也楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也蒲且子古善弋射者弱弓纎繳乘風振之連雙鶬於靑雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈鈎手無輕重物莫能亂魚見臣之釣餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕致重也大王治國誠能若此則天下可運於一握將亦奚事哉楚王曰善善其此諭者以諷其用治國矣魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所巳今有偕生之疾與體偕長今為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志彊而氣弱故足於謀而寡於斷志謂心智氣謂質性智多故多慮性弱故少決也齊嬰志弱而氣彊故少於慮而傷於專智少而任性則果而自用換汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二子易心乘其本識故各反其家各非故形故妻子不識也二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃巳此言恢誕乃書記少有然魏丗華他能刳腸易胃湔洗五藏天下理自有不可思議者信亦不可以臆斷故冝存而不論也瓠巴鼓琴而鳥舞魚躍瓠巴古善鼓琴人也鄭師文聞之師文鄭國樂師棄家從師襄游師襄亦古之善琴人也從其游學柱指釣弦三年不成章安指調三年不能成曲師襄曰子可以歸矣嫌其難教師文舍其琴歎曰文非之不能鈞非章之不能成文所存者不在所志者不在聲遺弦聲然後能盡聲之用也內不得於心外不應於器故不敢發手而動心手器三者應不相違失而後和音發矣且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商以召南吕商金音屬秋南吕八月律涼風㧾至草木成實得秋氣故成熟及秋而叩角弦以激夾鐘角木音屬春夾鐘二月律溫風徐回草木發榮得春氣故榮華當夏而叩羽以召黃鐘羽水音屬冬黃鐘十一月律霜雪交下川池暴沍得冬氣故凝隂水凍及冬而叩徴以激蕤賔徴火音屬夏賔五月律陽光熾烈堅冰立散得夏氣故消釋此一時彈琴無緣頓變四節蓋舉一時之驗則三時可知且欲並言其所感之妙耳將終命宫而㧾四弦則景風翔慶雲浮甘露降澧泉涌至和之所致也師襄乃撫心髙蹈曰微矣子之彈也雖師曠之淸角師曠為晉平公奏清角一奏之有自雲從西北起再奏之大風至而雨隨之三奏之裂帷幕破組豆飛廊瓦左右皆奔走平公恐伏晉國大旱赤地三年平公得聲者或吉或凶也鄒衍之吹律北方有地美而寒不生五榖鄒子吹律暖之而禾黍滋也亡以加之彼將挾琴執管而從子之後耳薛談學謳於秦靑三人薛秦國之善歌者未窮靑之技自謂盡之遂辭歸秦靑弗止餞於郊衢撫節悲歌聲振林木響遇行雲薛談乃謝求反終身不敢言歸秦靑顧謂其友曰昔韓娥韓國善歌者也東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭曼聲猶長引也一里老幼悲愁垂涕相對三日不食遽而追之娥還復為曼聲長歌一里長幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之發猶遣也故雍門之人至今善歌哭效娥之遺聲六國時有雍門子名周善琴又善哭以哭于孟常君伯牙善鼓琴鍾子期善聽伯牙鼓琴志在登髙山鍾子期曰善哉峩峩兮泰山志在流水鍾子期曰善哉洋洋兮江河伯牙所念鍾子期必得之伯牙游於泰山之隂卒逢暴雨止於巖下心悲乃援琴而鼓之初為霖雨之操更造崩山之音曲每奏鍾子期輒窮其趣伯牙乃舍琴而歎曰善哉善哉子之聽夫志想象猶吾心也言心暗合與已無異吾於何逃聲哉發音鍾子期巳得其心則無處藏其聲也周穆王西巡狩越崑崙不至弇山反還未及中國道有獻工人名偃師中道有國獻此工巧之人也穆王薦之薦當作進問曰若有何能偃師曰臣唯命所試然臣巳有所造願王先觀之穆王日日以俱來日謂别日吾與俱觀之越日偃師謁見王王薦之曰與偕來者何人邪對曰臣之所造能倡者倡俳優也穆王驚視之趣步俯仰信人也巧夫顉其頥則歌合律捧其手則舞應節千變萬化惟意所適王以為實人也與盛姬內御並觀之穆天子傳云盛穆王之美人技將終倡者瞬其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傅㑹革木膠漆白黑丹靑之所為王諦料之內則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也而無不畢具者合㑹復如初見如向者之始見玉也王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能步此皆以機相使去其機之主則不能相制御亦如人五藏有病皆外應七孔與曰支也穆王始恱而歎曰人之巧乃可與造化者同功乎詔二車載之以歸近丗人有言人靈因機而生者何者造化之功至妙故萬品咸育運動無方人藝粗拙但寫載成形塊然而巳至於巧極則幾乎造化似或依此言而生此而此書既自不爾所以明此義者直以巧極思之無方不可以常理限故每舉物極以祛近惑豈謂物無神主邪斯失之逺矣夫班輸之雲梯墨翟之飛鳶自謂能之極也班輸作雲悌可以凌虛仰攻墨子作木鳶飛三日不集弟子東門賈禽滑聞偃師之巧以告二子二子終身不敢語藝而時執規矩時執規矩言其不敢數之也甘蠅古之善射者彀弓而獸伏鳥下箭無虛發而獸鳥不敢逸戰國䇿云更嬴虛發而鳥下也弟子名飛衛學射於甘蠅而巧過其師紀昌者又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃卧其妻之機下以目承牽挺牽挺機躡二年之後雖錐末倒眥而不瞬也以告飛衛飛衛曰未也必學視而後可視小如大視微如著而後告我昌以懸虱於牖南面而望之旬日之閒浸大也三年之後如車輪焉以覩餘物皆丘山也視虱如輪則餘物稱此而大焉乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以彊弓徑矢貫虱之心言其用手之妙也以告飛衛飛衛髙蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵已者一人而巳乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先窮窮盡也紀昌遺一矢既發飛衛以刺之端扞之而無差焉於是二子泣而投弓相拜於塗請為父子剋臂以誓不得告術於人祕其道也此一章義例巳詳於仲尼篇也造父之師曰泰豆氏泰豆氏見諸雜書記造父之始從習御也執禮甚卑泰豆三年不告造父執禮愈謹乃告之曰古詩言良弓之子必先為箕良冶之子必先為裘箕裘皆須柔屈補接而後成器為弓冶者調筋角和金鐵亦然故學者必先攻其所易然後能成其所難所以為諭也汝先觀吾趣趣行也趣如吾然後六轡可持六馬可御造父曰唯命所從泰豆乃立木為塗僅可容足才得安腳計步而置疏數如其步數履之而行趣走往還無跌失也造父學之三日盡其巧泰豆歎曰子何其敏也得之捷乎敏疾也捷速也凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎轡銜之際而急緩乎脣吻之和正度乎胸臆之中而執節乎掌握之閒內得於中心而外合於馬志是故能進退履繩而旋曲中規矩取道致逺而氣力有餘誠得其術也得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以䇿驅心間體正六轡不亂而二十四蹄所投無差回旋進退莫不中節與和鸞之聲相應也然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之夫行之所踐容足而巳足外無餘而人不敢踐者此心不夷體不間故也心夷體間即進止有常數遲疾有常度苟盡其妙非但施之於身乃可行之於物雖六轡之煩馬足之衆調之有道不患其亂故輪外不恃無用之轍蹄外不賴無用之地可不謂然也魏黑卵以昵嫌殺丘邴章昵嫌私恨丘邴章之子來丹謀報父之讎丹氣甚猛形甚露計粒而食順風而趨雖怒不能稱兵以報之有膽氣而體羸虛不能舉兵器也恥假力於人誓手劒以屠黑卵黑卵悍志絶衆力抗百夫筋骨皮非人也延頸承刀披胸受矢鋩鍔摧屈而體無痕撻負其材力視來丹猶雛鷇也來丹之友申他曰子怨黑卵至矣黑卵之易子過矣將奚謀焉來丹垂涕曰願子為我謀申他曰吾聞衛孔周其祖得殷帝之寶劒一童子服之却三軍之衆奚不請焉來丹遂適衛見孔周執㒒御之禮請光納妻子後言所欲孔周曰吾有三劒唯子所擇皆不能殺人且先言其狀一曰含光視之不可見運之不知有其所觸也泯然無際經物而物不覺二曰承影將旦昧爽之交日夕昏明之際北面而察之淡淡焉有物存莫識其狀其所觸也竊竊然有聲經物而物不疾也三曰宵練方晝則見影而不見光與日月同色也方夜見光而不見形言其照夜其觸物也騞然而過騞休壁切隨過隨合覺疾而不血刃焉此三寶者傳之十三丗矣而無施於事不能害物匣而藏之未嘗啓封來丹曰雖然吾必請其下者孔周乃歸其妻子與齊七日晏隂之閒晏晚暮也跪而授其下劒來丹再拜受之以歸以其可執可見故受其下者來丹遂執劒從黑卵時黑卵之醉偃於牖下自頸至腰三斬之黑卵不覺來丹以黑卵之死趣而退遇黑卵之子於門擊之三下如投虛黑卵之子方曰汝何蚩而三招豫來丹知劒之不能殺人也歎而歸黑卵既醒怒其妻曰醉而露我使我嗌疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支殭彼其厭我哉周穆王大征西戎西戎獻錕鋙之劒火淣之布其劒長尺有咫練鋼赤刃用之切玉如切泥焉火淣之布淣之必投於火布則火色垢則布色出火而振之皓然疑乎雪此周書所云皇子以為無此物傳之者妄蕭叔曰皇子果於自信果於誣理哉此誣章斷後而說切王刀火浣布者明上之所載皆事實之言因此二物無虛妄者列子沖虛至德真經卷第五
